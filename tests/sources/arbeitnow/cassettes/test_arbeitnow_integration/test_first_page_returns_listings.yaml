        is no hierarchy to hide behind and no large analyst pool to delegate to.<\/p>\n<p><strong>Core
        Values at Marvelous<\/strong><\/p>\n<ul>\n<li><strong>Radical honesty<\/strong>
        \u2014 you say what you think, including when it''s uncomfortable<\/li>\n<li><strong>Depth
