        resume must demonstrate at least one year of Specialized experience at or
        equivalent to the GS-10 grade level or pay band in the Federal service or
        equivalent experience in the private or public sector. Specialized experience
        must demonstrate the following: Experience applying CAD modeling practices
        and programs, including but not limited to Solid Edge, Solidworks, AutoCAD,
        Inventor, CAD/CAM software (e.g. Mastercam, Fusion 360) etc. with the ability
        to design complex components made from metals, plastics, composites, or resins
        using various manufacturing processes and equipment; Experience utilizing
        slicing software (e.g. Cura, Simplify3D) and posting processing techniques
        for 3D printed parts; Experience with 3D scanning hardware and software and
        interpreting engineering drawings and visualizing objects in three dimensions,
        including the ability to reverse engineer items from 3D scans; Experience
        understanding material properties, behaviors, applications, and limitations
        of plastics, metals, composites, resins, etc; Experience interpreting geometric
        dimensioning and tolerance (GD&T) as it relates to engineering and shop tooling
        drawings; Experience providing technical expertise to management officials
        and skills in oral and written communication; Experience planning, organizing,
        and establishing priorities on assignments of substantial variety and complexity.
        Additional qualification information can be found from the following Office
        of Personnel Management website: https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/#url=List-by-Occupational-Series
        Experience refers to paid and unpaid experience, including volunteer work
