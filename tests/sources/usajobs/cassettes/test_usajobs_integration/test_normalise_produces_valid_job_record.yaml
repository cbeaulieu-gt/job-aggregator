        addition to meeting the basic educational requirement, your resume must also
        demonstrate at least one year of specialized experience at or equivalent to
        the ND-03 pay band (GS-09 through GS-11 equivalency) in the Federal service
        or equivalent experience in the private or public sector. Specialized experience
        must demonstrate the following: as a professional Engineer or Scientist performing
        Platform or DevSecOps software development activities to include administrating
        Kubernetes clusters. Examples of qualifying experience may include leading
        a team of scientists and engineers to perform the requirements development,
        architecture development, evaluation and assessment of combat system baselines
        leading to certification; developing and executing project plans that meet
        customer requirements and resource constraints; performing engineering assessments;
        execution of performance management activities; or mentoring junior employees.
        Additional qualification information can be found from the following Office
        of Personnel Management website: https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/#url=Group-Standards
