        government, the Internal Revenue Service (IRS) considers the majority of your
        entitlements to be taxable. Visit GSA Bulletin FTR 20-04 here for additional
        information.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.usajobs.gov/Help/working-in-government/benefits/\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"KSA's
        Continued 0830-09 (Mechanical Engineer) Professional knowledge of mechanical
