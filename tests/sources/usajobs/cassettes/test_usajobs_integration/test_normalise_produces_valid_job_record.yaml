        impact continued access to Top Secret information, Information Systems, SAP,
        or unescorted access to SCIFs. NGA utilizes all processes and procedures of
        the Defense Civilian Intelligence Personnel System (DCIPS). Non-executive
        NGA employees are assigned to five distinct pay bands based on the type and
        scope of work performed. The employee's base salary is established within
        their assigned pay band based on their unique qualifications. A performance
        pay process is conducted each year to determine a potential base pay salary
        increase and/or bonus. An employee's annual performance evaluation is a key
        factor in the performance pay process. This position is a DCIPS position in
        the Excepted Service under 10 U.S.C. 1601. DoD Components with DCIPS positions
        apply Veterans' Preference to preference eligible candidates as defined by
        Section 2108 of Title 5 USC, in accordance with the procedures provided in
        DoD Instruction 1400.25, Volume 2005, DCIPS Employment and Placement. If you
        are an external applicant claiming veterans' preference, as defined by Section
        2108 of Title 5 U.S.C., you must self-identify your eligibility.\",\"Evaluations\":\"Applicants
