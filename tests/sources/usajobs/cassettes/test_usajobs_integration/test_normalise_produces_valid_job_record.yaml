        competitive service positions; these positions may be professional or administrative
        occupations and are located Air Force-Wide. Positions may be filled as permanent
        or term with a full-time or part-time work schedule. Pay will vary by geographic
        location.*** The term \\\"Current post-secondary student\\\" means a person
        who is currently enrolled and in good academic standing at a full-time program
        at an institution of higher education; and is progressing toward a baccalaureate
