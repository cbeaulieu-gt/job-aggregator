        Time\",\"Code\":\"1\"}],\"PositionOfferingType\":[{\"Name\":\"This is a term
        appointment, not to exceed 2 years.\",\"Code\":\"15319\"}],\"QualificationSummary\":\"To
        meet the minimum qualifications for this position, you must meet the education,
        licensing and specialized experience requirements. To qualify for a Marine
        Engineer (Assistant/Associate Professor) you must possess: At least 1 academic
        year (5 years for Associate Professor) full time or equivalent experience
        teaching at a college or university in Marine or Mechanical Engineering or
        a related field. OR Sea service as a licensed engineer officer, relevant shipyard
        planning production, scheduling or business operation experience ashore, or
        power-plant operator related experience may be substituted for teaching experience
        on a one-for-one basis. Assistant Professor: Bachelor's degree from an accredited
        college or university in Marine or Mechanical Engineering or a related field,
        including, but not limited to naval architecture, naval engineering, ocean
        engineering, electrical engineering or nuclear engineering. Associate Professor:
        Master's degree from an accredited college or university in Marine or Mechanical
        Engineering or a related field, including, but not limited to naval architecture,
        naval engineering, ocean engineering, electrical engineering or nuclear engineering.
        Licensure Requirement: Applicants must possess a current (not expired) U.S.
        Coast Guard License (or equivalent credential) valid for service on United
        States Flag Commercial Ships as a 2nd Assistant Engineer, Unlimited Horsepower.
        A valid Certificate under the provisions of the International Convention on
        Standards of Training, Certification and Watchkeeping for Seafarers, 1978,
        as currently amended, is preferred. License Substitution: Possession of a
        valid Professional Engineer's license in Marine or Mechanical Engineering
        or a related discipline, experience as a shipyard superintendent or project
        manager or shipping company (including US Navy) Port Engineer. Service in
        the U.S. Navy as an Engineering Duty officer (designator 144X), qualified
        as a U.S. Coast Guard Naval Engineer or Marine Inspector, or possession of
        a Master's Degree (for Assistant Professor) in Marine or Mechanical Engineering
        or a related field may be considered as an equivalent qualification to a current
        U.S. Coast Guard License on a case-by-case basis. KNOWLEDGE, SKILLS AND ABILITIES
        (KSAs): Your qualifications will be evaluated on the basis of your level of
        knowledge, skills, abilities and/or competencies in the following areas: Accountability
        - Hold self and others accountable for measurable high-quality, timely, and
        cost-effective results. Determines objectives, sets priorities, and delegates
        work. Accepts responsibility for mistakes. Comply with established control
        systems and rules. Computer Skills - Use computers, software applications,
        databases, and automated systems to accomplish work. Customer Service - Work
        with clients and customers (that is, any individuals who use or receive the
        services or products that your work unit produces, including the general public,
        individuals who work in the agency, other agencies, or organizations outside
        the Government) to assess their needs, provide information or assistance,
        resolve their problems, or satisfy their expectations; knows about available
        products and services; is committed to providing quality products and services.
        Developing Others - Develop the ability of others to perform and contribute
        to the organization by providing ongoing feedback and by providing opportunities
        to learn through formal and informal methods. Education and Training - Knowledge
        of teaching, training, research, making presentations, lecturing, testing,
        and other instructional methods. For all types of consideration, experience
        refers to paid and unpaid experience, including volunteer work done through
        National Service programs (e.g., Peace Corps, AmeriCorps) and other organizations
        (e.g., professional; philanthropic; religious; spiritual; community, student,
        social). Volunteer work helps build critical competencies, knowledge, and
        skills and can provide valuable training and experience that translates directly
        to paid employment. You will receive credit for all qualifying experience,
        including volunteer experience. For additional information about applying
        to Federal positions, please click on the following link: https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-policies/#url=e4
        All applicants must meet all qualification requirements by the closing date
