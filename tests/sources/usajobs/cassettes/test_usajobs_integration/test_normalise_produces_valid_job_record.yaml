        affordability and readiness.\",\"TravelCode\":\"1\",\"ApplyOnlineUrl\":\"https://apply.usastaffing.gov/Application/Apply\",\"DetailStatusUrl\":\"https://apply.usastaffing.gov/Application/ApplicationStatus\",\"MajorDuties\":[\"Implements
        agency policy and provides expert engineering support.\",\"Analyzes engineering
        surveillance applications and developments.\",\"Administers contracts in accordance
        with agency policies/standards/metrics and standard operating procedures for
        Department of Defense (DoD) acquisitions.\",\"Assesses/records contractor
        performance using DCMA engineering surveillance performance indicators; then
        provides expert feedback to the Chief Engineer (CE).\",\"Prepares/evaluates
        documents regarding specific, unique, engineering/manufacturing issues.\",\"Provides
        expert feedback to the CE based upon daily application of engineering/analyses
