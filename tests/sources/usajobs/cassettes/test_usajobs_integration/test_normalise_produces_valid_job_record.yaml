        within one year (to include Disabled Veterans) SF-15, Veterans' Preference
        form (optional)\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://fbijobs.gov/benefits\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"The
