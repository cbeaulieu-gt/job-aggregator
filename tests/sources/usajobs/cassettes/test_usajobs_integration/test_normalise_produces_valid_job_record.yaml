        as the Cybersecurity Lead for the U.S. Tax Court, acting as the technical
        authority for cybersecurity engineering, threat detection, and information
        security operations across on-premises and cloud environments. Leads the design,
        implementation, and continuous improvement of security monitoring and detection
        capabilities. Develops, maintains, and executes log analysis and correlation
        strategies using Security Information and Event Management (SIEM) tools, including
        the creation, tuning, and automation of Splunk searches, alerts, dashboards,
        and scripted queries to identify indicators of compromise, anomalous behavior,
        and policy violations. Leads phishing detection and response activities. Designs
        and manages technical and procedural controls to prevent, detect, analyze,
        and respond to phishing and socially engineered attacks. Performs forensic
        analysis of suspicious emails, headers, URLs, and attachments; coordinates
        containment and remediation actions; and collaborates with IT and business
        stakeholders to reduce phishing risk through controls, monitoring, and user
        awareness. Directs malware detection, containment, and remediation efforts.
        Oversees endpoint, server, and cloud-based protection technologies; analyzes
        alerts and telemetry related to malicious code, ransomware, and unauthorized
        software; investigates root cause; and leads coordinated response actions
        to eradicate threats and restore systems securely. Performs continuous security
        monitoring in accordance with the National Institute of Science and Technology
        (NIST) Risk Management Framework (RMF) requirements. Analyzes vulnerability
        scan results, system logs, and security control metrics to assess risk posture
        and identify trends. Develops metrics and reports to communicate security
        status, risks, and recommended corrective actions to leadership. Conducts
        security investigations and incident responses for confirmed or suspected
        cybersecurity events. Leads technical analysis, determines scope and impact,
        preserves evidence, documents findings, and recommends remediation and preventive
        measures. Coordinates incident response activities with internal teams and,
        as necessary, external partners and vendors. Provides security engineering
        expertise throughout the system life cycle. Reviews system architectures,
        cloud configurations, application designs, and proposed changes to ensure
        security controls are integrated, and risks are addressed prior to deployment.
        Assesses the security impact of system changes through change and configuration
        management processes. Develops, reviews, and maintains cybersecurity documentation,
        including System Security Plans (SSPs), risk assessments, incident response
        documentation, and continuous monitoring artifacts. Ensures documentation
        accurately reflects system configurations and implemented security controls.
        Implements and enforces identity and access management, network security,
        endpoint security, and data protection controls. Ensures least-privilege access,
        secure authentication, and protection of sensitive Court information. Provides
        advanced Tier 2/3 technical support for cybersecurity-related incidents and
        problems. Analyzes complex issues, determines root causes, and implements
        corrective actions in coordination with IT operations teams. Develops cybersecurity
        policies, standards, and procedures. Provides technical guidance and training
        to IT staff and users on phishing awareness, malware prevention, security
        monitoring, and incident response responsibilities. Supports IT governance,
        acquisition, and vendor oversight by defining cybersecurity requirements,
        evaluating proposed solutions, and ensuring security considerations are integrated
        into Court IT initiatives. Supports Information Program Specialist with sourcing,
        procurement, and vendor management activities, as necessary. Writes, reviews,
        and/or maintains technical documentation for assigned technology or product
        environments (i.e., cybersecurity).\"],\"Education\":\"A Bachelor's or Master's
