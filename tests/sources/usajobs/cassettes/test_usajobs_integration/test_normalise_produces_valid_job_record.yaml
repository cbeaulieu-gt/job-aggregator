        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"This
        position is located in the Channel Design & Deployment Section, Program Delivery
        Division, National Library Service Blind/Print Disabled, Library Collections
        and Services Group. The position description numbers for this position are
        446912 and 446914. The salary range indicated reflects the locality pay adjustment
        for the Washington, D.C., Metropolitan area. This is a non-supervisory, bargaining
        unit position.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"13\",\"HighGrade\":\"13\",\"PromotionPotential\":\"14\",\"OrganizationCodes\":\"LL/LC00\",\"Relocation\":\"False\",\"HiringPath\":[\"public\"],\"MCOTags\":[],\"AgencyMarketingStatement\":\"The
        Library of Congress serves the Congress in fulfilling its duties and preserves
        and promotes knowledge and creativity for the benefit of the American people.
        It is the nation's oldest federal cultural institution and the world's largest
        library, with more than 158 million items in its physical collections (including
        books, manuscripts, prints, photos, film, video, and sound recordings) and
        over 37 million items online. Located primarily on Capitol Hill in Washington,
        D.C., the Library is the home of the U.S. Copyright Office, the Congressional
        Research Service (CRS), the Law Library of Congress, and the National Library
        Service for the Blind and Print Disabled.\",\"TravelCode\":\"-1\",\"ApplyOnlineUrl\":\"https://jobs.monstergovt.com/loc/ros/rosDashboard.hms?O=1&J=27694\",\"DetailStatusUrl\":\"https://jobs.monstergovt.com/loc/ros/rosDashboard.hms?O=1&J=27694&S=1\",\"MajorDuties\":[\"This
        is an interdisciplinary position (0854 Engineer (Computers), 0855 Engineer
        (Electronics)). The person selected for this position will be placed on the
        position description that corresponds with their qualifications. The position
        serves as a member of the Channel Design and Deployment (CDD) section of the
        Program Delivery Division (PDD) of the National Library Service for Blind
        and Print Disabled (NLS) and works under the technical and administrative
        supervision of the Head of the CDD section. The position provides engineering
        support for current National Library Services for Blind and Print Disabled
        (NLS) braille and talking book programs. The position also provides engineering
        analysis for special projects, future projects, and planning of new systems
        and capabilities to support delivery of the braille and talking book programs.
        Participates in inter-disciplinary product engineering design, development,
        and integration activities in a broad scope of technologies. Integrates prototype
        and proof-of-concept products with other NLS program systems in a development
        environment for analysis of the performance and impact on existing system.
        Analyzes requirements, develops strategies, and implements actions involving
        highly complex technical problems. Designs development of software, APIs,
        and computer systems in support of products used for delivery of the NLS braille
        and audio book programs. Creates systems diagrams, and writes, modifies and
        debugs source code for applications software/computer products. Applies the
        latest technology available to the Library to create products for reading,
        searching, and browsing the NLS collection of audio and braille books. Follows
        project guidelines and strategies that require innovation and leading-edge
        technology. Document unknown conditions, resolves critical problems, or develops
        new algorithms. Provides technical, administrative, and project management
        leadership in research and development activities in the specialized area
        of accessible technology and systems for delivery of the NLS braille and talking
        book programs. Serves as the SME in product design, which incorporates state
        of the art technologies, components, and techniques for embedded systems,
        mobile computing systems, and other consumer electronic systems capable of
        digital media playback, search and discovery, storage, and streaming via the
        internet. Provides guidance and technical advice to program stakeholders,
        specialists within NLS, and partners throughout the cooperating network of
        libraries in the use and operation of products for delivery of the braille
        and talking book programs to patrons. Resolves technical difficulties that
        can be overcome by changes in development methodology criteria, or requirements
        in areas such as software design, API integration or business analysis. Maintains
        technical insight into the cause and solution when damaged, failed, or otherwise
        nonconforming products, services, or systems are encountered. Develops requirements,
        technical evaluations, and recommendations to management for engineering change
        orders to improve NLS products and services. Serves as an engineering technical
        specialist in the test, verification, and validation of software that may
        be utilized in embedded systems or computer equipment. Implements the product
        development project strategy. Performs product design and development. Serves
        on project teams. Consults with other Library of Congress organizations for
        compatibility with existing systems and policies. Serves as product engineer
        and technical SME. Ensures that all essential actions for successful product
        development are identified, planned and accomplished. Recognized as an authority
        in product engineering for development of integrated computer systems involving
        commercially available mobile platforms, embedded systems, edge-computing
        systems, and cloud-based systems. Works with and participates in meetings
        with other functional managers and SMEs to identify requirements, write and
        review specifications, creates systems diagrams and identify costs for product
        development. Develops, modifies, monitors and evaluates project plans. Contributes
        to the overall engineering efforts of product development teams. Performs
        Product Owner and Product Engineer roles as a product moves through the life
        cycle. Provides expert technical advice and direction to contractor professionals
        on product development issues and requirements. Directs contractors in development
        of software, APIs, and computer systems in support of products used for delivery
        of the NLS braille and audio book programs. Participates as necessary in the
        evaluation and selection process of proposals submitted in response to contract
        solicitations.\"],\"Education\":\"A. Degree: Engineering. To be acceptable,
