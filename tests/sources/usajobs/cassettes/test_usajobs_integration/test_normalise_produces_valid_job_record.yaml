        https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/0800/files/all-professional-engineering-positions-0800.pdf
        in conjunction with https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/#url=GS-PROF.
        BASIC REQUIREMENTS A. Degree: Engineering. To be acceptable, the program must:
        (1) lead to a bachelor's degree in a school of engineering with at least one
        program accredited by ABET; or (2) include differential and integral calculus
        and courses (more advanced than first-year physics and chemistry) in five
        of the following seven areas of engineering science or physics: (a) statics,
        dynamics; (b) strength of materials (stress-strain relationships); (c) fluid
        mechanics, hydraulics; (d) thermodynamics; (e) electrical fields and circuits;
        (f) nature and properties of materials (relating particle and aggregate structure
        to properties); and (g) any other comparable area of fundamental engineering
        science or physics, such as optics, heat transfer, soil mechanics, or electronics.
        OR B. Combination of education and experience -- college-level education,
        training, and/or technical experience that furnished (1) a thorough knowledge
        of the physical and mathematical sciences underlying engineering, and (2)
        a good understanding, both theoretical and practical, of the engineering sciences
        and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        1. Professional registration or licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT)1, or licensure as a Professional Engineer
        (PE) by any State, the District of Columbia, Guam, or Puerto Rico. Absent
        other means of qualifying under this standard, those applicants who achieved
        such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. 2. Written Test -- Evidence of having successfully
        passed the Fundamentals of Engineering (FE)2 examination or any other written
        test required for professional registration by an engineering licensure board
        in the various States, the District of Columbia, Guam, and Puerto Rico. 3.
        Specified academic courses -- Successful completion of at least 60 semester
        hours of courses in the physical, mathematical, and engineering sciences and
        that included the courses specified in the basic requirements under paragraph
        A. The courses must be fully acceptable toward meeting the requirements of
        an engineering program as described in paragraph A. 4. Related curriculum
        -- Successful completion of a curriculum leading to a bachelor's degree in
        an appropriate scientific field, e.g., engineering technology, physics, chemistry,
        architecture, computer science, mathematics, hydrology, or geology, may be
        accepted in lieu of a bachelor's degree in engineering, provided the applicant
        has had at least 1 year of professional engineering experience acquired under
        professional engineering supervision and guidance. Ordinarily there should
        be either an established plan of intensive training to develop professional
        engineering competence, or several years of prior professional engineering-type
        experience, e.g., in interdisciplinary positions. (The above examples of related
        curricula are not all-inclusive). TO QUALIFY AT THE FV-G (FG/GS 5/7/9) LEVEL:
        You must meet the Basic Requirements as stated above. TO QUALIFY AT THE FV-H
        (FG/GS 11-12) LEVEL: In addition to the above Basic Requirements, you must
        demonstrate in your application that you possess one (1) year of Specialized
        Experience equivalent to FV-G (FG/GS 5/7/9) level. Specialized Experience*
        may include but is not limited to: providing operations and maintenance support
        of NAS communications, navigation and surveillance equipment that involves
        the modification and modernization of hardware/firmware/software systems;
        analyzing operational readiness and/or supportability of new systems for deployment.
        OR Education Substitution: 3 years of progressively higher-level graduate
        education leading to a Ph.D. degree or Ph.D. or equivalent doctoral degree,
        gained from an accredited college or university. The education should provide
        the knowledge and skills required to do the work of the position. OR Combination
        of education and experience may be qualifying for this position. TO QUALIFY
        AT THE FV-I (FG/GS-13) LEVEL: In addition to the above Basic Requirements,
        you must demonstrate in your application that you possess at least one year
        of Specialized Experience equivalent to the FV-H (FG/GS 11-12) level. Specialized
        Experience* may include but not limited to: performing studies to determine
        data reduction hardware requirements for new system; develop, design, test,
        evaluate, and install data reduction and conversion equipment & systems; software
        management, NAS systems (e.g. ERAM, STARS, ATOP, ASDE-X) and designing interface
        methods between peripheral equipment & computers used in data management systems.
        TO QUALIFY AT THE FV-J (FG/GS-14) LEVEL: In addition to the above Basic Requirements,
        you must demonstrate in your application that you possess at least one year
        of Specialized Experience equivalent to the FV-I (FG/GS-13) level. Specialized
        Experience* may include but not limited to: experience in the evaluation of
        certification applicants' software and electronic hardware design work; leading
        hardware/software upgrade projects; experience as a technical advisor and
        consultant on digital hardware control techniques and data processing systems,
        providing authoritative advice on topics such as computer capacity and capability,
        mathematical and programming techniques and system effectiveness. TO QUALIFY
        AT THE FV-K (FG/GS-15) LEVEL: In addition to the above Basic Requirements,
        you must demonstrate in your application that you possess at least one year
        of Specialized Experience equivalent to the FV-J (FG/GS-14) level. Specialized
        Experience* may include but not limited to: experience as a consultant and
        expert in electronic information systems and systems engineering processes
        involving integration, testing and quality assurance; leading investigations
        to resolve unusual and controversial problems relating to the interface and
        integration requirements for a broad range of existing and new electronic
        information systems/equipment; and evaluating the feasibility of new technology
        and state-of-the-art equipment for incorporation into existing NAS systems
        & equipment. *Specialized Experience is experience that has equipped you with
        the particular knowledge, skills, and abilities to perform successfully the
        duties of the position, and that are typically in or related to the work of
        the position to be filled. Applicants should include examples of Specialized
        Experience in their work history. Qualifications must be met by the closing
