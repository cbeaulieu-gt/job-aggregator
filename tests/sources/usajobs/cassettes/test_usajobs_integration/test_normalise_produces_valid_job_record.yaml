        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"This
        position is located in the Channel Design & Deployment Section, Program Delivery
        Division, National Library Service Blind/Print Disabled, Library Collections
        and Services Group. The position description numbers for this position are
        446912 and 446914. The salary range indicated reflects the locality pay adjustment
        for the Washington, D.C., Metropolitan area. This is a non-supervisory, bargaining
        unit position.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"13\",\"HighGrade\":\"13\",\"PromotionPotential\":\"14\",\"OrganizationCodes\":\"LL/LC00\",\"Relocation\":\"False\",\"HiringPath\":[\"public\"],\"MCOTags\":[],\"AgencyMarketingStatement\":\"The
        Library of Congress serves the Congress in fulfilling its duties and preserves
        and promotes knowledge and creativity for the benefit of the American people.
        It is the nation's oldest federal cultural institution and the world's largest
        library, with more than 158 million items in its physical collections (including
        books, manuscripts, prints, photos, film, video, and sound recordings) and
        over 37 million items online. Located primarily on Capitol Hill in Washington,
        D.C., the Library is the home of the U.S. Copyright Office, the Congressional
        Research Service (CRS), the Law Library of Congress, and the National Library
        Service for the Blind and Print Disabled.\",\"TravelCode\":\"-1\",\"ApplyOnlineUrl\":\"https://jobs.monstergovt.com/loc/ros/rosDashboard.hms?O=1&J=27694\",\"DetailStatusUrl\":\"https://jobs.monstergovt.com/loc/ros/rosDashboard.hms?O=1&J=27694&S=1\",\"MajorDuties\":[\"This
        is an interdisciplinary position (0854 Engineer (Computers), 0855 Engineer
        (Electronics)). The person selected for this position will be placed on the
        position description that corresponds with their qualifications. The position
        serves as a member of the Channel Design and Deployment (CDD) section of the
        Program Delivery Division (PDD) of the National Library Service for Blind
        and Print Disabled (NLS) and works under the technical and administrative
        supervision of the Head of the CDD section. The position provides engineering
        support for current National Library Services for Blind and Print Disabled
        (NLS) braille and talking book programs. The position also provides engineering
        analysis for special projects, future projects, and planning of new systems
        and capabilities to support delivery of the braille and talking book programs.
        Participates in inter-disciplinary product engineering design, development,
        and integration activities in a broad scope of technologies. Integrates prototype
        and proof-of-concept products with other NLS program systems in a development
        environment for analysis of the performance and impact on existing system.
        Analyzes requirements, develops strategies, and implements actions involving
        highly complex technical problems. Designs development of software, APIs,
        and computer systems in support of products used for delivery of the NLS braille
        and audio book programs. Creates systems diagrams, and writes, modifies and
        debugs source code for applications software/computer products. Applies the
        latest technology available to the Library to create products for reading,
        searching, and browsing the NLS collection of audio and braille books. Follows
        project guidelines and strategies that require innovation and leading-edge
        technology. Document unknown conditions, resolves critical problems, or develops
        new algorithms. Provides technical, administrative, and project management
        leadership in research and development activities in the specialized area
        of accessible technology and systems for delivery of the NLS braille and talking
        book programs. Serves as the SME in product design, which incorporates state
        of the art technologies, components, and techniques for embedded systems,
        mobile computing systems, and other consumer electronic systems capable of
        digital media playback, search and discovery, storage, and streaming via the
        internet. Provides guidance and technical advice to program stakeholders,
        specialists within NLS, and partners throughout the cooperating network of
        libraries in the use and operation of products for delivery of the braille
        and talking book programs to patrons. Resolves technical difficulties that
        can be overcome by changes in development methodology criteria, or requirements
        in areas such as software design, API integration or business analysis. Maintains
        technical insight into the cause and solution when damaged, failed, or otherwise
        nonconforming products, services, or systems are encountered. Develops requirements,
        technical evaluations, and recommendations to management for engineering change
        orders to improve NLS products and services. Serves as an engineering technical
        specialist in the test, verification, and validation of software that may
        be utilized in embedded systems or computer equipment. Implements the product
        development project strategy. Performs product design and development. Serves
        on project teams. Consults with other Library of Congress organizations for
        compatibility with existing systems and policies. Serves as product engineer
        and technical SME. Ensures that all essential actions for successful product
        development are identified, planned and accomplished. Recognized as an authority
        in product engineering for development of integrated computer systems involving
        commercially available mobile platforms, embedded systems, edge-computing
        systems, and cloud-based systems. Works with and participates in meetings
        with other functional managers and SMEs to identify requirements, write and
        review specifications, creates systems diagrams and identify costs for product
        development. Develops, modifies, monitors and evaluates project plans. Contributes
        to the overall engineering efforts of product development teams. Performs
        Product Owner and Product Engineer roles as a product moves through the life
        cycle. Provides expert technical advice and direction to contractor professionals
        on product development issues and requirements. Directs contractors in development
        of software, APIs, and computer systems in support of products used for delivery
        of the NLS braille and audio book programs. Participates as necessary in the
        evaluation and selection process of proposals submitted in response to contract
        solicitations.\"],\"Education\":\"A. Degree: Engineering. To be acceptable,
        the program must: (1) lead to a bachelor's degree in a school of engineering
        with at least one program accredited by ABET; or (2) include differential
        and integral calculus and courses (more advanced than first-year physics and
        chemistry) in five of the following seven areas of engineering science or
        physics: (a) statics, dynamics; (b) strength of materials (stress-strain relationships);
        (c) fluid mechanics, hydraulics; (d) thermodynamics; (e) electrical fields
        and circuits; (f) nature and properties of materials (relating particle and
        aggregate structure to properties); and (g) any other comparable area of fundamental
        engineering science or physics, such as optics, heat transfer, soil mechanics,
        or electronics. OR B. Combination of education and experience -- college-level
        education, training, and/or technical experience that furnished (1) a thorough
        knowledge of the physical and mathematical sciences underlying engineering,
        and (2) a good understanding, both theoretical and practical, of the engineering
        sciences and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        Professional registration or licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT)1, or licensure as a Professional Engineer
        (PE) by any State, the District of Columbia, Guam, or Puerto Rico. Absent
        other means of qualifying under this standard, those applicants who achieved
        such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. Written Test -- Evidence of having successfully passed
        the Fundamentals of Engineering (FE)2 examination or any other written test
        required for professional registration by an engineering licensure board in
        the various States, the District of Columbia, Guam, and Puerto Rico. Specified
        academic courses -- Successful completion of at least 60 semester hours of
        courses in the physical, mathematical, and engineering sciences and that included
        the courses specified in the basic requirements under paragraph A. The courses
        must be fully acceptable toward meeting the requirements of an engineering
        program as described in paragraph A. Related curriculum -- Successful completion
        of a curriculum leading to a bachelor's degree in an appropriate scientific
        field, e.g., engineering technology, physics, chemistry, architecture, computer
        science, mathematics, hydrology, or geology, may be accepted in lieu of a
        bachelor's degree in engineering, provided the applicant has had at least
        1 year of professional engineering experience acquired under professional
        engineering supervision and guidance. Ordinarily there should be either an
        established plan of intensive training to develop professional engineering
        competence, or several years of prior professional engineering-type experience,
        e.g., in interdisciplinary positions. (The above examples of related curricula
        are not all inclusive.) You MUST submit a legible copy of your college/university
        transcripts to your online application. Unofficial transcripts are acceptable
        at the time of application. Official transcripts will be required if selected.
        Failure to submit the required legible documentation at the time of application
        will result in disqualification of your application. Foreign Education \u2013
        Education completed outside the U.S. must be deemed equivalent to conventional/accredited
        U.S. education programs to be acceptable for Federal employment. If your college/university
        is outside the U.S., your transcripts must be accompanied by a report from
        a credential evaluation service that is a member of the National Association
        of Credential Evaluation Services (NACES) or the Association of International
        Credentials Evaluators (AICE). Failure to submit a foreign education evaluation
        report will result in disqualification of your application.\",\"Requirements\":\"Conditions
        of Employment Library of Congress employees are prohibited from using illegal
        drugs, including marijuana. The Library is part of the Federal Government
        and abides by federal law, so regardless of individual state or District of
        Columbia laws, marijuana use is illegal, considered criminal activity, and
        can affect your employment at the Library. In addition, past or current drug
        use and activities (e.g., selling or distributing) may deem you ineligible
        for employment.\",\"Evaluations\":\"The Library of Congress evaluates applicants
        through an applicant questionnaire and a structured interview. Applicants
        may also be screened for some jobs through licensing, certification, and/or
        education requirements, a narrative/application review, and/or a preliminary
        telephone interview. The knowledge, skills, and abilities (KSAs) that are
        marked with a double asterisk (**) in the vacancy announcement and the applicant
        questionnaire are considered the most critical for a position. To be considered
        for final selection, applicants must demonstrate fully acceptable experience
        in these designated KSAs in the narrative/application review, preliminary
        telephone and/or full structured interview. The various assessment tools listed
        above are designed to verify or explore applicants' experience, knowledge,
        and training directly related to the job in order to identify the best qualified
        applicants for selection. You may preview questions for this vacancy.\",\"HowToApply\":\"Please
        carefully follow all instructions under the How to Apply tab to ensure you
        are considered for the position. Please note, there is no page restriction
        to your resume, and you are allowed to upload a resume longer than two pages
        in the resume section within the application process. When the application
        system prompts, please proceed to the agency site to complete your application.
        You are required to apply online for this announcement. We are unable to accept
        mailed or emailed documents. You must complete the entire application process,
        including submission of all documents BEFORE this announcement closes. To
        do so, complete the following steps. Step 1: If you do not already have one,
        create a resume and upload it to your profile in the \\\"Resume\\\" section.
        Although you must enter your Social Security Number for USAJOBS, this information
        will not be provided to the Library of Congress. Step 2: Review the Job Announcement.
        We recommend you go to the end of the Qualification and Evaluation section
        of the job announcement to preview the online questions that you will answer
        in Step 4. You may wish to customize your resume to ensure that it supports
        your responses to these questions. Step 3: Click on the \\\"APPLY ONLINE\\\"
        button to the right of this announcement. Follow USAJOBS' instructions to
        access your account. You will be redirected to the Hiring Management website
        to complete the application process. If this is your first time in Hiring
