        responses to the occupational questionnaire. Step 3: Upload any required documents
        into your USAJOBS account (must be less than 3MB and in one of the following
        document formats: GIF, JPG, JPEG, PNG, RTF, PDF, or Word (DOC or DOCX)). Step
        4: Click \\\"Apply Online\\\" and follow the prompts to complete the occupational
        questionnaire and attach any required documents. Verify that uploaded documents
        from USAJOBS transfer into the agency's hiring system. You will have the opportunity
        to upload any additional required documents in the agency's hiring system.
        Click \u201CFinish\u201D to submit your application. NOTE: You may update
        your application or required documents at any time while the announcement
        is open by logging into your USAJOBS account, clicking on \\\"Application
        Status,\\\" clicking on the position title, clicking \\\"Update Application,\u201D
        and following the prompts. In order to receive consideration for this position,
