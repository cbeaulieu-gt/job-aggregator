        Engineer\",\"PositionURI\":\"https://www.usajobs.gov:443/job/865110700\",\"ApplyURI\":[\"https://www.usajobs.gov:443/job/865110700\"],\"PositionLocationDisplay\":\"Sandy,
        Utah\",\"PositionLocation\":[{\"LocationName\":\"Sandy, Utah\",\"CountryCode\":\"United
        States\",\"CountrySubDivisionCode\":\"Utah\",\"CityName\":\"Sandy, Utah\",\"Longitude\":-111.89498,\"Latitude\":40.56976}],\"OrganizationName\":\"Occupational
        Safety and Health Administration\",\"DepartmentName\":\"Department of Labor\",\"SubAgency\":\"Directorate
        of Technical Support and Emergency Management (DTSEM)\",\"JobCategory\":[{\"Name\":\"Electronics
        Engineering\",\"Code\":\"0855\"}],\"JobGrade\":[{\"Code\":\"GS\"}],\"PositionSchedule\":[{\"Name\":\"\",\"Code\":\"1\"}],\"PositionOfferingType\":[{\"Name\":\"\",\"Code\":\"15317\"}],\"QualificationSummary\":\"THE
        ENGINEER SERIES HAS AN INDIVIDUAL OCCUPATIONAL REQUIREMENT. ALL APPLICANTS
        MUST MEET THIS REQUIREMENT IN ORDER TO BE CONSIDERED. You must meet the \\\"Individual
        Occupational Requirement\\\" and the \\\"Specialized Experience\\\" as described
        below, to qualify for the Electronics Engineer position. INDIVIDUAL OCCUPATIONAL
        REQUIREMENT (IOR): A. Degree: Bachelor's degree (or higher degree) in engineering.
        To be acceptable, the program must: (1) lead to a bachelor's degree (or higher
        degree) in a school of engineering with at least one program accredited by
        the Accreditation Board for Engineering and Technology (ABET); OR (2) include
        differential and integral calculus and courses (more advanced than first-year
        physics and chemistry) in five of the following seven areas of engineering
        science or physics: (a) statics, dynamics; (b) strength of materials (stress-strain
        relationships); (c) fluid mechanics, hydraulics; (d) thermodynamics; (e) electrical
        fields and circuits; (f) nature and properties of materials (relating particle
        and aggregate structure to properties); and (g) any other comparable area
        of fundamental engineering science or physics, such as optics, heat transfer,
        soil mechanics, or electronics. OR B. Combination of Education and Experience:
        College-level education, training, and/or technical experience that furnished
        (1) a thorough knowledge of the physical and mathematical sciences underlying
        engineering, and (2) a good understanding, both theoretical and practical,
        of the engineering sciences and techniques and their applications to one of
        the branches of engineering. The adequacy of such background must be demonstrated
        by one of the following:1. Professional registration or licensure - Current
        registration as an Engineer Intern (EI), Engineer in Training (EIT), or licensure
        as a Professional Engineer (PE) by any State, the District of Columbia, Guam,
        or Puerto Rico. Absent other means of qualifying under this standard, those
        applicants who achieved such registration by means other than written test
        (e.g., State grandfather or eminence provisions) are eligible only for positions
        that are within or closely related to the specialty field of their registration.
        For example, an applicant who attains registration through a State Board's
        eminence provision as a manufacturing engineer typically would be rated eligible
        only for manufacturing engineering positions.2. Written Test - Evidence of
        having successfully passed the Fundamentals of Engineering (FE) examination,
        or any other written test required for professional registration, by an engineering
        licensure board in the various States, the District of Columbia, Guam, or
        Puerto Rico.3. Specified academic courses - Successful completion of at least
        60 semester hours of courses in the physical, mathematical, and engineering
        sciences and that included the courses specified in A above. The courses must
        be fully acceptable toward meeting the requirements of an engineering program.4.
        Related curriculum - Successful completion of a curriculum leading to a bachelor's
        degree in an appropriate scientific field, e.g., engineering technology, physics,
        chemistry, architecture, computer science, mathematics, hydrology, or geology,
        may be accepted in lieu of a degree in engineering, provided the applicant
        has had at least 1 year of professional engineering experience acquired under
        professional engineering supervision and guidance. Ordinarily there should
        be either an established plan of intensive training to develop professional
        engineering competence, or several years of prior professional engineering-type
        experience, e.g., in interdisciplinary positions. In addition to meeting the
        Individual Occupational Requirement (IOR), applicants must meet the following
        specialized experience: Applicants must have 52 weeks of specialized experience
        equivalent to at least the next lower grade level, GS-9 in the Federal Service.
        Specialized Experience is the experience that equipped the applicant with
        the particular knowledge, skills, and abilities (KSA's) to perform the duties
        of the position successfully, and that is typically in or related to the position
        to be filled. To be creditable, specialized experience must have been equivalent
        to at least the next lower grade level. Qualifying specialized experience
        for GS-11 includes: Participating in technical training in the area of calibration
        procedures or other technically related activities. Assisting in the design
        of electronic circuit modifications. Developing, implementing or troubleshooting
        mechanical and/or electronic systems used for calibration. Implementing quality
        control and/or quality assurance programs for the calibration of equipment.\",\"PositionRemuneration\":[{\"MinimumRange\":\"74678\",\"MaximumRange\":\"97087\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
