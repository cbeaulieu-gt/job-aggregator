        to repay a pro rata share amount of the incentive to the government. Additional
        information regarding recruitment incentives for current federal employees
        can be found in DoDI 1400.25, Volume 2006.\"],\"Education\":\"\",\"Requirements\":\"SPECIAL
        INFO: As a condition of employment at NGA, persons being considered for employment
        must meet NGA fitness for employment standards. - U.S. Citizenship - Security
        Clearance - Top Secret /Sensitive Compartmented Information (SCI) - Polygraph
        & Drug Test - Direct Deposit - Trial Period during which we will evaluate
        your fitness and whether your continued employment advances the public interest.
        We may consider: performance conduct; needs and interests of the agency; and
        whether your continued employment would advance organizational goals of the
        agency or the Government and the efficiency of the Federal service SPECIAL
        REQUIREMENTS: You must be able to obtain and retain a Top Secret security
        clearance with access to SCI. In addition, you are subject to a Counterintelligence
        Polygraph examination in order to maintain access to Top Secret information.
        All employees are subject to a periodic examination on a random basis in order
        to determine continued eligibility. Refusal to take the examination may result
        in denial of access to Top Secret information, SAP, or unescorted access to
        SCIFs. Employees with SCI access and who are under NGA cognizance are required
        to submit a Security Financial Disclosure Report, SF-714, on an annual basis
        in order to determine continued eligibility. Failure to comply may negatively
        impact continued access to Top Secret information, Information Systems, SAP,
        or unescorted access to SCIFs. NGA utilizes all processes and procedures of
        the Defense Civilian Intelligence Personnel System (DCIPS). Non-executive
        NGA employees are assigned to five distinct pay bands based on the type and
        scope of work performed. The employee's base salary is established within
        their assigned pay band based on their unique qualifications. A performance
        pay process is conducted each year to determine a potential base pay salary
        increase and/or bonus. An employee's annual performance evaluation is a key
        factor in the performance pay process. This position is a DCIPS position in
        the Excepted Service under 10 U.S.C. 1601. DoD Components with DCIPS positions
        apply Veterans' Preference to preference eligible candidates as defined by
        Section 2108 of Title 5 USC, in accordance with the procedures provided in
        DoD Instruction 1400.25, Volume 2005, DCIPS Employment and Placement. If you
        are an external applicant claiming veterans' preference, as defined by Section
        2108 of Title 5 U.S.C., you must self-identify your eligibility.\",\"Evaluations\":\"Applicants
        are not required to submit a cover letter for employment consideration with
        the National Geospatial-Intelligence Agency. However, a cover letter is recommended.
        Applicants will have the option to attach a cover letter in the Qualifications
        - Attachments step of the online application. APPLICANT EVALUATION PROCESS:
        1) All applicants will be evaluated using the Mandatory Qualification Criteria,
        2) Qualified applicants will then be evaluated by an expert or panel of experts
        using a combination of qualification criteria to determine the best-qualified
        candidates, 3) Best-qualified applicants may then be further evaluated through
        an interview process. Military retiree applicants, if selected, may be impacted
