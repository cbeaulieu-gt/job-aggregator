        progresses, the assignments will become more difficult and complex with less
        supervision.\"],\"Education\":\"Any applicant falsely claiming an academic
        degree from an accredited school will be subject to actions ranging from disqualification
        from federal employment to removal from federal service. If your education
        was completed at a foreign college or university, you must show comparability
        to education received in accredited educational institutions in the United
        States and comparability to applicable minimum coursework requirements for
        this position. Click Evaluation of Foreign Education for more information.\",\"Requirements\":\"\",\"Evaluations\":\"Your
        evaluation will be based on how well you meet the qualifications outlined
        in this vacancy announcement, as demonstrated through your resume and supporting
        documentation. Click Application of Veterans Preference for more information.
        You may preview application questions for this vacancy here: https://apply.usastaffing.gov/ViewQuestionnaire/12936198
        Click here for Evaluation details. If you meet the minimum qualifications,
        you will be evaluated against the evaluation factors below and will be placed
        into a category based on your vacancy question responses. Category A - Meets
        the basic qualification requirements for the vacancy and has successful experience
        in the same or similar job that has demonstrated superior proficiency in applying
        critical competencies required by this position to work of increased levels
        of difficulty and complexity. Category B - Meets the basic qualification requirements
        for the vacancy and demonstrates satisfactory proficiency in the critical
        competencies required by this position. Category C - Meets the specialized
        experience described in the minimum qualification requirements section of
        this announcement and demonstrates proficiency in the basic competencies.
        Click here for Evaluation details. USA Hire You will be assessed on the following
        competencies (knowledge, skills, abilities, and other characteristics): Technical
        Competence Written Communication Oral Communication Problem Solving Technology
        Application Evaluation Factors (Competencies) - All qualified applicants will
        be evaluated on the following key competencies: Technical Competence Written
        Communication Oral Communication Problem Solving Technology Application The
        information you provide may be verified by a review of your paid, unpaid,
        volunteer, as it demonstrates the competencies or skills required for the
        position to be filled. Your evaluation may include an interview, reference
        checks, or other assessment conducted by HR specialists, subject matter experts,
        or panel members and may include other assessment tools (ex. interview, structured
        interview, written test, work sample, etc.). INFORMATION FOR ICTAP/CTAP ELIGIBLE(S)
        ONLY: If you are eligible for special priority selection under ICTAP/CTAP,
        you must be well-qualified for the position to receive consideration. ICTAP/CTAP
        eligible(s) who are Category B or higher will be considered well-qualified.
        Be sure to review the eligibility questions to reflect that you are applying
        as an ICTAP or CTAP eligible and submit supporting documentation. When Occupational
        Safety and Health Administration completes its hiring, the remaining list
        of qualified candidates may be shared with additional federal agencies. You
        will have an opportunity to opt-in if you would like your name, application
        material, and assessment results shared to be considered for employment with
        additional agencies. There is no guarantee of further consideration, and you
        can continue to explore other job opportunity announcements.\",\"HowToApply\":\"Persons
        who are deaf, hard of hearing, blind, or have speech disabilities, please
        dial 711 to access telecommunications relay services. To apply for this position,
        you must complete the initial online application, including submission of
        the required documentation specified in the Required Documents section. Your
        application and ALL required supplemental documents MUST be received by 11:59
        pm Eastern Time on the vacancy closing date to receive consideration. Important
        - Save your information before the 30-minute system timeout! For help, go
        to the USAJOBS Help Center. STEP 1 - Create USAJOBS Account on www.usajobs.gov,
        including Resume and Saved Documents. For each employment period, include
        start/end month & year and note full-time or part-time (if part-time, include
        # of hours worked per week) otherwise, your application may be considered
        incomplete. NOTE: In alignment with the Presidential Memorandum titled Merit
        Hiring Plan, dated May 29, 2025, applicants may only submit a resume limited
        to two (2) pages. Only the re\u0301sume\u0301 uploaded under the 'Resume\\\"
        document type in USAJOBS will be reviewed. If the resume submitted exceeds
        two (2) pages, the application will be deemed ineligible for further consideration.
        STEP 2 - Complete the 1st part of the application process (USAJOBS). Once
        you have identified a job on USAJOBS that you wish to apply for, click on
        the job title and then click the Apply button. For questions about the vacancy,
        contact the Agency Contact at the bottom of the announcement. Proceed through
        the steps noted at the top of the USAJOBS page. You will be able to select
        a resume and documents from your USAJOBS Account that you can submit as a
        package as part of your DOL application. In the final step, once you have
        certified your application, click the Continue to agency site button. STEP
        3 - Complete the 2nd part of the application process (DOL). On the Department
        of Labor (DOL) page, create a DOL Account if you have not already and click
        Apply to this vacancy. Continue through the progress steps at the top of the
        DOL page. The 2nd progress step is where you answer the vacancy-specific questions.
        The 3rd progress step Documents is where you submit the required documents
        (only if applicable to you) specified in the Required Documents section of
        this vacancy. STEP 4 - On the Review and Submit step, verify each section
        of your application is complete and correct. In order to submit your application,
        you must have a check mark next to each section listed. If there is an X,
        return to the appropriate section and follow the prompts. When it is ready
        for submission, certify your application and click the Submit Application
        button. STEP 5 - Edit Application as needed by 11:59 pm Eastern Time of Closing
        Date by returning to USAJOBS, clicking the vacancy, then Update Application.
        If you are required to complete any USA Hire Assessments, you will be notified
        after submitting your application. The notification will be provided in your
        application submission screen and via email. The notification will include
        your unique assessment access link to the USA Hire system and the completion
        deadline. Additionally, in USAJOBS you can click \\\"Track this application\\\"
        to return to your assessment completion notice. Access USA Hire using your
        unique assessment link. Access is granted through your USAJOBS login credentials.
        Review all instructions prior to beginning your assessments. You will have
        the opportunity to request a training a testing accommodation before beginning
        the assessments should you have a disability covered under the Rehabilitation
        Act of 1973 as amended. Set aside at least 2 hours to take the USA Hire Assessments;
        however, most applicants complete the assessments in less time. If you need
        to stop the assessments and continue later, you can re-use your unique assessment
        link. Your responses to the USA Hire Assessments will be reused for one year
        (in most cases) from the date you complete an assessment. If future applications
        you submit require completion of the same assessments, your responses will
        be automatically reused. Visit the USA Hire Applicant Resource Center for
        practice assessments and assessment preparation resources at https://support-usahire.opm.gov/hc/en-us.
        To view the announcement status or your application status: Visit https://www.usajobs.gov/Help/howto/application/status/.
        Your application status page is where you can view your application status,
        USA Hire assessment completion status, and review your notifications sent
        by the hiring agency regarding your application. NOTE: It is your responsibility
        to ensure your responses and appropriate documentation is submitted prior
        to the closing date. For more detailed information on applying for positions
        with DOL click here to view the U.S. Department of Labor, How to Apply website.\",\"WhatToExpectNext\":\"Once
        your complete application is received, we will conduct an evaluation of your
        qualifications and refer candidates for selection consideration. Candidates
        will be referred to the hiring manager for further consideration and possible
        interviews. You will be notified of the outcome. A selection is expected to
        be made within 30 calendar days of the issuance date of the certificate. For
        instructions on how to check the status of your application, go to USAJOBS
        Help Guide. USAJOBS will no longer send status alert email notifications.
        You can check your application status in the TAS by logging into USAJOBS and
        in the Applicant Dashboard, click the hiring agency Talent Acquisition System
        (TAS). If the TAS does not provide application tracking information, contact
        the agency's point of contact on the job announcement. To verify that your
        application is complete, log into your USAJOBS account, select the Application
        Status link, and then select the more information link for this position.
        The Application page will display the status of your application, the documentation
        received and processed, and any correspondence the agency has sent related
        to this application. Your uploaded documents may take several hours to clear
        the virus scan process. To return to an incomplete application, log into your
        USAJOBS account and click Update Application in the vacancy announcement.
        You must re-select your resume and/or other documents from your USAJOBS account
        or your application will be incomplete.\",\"RequiredDocuments\":\"The following
        documents must be submitted by 11:59 p.m. (ET) on the vacancy closing date.
        Resumes: Required and applicants must provide a resume either by creating
        one in USAJOBS or uploading one from your profile. To receive full consideration
        for relevant and specialized experience, please list the month, year, and
        number of work hours worked for the experience listed on your resume. We also
        suggest that you preview the vacancy questions and confirm that your resume
        supports your question responses. Veterans Documents (if applicable): To be
        considered as a 5-point (TP) preference eligible, you must submit a copy of
        your DD214, Certificate of Release or Discharge from Active Duty. Your DD
        214 must show the type of discharge and dates of active duty. To claim 10-point
        (CP/CPS, XP) preference, you must submit a copy of your DD214 and the proof
        of entitlement of this preference, which is normally an official statement,
        dated 1991 or later, from the Department of Veterans Affairs certifying to
        the present existence of the service-connected disability and indicating the
        percentage of your disability. In addition, a Standard Form (SF-15) should
        be included, but is not required. (For active-duty service members expecting
        honorable or general discharge or release within 120 days, click Tentative
        Preference for Active Duty). For more information, go to Feds Hire Vets -
        Veterans Preference. Displaced Employee Placement Documents: Only required
        if requesting priority consideration under CTAP or ICTAP eligibility. Unofficial
        Transcript(s) (in English) - If you are using education as a basis for qualifying
        for this position, you must submit all applicable academic transcripts demonstrating
        that you meet the qualifying educational requirements (ex. BA/BS, MA, JD,
        PhD, etc.). If specific coursework is required to qualify, you must supply
        an unofficial transcript from each academic institution in which the required
        courses were taken in order to receive credit. You may upload your unofficial
        transcript(s) as one document with a maximum size limit of 5 MB. NOTE: The
        OFFICIAL Transcript(s) MUST BE RECEIVED if you are selected, and prior to
        receiving the firm offer with a start date. Cover Letters are not mandatory
        and will not be used to verify experience but may be submitted. Do not upload
        password-protected documents. Applicants selected for employment who are not
        current DOL employees will be required to provide proof of citizenship, and
        the E-Verify system will be used to confirm the employment eligibility of
        all new hires. As a condition of employment for accepting this position, you
        may be required to serve a 1 year probationary period during which we will
        evaluate your fitness and whether your continued employment advances the public
        interest. In determining if your employment advances the public interest,
        we may consider: - your performance and conduct; - the needs and interests
        of the agency; - whether your continued employment would advance organizational
        goals of the agency or the Government; and - whether your continued employment
        would advance the efficiency of the Federal service. Upon completion of your
        1 year probationary period your employment will be terminated unless you receive
        certification, in writing, that your continued employment advances the public
        interest.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.dol.gov/general/jobs/vacancy-information#ben-perm\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"Applicants
        must meet all legal and regulatory requirements. Reference the Required Documents
        section for additional requirements. The mission of the Department of Labor
        (DOL) is to protect the welfare of workers and job seekers, improve working
        conditions, expand high-quality employment opportunities, and assure work-related
        benefits and rights for all workers. Refer to these links for more information:
        GENERAL INFORMATION, REASONABLE ACCOMMODATIONS, ADDITIONAL DOCUMENTATION,
        FORMER FEDERAL EMPLOYEES As a condition of employment, all personnel must
        undergo a background investigation for access to DOL facilities, systems,
        information and/or classified materials before they can enter on duty: BACKGROUND
        INVESTIGATION This position is inside the bargaining unit. If the duty location
        is within the Washington, D.C. metropolitan area, the position will be included
        in the Local 12, AFGE bargaining unit. If the duty location is outside the
        Washington, D.C. metropolitan area, the position will be included in the NCFLL
        bargaining unit. For more information, click Telework Position Information.
        This is not a remote work position. The selectee will report to an assigned
        DOL office location on a regular basis and is eligible for participation in
        telework as determined by management in accordance with DOL policy. Based
        on agency needs, additional positions may be filled using this vacancy. The
        Department of Labor may use certain incentives and hiring flexibilities, currently
        offered by the Federal government to attract highly qualified candidates.
        Click for more information on Pay, Leave, and Workforce Flexibilities. The
        Fair Chance Act (FCA) prohibits Federal agencies from requesting an applicant's
        criminal history information before the agency makes a conditional offer of
        employment. If you believe a DOL employee has violated your rights under the
        FCA, you may file a complaint of the alleged violation following our agency's
        complaint process Guidelines for Reporting Violations of the Fair Chance Act.
        Note: The FCA does not apply to some positions specified under the Act, such
        as law enforcement or national security positions. All Department of Labor
        employees are subject to the provisions of the Drug-Free Workplace Program
        under Executive Order 12564 and Public Law 100-71. Reasonable Accommodation
        (RA) Requests: If you believe you have a disability (i.e., physical or mental),
        covered by the Rehabilitation Act of 1973 as amended that would interfere
