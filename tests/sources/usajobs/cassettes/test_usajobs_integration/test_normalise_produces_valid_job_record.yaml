        findings and results, in writing or orally, for higher level review or publication.\",\"You
        will develop tools, interfacing hardware to software, GUI development using
        high level languages (such as Python, C++, JAVA), or model development using
        languages such as Matlab.\",\"You will work proactively, both independently
        and as a team member, with a diverse group of scientists, engineers, technicians,
        and support personnel, to include military, civilian, and contractor representatives.\",\"You
        will conduct technical analysis and recommendations to project leadership.\"],\"Education\":\"Applicants
        must meet at least one of the following positive education qualifications
        requirements of the Office of Personnel Management (OPM) Qualifications Standards
        Manual: Professional Engineering Series (08XX) - Degree: A professional engineering
        degree from an ABET-accredited college or university; OR a degree with curriculum
        in differential and integral calculus, with additional courses in five of
        the following seven areas of engineering science or physics: (a) statics,
        dynamics; (b) strength of materials (stress-strain relationships); (c) fluid
        mechanics, hydraulics; (d) thermodynamics; (e) electrical fields and circuits;
        (f) nature and properties of materials (relating particle and aggregate structure
        to properties); and (g) any other comparable area of fundamental engineering
        science or physics, such as optics, heat transfer, soil mechanics; or electronics;
        OR Professional Engineering Series (08XX) - Substitution of Education/Experience:
        A combination of education and experience that furnished (1) a thorough knowledge
        of the physical and mathematical sciences underlying professional engineering;
        and (2) a good understanding, both theoretical and practical, of the engineering
        sciences and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        (a) professional registration, (b) evidence of successfully passing the Engineer-in-Training
        (EIT) examination; (c) successful completion of at least 60 semester hours
        of courses in the physical, mathematical, and engineering sciences and in
        engineering that included the courses specified above; or (d) successful completion
        of a curriculum leading to a bachelor's degree in engineering technology or
        in an appropriate professional field, e.g., physics, chemistry, architecture,
        computer science, mathematics, hydrology, or geology, may be accepted in lieu
        of a degree in engineering provided that it included at least 1 year of professional
        engineering experience acquired under professional engineering supervision
        and guidance. (Note to Applicants: Please see the Qualifications & Education
        sections of this announcement for a link to the Office of Personnel Management
        (OPM) Individual Occupational Requirements. OPM guidance indicates that there
        should be either an established plan of intensive training to develop professional
        engineering competence, or several years of prior professional engineering-type
        experience. This training plan or experience must be well documented and provided
        at time of application.); OR 1301-General Physical Science Series: A degree
        in physical science, engineering, or mathematics that included 24 semester
        hours in physical science and/or related engineering science such as mechanics,
        dynamics, properties of materials, and electronics; or education equivalent
        to one of the majors shown above that included at least 24 semester hours
        in physical science and/or related engineering science, plus appropriate experience
        or additional education; OR 1515-Operations Research Series: A degree in operations
        research; or a related degree that included at least 24 semester hours in
        a combination of operations research, mathematics, probability, statistics,
        mathematical logic, science, or subject-matter courses. At least 3 of these
        24 semester hours must have been in calculus; OR 1520-Mathematics Series:
        A degree in mathematics; or a combination of education and experience - courses
        equivalent to a major in mathematics (including at least 24 semester hours
        in mathematics), plus appropriate experience or additional education. The
        total coursework described above must have included differential and integral
        calculus and, in addition, four advanced mathematics courses requiring calculus
        or equivalent mathematics courses as a prerequisite; OR 1550-Computer Science
        Series: A degree in computer science; or a degree with at least 30 semester
        hours in a combination of mathematics, statistics, and computer science. At
        least 15 of these 30 semester hours must have been in a combination of statistics
        and mathematics that included differential and integral calculus. TO QUALIFY
        FOR ND-3: In lieu of specialized experience, you may qualify with the following
        education or combination of both education and experience: A master's or equivalent
        graduate degree; OR Two full years of progressively higher level graduate
        education leading to a master's or equivalent graduate degree; OR A combination
        of experience and graduate education as described above that equates to one
        year of experience. A transcript must be submitted with your application if
        qualifying using education. See Required Documents for additional information.?\",\"Requirements\":\"\",\"Evaluations\":\"In
        order to qualify for this position, your resume must provide sufficient experience
        and/or education, knowledge, skills, and abilities to perform the duties of
        the specific position for which you are being considered. Resumes are restricted
        to no more than 2 pages. Illegible/unreadable resumes will not be considered.
        Your resume is the key means we have for evaluating your skills, knowledge,
        and abilities as they relate to this position. Therefore, we encourage you
        to be clear and specific when describing your experience. As vacancies occur,
        the Human Resources Office will review your resume to ensure you meet the
        hiring eligibility and qualification requirements listed in this flyer. You
        will be rated based on the information provided in your resume, along with
        your supporting documentation. If selected, you may be required to provide
        additional supporting documentation. If after reviewing your resume and supporting
        documentation, a determination is made that you inflated your qualifications
        and/or experience, you may be found ineligible/not qualified. Please follow
        all instructions carefully. Errors or omissions may affect your rating or
        consideration for employment. All qualification requirements must be met before
        being considered for any vacancies.\",\"HowToApply\":\"Interested Applicants
        must submit resumes/application packages to: DLGR_NSWC_jobinfo@navy.mil. Please
        reference announcement number DE-12937720-26-BM in the subject line of your
        e-mail. Facsimile applications will not be considered. All resumes/applications
        must be received no later than the close date of this flyer. Resumes are restricted
        to no more than 2 pages. Illegible/unreadable resumes will not be considered.
        It is the applicant's responsibility to verify that all information in their
        resume and documents, are received, legible, and accurate. HR will not modify
        answers/documents submitted by an applicant. Failure to submit a complete
        application package will result in an ineligible rating and loss of consideration.\",\"WhatToExpectNext\":\"Qualified
        applicants will be referred to the hiring manager. The selecting official
        may choose to conduct interviews. Our evaluation will be based on the information
        you provide. You should expect that we will verify performance, suitability,
        and security information and take that information into account in making
        employment offers.\",\"RequiredDocuments\":\"A complete resume is required.
        Resumes are restricted to no more than 2 pages. Illegible/unreadable resumes
        will not be considered. Your resume must show relevant experience, job title,
        duties and accomplishments. Your resume must show complete information for
        each job entry to support minimum qualifications. The following information
        should be provided in your resume: employer's name, starting and end dates
        (Mo/Yr), hours per week if experience was less than full time (35-40 hours
        per week), and pay plan, series and grade level (e.g. GS-0201-09) for relevant
        federal experience. TIP: A good way to ensure you include all essential information
        is to use the Resume Builder in USAJOBS to create your resume. Are you claiming
        membership in any professional organizations, or possession of a license,
        certificate or credentials? Check the Conditions of Employment section above
        to see if any are required. If you claim membership, license, certification,
        or credentials, you must submit a copy of said document in your application
        package. Are you using education as a substitute for some or all of the experience
        requirement? Is there a basic education requirement for this position? Check
        the Education section above to see what is allowed and what is required. Any
        claims you make in your resume or assessment questionnaire regarding education
        or degrees MUST be supported by submitting with your application official
        or unofficial transcripts or a list of courses, grades earned, completion
        dates, and quarter and semester hours earned issued from your school. While
        unofficial transcripts are acceptable for initial application, an official
        transcript will ultimately be required if you are selected for the position.
        You may submit a copy your degree(s) if specific coursework does not have
        to be verified. Are you a veteran claiming 5-point veterans' preference or
        claiming sole survivorship preference? You must submit a copy of your latest
        DD-214 Certificate of Release or Discharge from Active Duty (any copy that
        shows all dates of service, as well as character of service [Honorable, General,
        etc.] is acceptable) OR a VA letter that shows dates of service or service
        connected disability AND character of service. If you have more than one DD-214
        for multiple periods of active duty service, submit a copy for each period
        of service. If you were issued a DD-215 to amend aforementioned information
        on the DD-214 you must submit that too. If you are not sure of your preference
        eligibility, visit the Department of Labor's website: Veterans' Preference
        Advisor Are you a disabled veteran or claiming 10-point veterans' preference?
        If you are eligible to claim 10 point veterans preference you must submit
        a DD-214 Certificate of Release or Discharge from Active Duty as described
        above for 5-point preference. You must also provide the applicable supporting
        documentation of your disability (e.g. disability letter from the VA) as described
        on Standard Form-15 (SF-15). http://www.opm.gov/forms/pdf_fill/SF15.pdf. Are
        you an active duty service member? Active Duty Service Members are required
        to submit a statement of service printed on command letterhead and signed
        by the command. The statement of service must provide the branch of service,
        rate/rank, all dates of service, the expected date of discharge and anticipated
        character of service (Honorable, General, etc.). Application documents, including
        supplemental ones, may be shared outside the Human Resources Office. Supplemental
        documents may contain your SSN, DOB, or personal information of others (e.g.,
        on military orders, marriage certificates). You may redact this information
        before submitting; however, if selected, you must provide unredacted originals.\",\"Benefits\":\"\",\"BenefitsUrl\":\"http://www.secnav.navy.mil/donhr/Benefits/Pages/Default.aspx\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"This
        position is part of the Warfare Centers Personnel Demonstration Project. The
        ND-3 pay band encompasses positions equivalent to GS-9 through GS-11; the
        ND-4 pay band encompasses positions equivalent to GS-12 and GS-13. This announcement
        uses the Naval Sea Systems Command (NAVSEA) Science and Technology Reinvention
        Laboratory (STRL) Direct Hire Authority for Scientists and Engineers with
        Bachelor's or Advanced Degrees to recruit and appoint qualified candidates
        to positions in the competitive service. This position is covered by the Department
        of Defense Priority Placement Program. Several vacancies may be filled. A
        tentative offer of employment will be rescinded if the selectee fails to meet
        the pre-employment requirements, including failure to report to any of the
        scheduled appointments. Federal annuitant information: The selection of an
        annuitant is subject to the Department of Defense and Department of the Navy
        policy on the employment of annuitants. Policy information may be found at:
        http://www.secnav.navy.mil/donhr/Documents/CivilianJobs/FedCivAnnuitants.pdf.
        Veteran's preference does not apply when selecting individuals under this
        specific hiring authority. However, if you claim veteran's preference, you
        will be required to submit supporting documentation with your application
        as described in the Required Documents section below. Vacancies filled from
        this announcement may be filled at any grade level listed. If selected below
        the full performance level, you may be noncompetitively promoted to the next
        higher grade level after meeting all regulatory requirements, and upon the
        recommendation of management. Promotion is neither implied nor guaranteed.\",\"KeyRequirements\":[],\"WithinArea\":\"False\",\"CommuteDistance\":\"0\",\"ServiceType\":\"01\",\"AnnouncementClosingType\":\"01\",\"AgencyContactEmail\":\"Dlgr_nswc_jobinfo@navy.mil\",\"AgencyContactPhone\":\"(540)
