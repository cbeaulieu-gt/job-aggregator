        a credential evaluation service that is a member of the National Association
        of Credential Evaluation Services (NACES) or the Association of International
        Credentials Evaluators (AICE). Failure to submit a foreign education evaluation
        report will result in disqualification of your application.\",\"Requirements\":\"Conditions
        of Employment Library of Congress employees are prohibited from using illegal
        drugs, including marijuana. The Library is part of the Federal Government
        and abides by federal law, so regardless of individual state or District of
        Columbia laws, marijuana use is illegal, considered criminal activity, and
        can affect your employment at the Library. In addition, past or current drug
        use and activities (e.g., selling or distributing) may deem you ineligible
        for employment.\",\"Evaluations\":\"The Library of Congress evaluates applicants
        through an applicant questionnaire and a structured interview. Applicants
        may also be screened for some jobs through licensing, certification, and/or
        education requirements, a narrative/application review, and/or a preliminary
        telephone interview. The knowledge, skills, and abilities (KSAs) that are
        marked with a double asterisk (**) in the vacancy announcement and the applicant
        questionnaire are considered the most critical for a position. To be considered
        for final selection, applicants must demonstrate fully acceptable experience
        in these designated KSAs in the narrative/application review, preliminary
        telephone and/or full structured interview. The various assessment tools listed
        above are designed to verify or explore applicants' experience, knowledge,
        and training directly related to the job in order to identify the best qualified
        applicants for selection. You may preview questions for this vacancy.\",\"HowToApply\":\"Please
        carefully follow all instructions under the How to Apply tab to ensure you
        are considered for the position. Please note, there is no page restriction
        to your resume, and you are allowed to upload a resume longer than two pages
        in the resume section within the application process. When the application
        system prompts, please proceed to the agency site to complete your application.
        You are required to apply online for this announcement. We are unable to accept
