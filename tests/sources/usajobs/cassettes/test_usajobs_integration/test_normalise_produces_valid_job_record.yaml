        your eligibility, qualifications, and quality ranking (as applicable) for
        this position. If you are determined to be ineligible or not qualified, your
        application will receive no further consideration.\",\"RequiredDocuments\":\"The
        documents you are required to submit vary based on whether or not you are
        eligible for preference in federal employment. A complete description of preference
        categories and the associated required documents is in the Applicant Checklist
        for Public Announcements. As described above, your complete application includes
        your resume, your responses to the online questionnaire, and documents which
