        USING EDUCATION TO QUALIFY: If position has a positive degree requirement
        or education forms the basis for qualifications, you MUST submit transcripts
        with the application. Official transcripts are not required at the time of
        application; however, if position has a positive degree requirement, qualifying
        based on education alone or in combination with experience, transcripts must
        be verified prior to appointment. An accrediting institution recognized by
        the U.S. Department of Education must accredit education. Click here to check
        accreditation. FOREIGN EDUCATION: Education completed in foreign colleges
        or universities may be used to meet the requirements. You must show proof
        the education credentials have been deemed to be at least equivalent to that
        gained in conventional U.S. education program. It is your responsibility to
        provide such evidence when applying.\",\"Requirements\":\"\",\"Evaluations\":\"Your
        application package (resume, supporting documents, and responses to the questionnaire)
        will be used to determine your eligibility, qualifications, and quality ranking
        for this position. Please follow all instructions carefully. Errors or omissions
        may affect your rating or consideration for employment. BASIS OF RATING: Your
        application will be rated under the Cut Point procedures based on the extent
        to which the quality, depth, and complexity of your experience and education
        relate to the qualification requirements. Additional points are not added
        for Veteran's Preference; however, Veteran's Preference is considered where
        applicable. Best Qualified Group: Candidates in this category possess exceptional
        skills and experience to exceed well above the minimum requirements. Fully
        Qualified Group: Candidates in this category possess good skills and experience
        above the minimum requirements. Basically Qualified Group: Candidates in this
        category meet the minimum education and/or experience requirements. The resume/documents
        you submit must support your responses to the online questionnaire. If your
        application contradicts or does not support your questionnaire responses,
        you will receive a rating of \\\"not qualified\\\" or \\\"insufficient information\\\"
        and you will not receive further consideration for this job. For additional
        information on what to include in your resume, click here. Applicants who
        meet the requirements for and apply as a non-competitive eligible that meet
        minimal qualifications and other requirements of this position, will be given
        consideration as a non-competitive candidate and will be referred unless blocked
        by an individual with priority/preference. APPRAISALS/AWARDS: Hiring Managers
        use objective methods and consider previous performance appraisals and awards
        in the selection process. Current Federal Civilian employees should list any
        relevant performance related rating and/or awards in your resume. Applicants
        who disqualify themselves will not be evaluated further.\",\"HowToApply\":\"The
        complete Application Package must be submitted by 11:59 PM (ET) on 09/30/2026
        To preview the Application Questionnaire, please click the following link:
        https://apply.usastaffing.gov/ViewQuestionnaire/12800575 To begin the process,
        click the Apply Online button to create an account or log in to your existing
        USAJOBS account. Follow the prompts to complete the application questionnaire.
        Please ensure you click the Submit My Application button at the end of the
        process. To apply for this position, you must provide a complete Application
        Package which includes: 1. Your Resume. If you submit more than one resume,
        only the most recent will be reviewed. The \\\"most recent\\\" is considered
        the resume with the latest timestamp. Resumes may not exceed two pages. The
        two-page resume ensures the most relevant experience is reviewed and considered,
        which is a common practice in both the public and private sectors. Resumes
        exceeding two pages will be removed from consideration. Additional information
        on how to complete or update your resume may be located here. For qualification
        determination your resume must contain hours worked per week and dates of
        employment (i.e., month/year to month/year or month/year to present). If your
        resume does not contain this information, your application may be marked as
        insufficient, and you will not receive consideration for this position. If
        you are a current Federal employee or previous Federal employee, provide your
        pay plan, series, and grade, i.e. GS-0301-09. Current Federal Civilian Employees
        may list any relevant performance related rating (given within the last three
        years) and/or incentive awards in your resume. Do NOT include photographs,
        inappropriate material, inappropriate content, nor personal information such
        as age, gender, religion, social security number, etc., on your resume. If
        the resume you submit contains such information you will not be considered
        for this vacancy. Your name, first and last, MUST be included on your resume.
        2. A complete Application Questionnaire 3. Additional Required Documents (see
        Required Documents section). Ensure all submitted documents contain your full
        name. 4. Help recruiters find you. Make your resume and profile searchable,
        which means recruiters may contact you about possible jobs. Additional information
        may be located here. PLEASE NOTE: It is the applicant's responsibility to
        verify that information entered and/or uploaded, (i.e., resume) is received,
        accurate, and submitted by the closing date. You may verify your documents
        have been processed with your application package successfully. You can access
        your USAJOBS account to do so by clicking here. Uploaded documents may take
        up to one hour to clear the virus scan. Human Resources WILL NOT modify or
        change any answers submitted by an applicant.\",\"WhatToExpectNext\":\"Once
        your application package is received an acknowledgement email will be sent.
        If you provided an email address, you will receive an email message acknowledging
        receipt of your application. Your application package will be used to determine
        your eligibility and qualifications for consideration. If you are determined
        to be ineligible or not qualified, your application will receive no further
        consideration. To check the status of your application or return to a previous
        or incomplete application, log into your USAJOBS account, select My Applications,
        and click on the more information link under the application status for this
        position. If you do not provide an email address, you are responsible for
        checking status updates and notifications in USAJOBS. Hard copy notifications
        will not be sent to you.\",\"RequiredDocuments\":\"The following documents
        are required and must be provided with your application. Applicants who do
        not submit required documentation to determine eligibility and qualifications
        will be eliminated from consideration. Other documents may be required based
        on the eligibility/eligibilities you are claiming. Click here to view the
        AF Civilian Employment Eligibility Guide and the required documents you must
        submit to substantiate the eligibilities you are claiming. Online Application:
        Questionnaire Resume: Your resume may NOT exceed two pages, and the font size
        should not be smaller than 10 pts. You will not be considered for this vacancy
        if your resume is illegible/unreadable. Additional information on resume requirements
        can be located under \\\"How To Apply\\\". Transcripts/Registration/License:
        If qualifying on education/position requires education, you must submit copies
        of your transcripts and if required for the position, submit an active, current
        registration/license. Veterans: If claiming VEOA, VRA or 30% Disabled Veteran
        - Submit VOW certification memo or copy of the official DD Form 214, which
        must include the character of service (i.e., with an honorable or general
        discharge). This will be annotated in block 24 on member copy 2, 4, or 7 of
        the DD Form 214. If claiming 30% Disabled Veteran, you must also submit a
        VA Letter or a disability determination from a branch of the Armed Forces.
        NOTE: All veterans claiming 10-point preference must also submit a SF-15 form.
        ACTIVE DUTY SERVICE MEMBERS: The VOW Act requires federal agencies to treat
        an eligible active duty service member as a veteran, disabled veteran, and
        preference eligible (as applicable) when applying for civil service positions
        before the effective release or discharge date. Appointment of military members
        before the release or discharge date is permissible if the member is on terminal
        leave. At the time the active duty member applies for a civil position, he
        or she must submit a \\\"certification\\\" memo in lieu of a DD Form 214,
        Certificate of Release or Discharge from Active Duty. Active duty members
        applying for a civil service position without submitting a valid certification
        memo or DD Form 214 with their application will render the member ineligible
        for the position. The certification memo must originate from the member's
        military service branch on official letterhead and contain the following:
        Name/Rank/Grade of Service Member Branch of Armed Forces Dates of Active Service
        (Start and End Date(s) Expected Date of Discharge/Release from Active Duty
        Terminal leave start date (if applicable) Expected character of service (honorable
        or general) and type of separation (i.e. separation or retirement) Must be
        certified within 120 days of anticipated discharge Signature by, or by direction
        of the adjutant, personnel office, unit commander, or higher headquarters
        commander. Note: The VOW Act provides tentative preference. If appointed,
        a DD Form 214 must be submitted upon receipt. OPTIONAL DOCUMENTS: Performance
        Appraisals for Current Federal Civilian Employees - Most recent performance
        appraisals (dated within last 3 years) showing the official rating of record,
        signed by a supervisor, or statement why the performance appraisal is unavailable.
        Awards for Current Federal Civilian employees - List any awards received within
        the last 3 years on the resume. Note: Applicant must not submit award Notification
        of Personnel Actions (SF50s). Interagency Career Transition Assistance Program
        (ICTAP): For information on how to apply as an ICTAP eligible click here.
