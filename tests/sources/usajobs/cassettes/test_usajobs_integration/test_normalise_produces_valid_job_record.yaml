        New Jersey\",\"Longitude\":-74.3099,\"Latitude\":40.0124}],\"OrganizationName\":\"Naval
        Air Systems Command\",\"DepartmentName\":\"Department of the Navy\",\"JobCategory\":[{\"Name\":\"General
        Engineering\",\"Code\":\"0801\"}],\"JobGrade\":[{\"Code\":\"GS\"}],\"PositionSchedule\":[{\"Name\":\"\",\"Code\":\"1\"}],\"PositionOfferingType\":[{\"Name\":\"\",\"Code\":\"15317\"}],\"QualificationSummary\":\"Your
        resume must demonstrate at least one year of specialized experience at or
        equivalent to the GS-12 grade level or pay band in the Federal service or
        equivalent experience in the private or public sector performing duties such
        as: Coordinating and participating as the technical expert in Support Equipment
        (SE) projects. Collaborating with the SE Integrated Product Team (IPT) to
        include Logistics, Engineering, and Program Management on new and in-service
        acquisitions. Providing technical direction to resolve complex systems engineering,
        software development, and cybersecurity challenges, particularly in situations
        requiring innovative solutions for fleet readiness. Evaluating design concepts
        and recommending efforts that have potential for consideration as projects
        that affect SE programs and equipment improvements. Reviewing technical aspects
        of development to ensure designs meet requirements and recommends project
        adjustments or redirection as deemed necessary. Additional qualification information
        can be found from the following Office of Personnel Management website: https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/#url=List-by-Occupational-Series
        AND https://www.opm.gov/policy-data-oversight/classification-qualifications/general-schedule-qualification-standards/0800/files/all-professional-engineering-positions-0800.pdf
        Experience refers to paid and unpaid experience, including volunteer work
        done through National Service programs (e.g., professional, philanthropic,
        religious, spiritual, community, student, social). Volunteer work helps build
        critical competencies, knowledge, and skills and can provide valuable training
        and experience that translates directly to paid employment.\",\"PositionRemuneration\":[{\"MinimumRange\":\"125431\",\"MaximumRange\":\"163062\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
        Year\"}],\"PositionStartDate\":\"2026-04-16T00:00:00.0000\",\"PositionEndDate\":\"2026-04-27T23:59:59.9970\",\"PublicationStartDate\":\"2026-04-16T00:00:00.0000\",\"ApplicationCloseDate\":\"2026-04-27T23:59:59.9970\",\"PositionFormattedDescription\":[{\"Label\":\"Dynamic
        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"You
        will serve as a General Engineer in the SE & ALRE Group, Department of the
        Navy at the Naval Air Warfare Center of NAVAIRWARCENADLKE. Your Primary function
        will be to serve as the Lead E-2 Mission Systems & Software Engineer / CTS
        Project Lead for the E-2C/D Avionics / Next Gen Jammer Support Equipment (SE)
        team under the PEO(T) Division of the SE Department.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"13\",\"HighGrade\":\"13\",\"PromotionPotential\":\"13\",\"OrganizationCodes\":\"DD/NV19\",\"Relocation\":\"False\",\"HiringPath\":[\"fed-transition\",\"disability\",\"fed-internal-search\",\"land\",\"mspouse\",\"special-authorities\",\"vet\"],\"MCOTags\":[\"NatSec\"],\"TotalOpenings\":\"1\",\"AgencyMarketingStatement\":\"The
        Navy and Marine Corps team offers innovative, exciting and meaningful work
        linking military and civilian talents to achieve our mission and safeguard
        our freedoms. Department of the Navy provides competitive salaries, comprehensive
        benefits, and extensive professional development and training. From pipefitters
        to accountants, scientists to engineers, doctors to nurses-the careers and
        opportunities to make a difference are endless. Civilian careers-where purpose
        and patriotism unite!\",\"TravelCode\":\"1\",\"ApplyOnlineUrl\":\"https://apply.usastaffing.gov/Application/Apply\",\"DetailStatusUrl\":\"https://apply.usastaffing.gov/Application/ApplicationStatus\",\"MajorDuties\":[\"You
        will serve as a technical expert for Support Equipment (SE) projects, coordinating
        and participating in concurrent systems engineering and development activities.\",\"You
        will evaluate electrical and software design concepts, recommending engineering
        efforts that have the potential to significantly improve SE programs and equipment.\",\"You
        will review the technical aspects of ongoing development to ensure designs
        meet strict requirements, recommending project adjustments or redirection
        as deemed necessary.\",\"You will provide technical direction to resolve complex
        systems engineering, software development, and cybersecurity challenges, driving
        innovative solutions to enhance fleet readiness.\"],\"Education\":\"Applicants
        must meet the following basic education requirements of the Office of Personnel
        Management (OPM) Qualifications Standards Manual: Successful completion of
        a professional engineering degree. To be acceptable, the program must: (1)
        lead to a bachelor's degree (or higher) in a school of engineering with at
        least one program accredited by the Accreditation Board for Engineering and
        Technology (ABET); or (2) include differential and integral calculus and courses
        (more advanced than first-year physics and chemistry) in five of the following
        seven areas of engineering science or physics: (a) statics, dynamics; (b)
        strength of materials (stress-strain relationships); (c) fluid mechanics,
        hydraulics; (d) thermodynamics; (e) electrical fields and circuits; (f) nature
        and properties of materials (relating particle and aggregate structure to
        properties); and (g) any other comparable area of fundamental engineering
        science or physics, such as optics, heat transfer, soil mechanics, or electronics.
        Such education must demonstrate the knowledge, skills, and abilities necessary
        to do the work of the position. OR Current registration as an Engineer Intern
        (EI), Engineer in Training (EIT), or licensure as a Professional Engineer
        (PE) by any State, the District of Columbia, Guam, or Puerto Rico. Absent
        other means of qualifying under this standard, those applicants who achieved
        such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration For more information
        about EI and EIT registration requirements, please visit the National Society
        of Professional Engineers website at: http://www.nspe.org OR Evidence of having
        successfully passed the Fundamentals of Engineering (FE) examination or any
        other written test required for professional registration by an engineering
        licensure board in the various States, the District of Columbia, Guam, and
        Puerto Rico The FE examination is not administered by the U. S. Office of
        Personnel Management. For more information, please visit: http://www.nspe.org/Licensure/HowtoGetLicensed/index.html.
        OR Successful completion of at least 60 semester hours of courses in the physical,
        mathematical, and engineering sciences and in engineering that included the
        courses specified in the basic requirements under paragraph A (above). The
        courses must be fully acceptable toward meeting the requirements of an engineering
        program as described in paragraph A (above) OR Successful completion of a
        curriculum leading to a bachelor's degree in an appropriate scientific field,
        e.g., engineering technology, physics, chemistry, architecture, computer science,
        mathematics, hydrology, or geology, may be accepted in lieu of a bachelor's
        degree in engineering, provided the applicant has had at least one year of
        professional engineering experience acquired under professional engineering
        supervision and guidance. Ordinarily, there should be either an established
        plan of intensive training to develop professional engineering competence,
        or several years of prior professional engineering-type experience, e.g.,
        in interdisciplinary positions.\",\"Requirements\":\"\",\"Evaluations\":\"When
        the application process is complete, we will review your resume to ensure
        you meet the hiring eligibility and qualification requirements listed in this
        announcement. You will be rated based on the information provided in your
        resume and application package, along with your supporting documentation to
        determine your ability to demonstrate the following competencies: Oral Communication
        Problem Solving Systems Testing and Evaluation Engineering Project Management
        Systems Engineering This recruitment will utilize the following technical
        assessment tools: Structured Resume Review and Structured Interview. You should
        list any relevant performance appraisals and incentive awards in your resume
        as that information may be taken into consideration during the selection process.
        If selected, you may be required to provide supporting documentation. Please
        follow all instructions carefully. Errors or omissions may affect your rating
        or consideration for employment. All eligibility, qualifications, and time-in-grade
        requirements must be met by the closing date of this announcement.\",\"HowToApply\":\"Click
        the Apply Online button to create an account or log in to your existing USAJOBS
        account. To apply for this position, you must provide a complete Application
        Package which includes:1. Complete resume with relevant experience, job title,
        duties and accomplishments. Resumes are restricted to no more than 2 pages.
        Illegible/unreadable resumes will not be considered. Your resume must show
        complete information for each job entry to support minimum qualifications.
        The following information should be provided in your resume, but it is acceptable
        to provide elsewhere in your application package: employer's name, starting
        and end dates (Mo/Yr), hours per week if experience was less than full time
        (35-40 hours per week), pay plan, series and grade level (e.g. GS-0201-09)
        for relevant federal experience. TIP: A good way to ensure you include all
        essential information is to use the Resume Builder in USAJOBS to create your
        resume. 2. Supporting documentation Failure to submit a complete application
        package will result in an ineligible rating and loss of consideration. Your
        complete application must be received by 11:59 pm Eastern Standard Time (EST)
        on 04/27/2026. Applications received after 04/27/2026 will generally result
        in an ineligible rating and loss of consideration. If more than one resume
        is received, only the last resume received and processed will be reviewed.
        Note: To check the status of your application or return to a previous or incomplete
        application, log into your USAJOBS account: https://mydon.usajobs.gov/Account/Login
        select Application Status, and click on the more information link under the
        application status for this position. Your uploaded documents may take several
        hours to clear the virus scan process so please plan appropriately. You are
        encouraged to apply online. Applying online will allow you to review and track
        the status of your application.Do not email or send hard copy resumes/applications
        to the Contact Information or Agency Information listed in this vacancy announcement.
        All resumes/applications received at the addresses listed in the Contact Information
        or Agency Information will be destroyed and will not be considered for this
        vacancy announcement.It is the applicant's responsibility to verify that all
        information in their resume and documents are legible and accurate. HR will
        not modify answers/documents submitted by an applicant.\",\"WhatToExpectNext\":\"When
        the application process is complete, your complete application will be reviewed
        to determine if you meet the hiring eligibility and qualification requirements
        for which you requested consideration. You will be rated based on the information
        provided in your resume and technical assessment(s), along with your supporting
        documentation to determine your level of knowledge, skill, and ability related
        to the job requirements. Generally, only best qualified candidates will be
        referred to the hiring manager. Sometimes well qualified and minimally qualified
        candidates are referred. Occasionally, candidates eligible for priority consideration
        are referred, and no other candidates are referred. The hiring manager may
        choose to conduct interviews.You will be notified of our rating and referral
        decision. If you are referred, you will be notified when a hiring decision
        is made.NOTE: If you have any questions or need assistance, please email the
        DON Employment Information Center at DONEIC@us.navy.mil\",\"RequiredDocuments\":\"You
        are required to provide documentation that supports the eligibility and qualification
        claims made in your resume. You must submit the applicable documents listed
        here and those listed with the eligibilities you select in the announcement
        questionnaire with your application package. Applicants who do not provide
        supporting documentation that fully support their claims will not be referred
        to the hiring manager. Cover letter is optional. A complete resume is required.
        Resumes are restricted to no more than 2 pages. Illegible/unreadable resumes
        will not be considered. Your resume must show relevant experience, job title,
        duties and accomplishments. Your resume must show complete information for
        each job entry to support minimum qualifications. The following information
        should be provided in your resume: employer's name, starting and end dates
        (Mo/Yr), hours per week if experience was less than full time (35-40 hours
        per week), pay plan, series and grade level (e.g. GS-0201-09) for relevant
        federal experience. TIP: A good way to ensure you include all essential information
        is to use the Resume Builder in USAJOBS to create your resume. Are you applying
        for a promotion? For GS positions, to be considered for promotion, you must
        provide SF-50(s) that shows that you held the next lower GS grade for at least
        one year. SF-50s that have an effective date within the past year (e.g., General
        Adjustment SF-50 from this year or Within Rate/Grade Increases (WRI/WGI) SF-50
        within a year) do not clearly show that you meet the one-year time-in-grade
        requirement. That means if you submit an SF-50 dated within the last year,
        you must submit another SF-50 dated more than one year ago to clearly demonstrate
        you meet the time-in-grade requirements. If you are a DoD employee, you can
        obtain a copy of your SF- 50(s) from MyBiz. Are you claiming membership in
        any professional organizations, or possession of a license, certificate or
        credentials? Check the Conditions of Employment section above to see if any
        are required. If you claim membership, license, certification, or credentials,
        you must submit a copy of said document in your application package. Are you
        using education as a substitute for some or all of the experience requirement?
        Is there a basic education requirement for this position? Check the Education
        section above to see what is allowed and what is required. Any claims you
        make in your resume regarding education or degrees MUST be supported by submitting
        with your application official or unofficial transcripts or a list of courses,
        grades earned, completion dates, and quarter and semester hours earned issued
        from your school. While unofficial transcripts are acceptable for initial
        application, an official transcript will ultimately be required if you are
        selected for the position. You may submit a copy your degree(s) if specific
        coursework does not have to be verified. Are you a veteran claiming 5-point
        veterans' preference or claiming sole survivorship preference? You must submit
        a copy of your latest DD-214 Certificate of Release or Discharge from Active
        Duty (any copy that shows all dates of service, as well as character of service
        [Honorable, General, etc.] is acceptable) OR a VA letter that shows dates
        of service or service connected disability AND character of service. If you
        have more than one DD-214 for multiple periods of active duty service, submit
        a copy for each period of service. If you were issued a DD-215 to amend aforementioned
        information on the DD-214 you must submit that too. If you are not sure of
        your preference eligibility, visit the Department of Labor's website: Veterans'
        Preference Advisor Are you a disabled veteran or claiming 10-point veterans'
        preference? If you are eligible to claim 10 point veterans preference you
        must submit a DD-214 Certificate of Release or Discharge from Active Duty
        as described above for 5-point preference. You must also provide the applicable
        supporting documentation of your disability (e.g. disability letter from the
        VA) as described on Standard Form-15 (SF-15). http://www.opm.gov/forms/pdf_fill/SF15.pdf.
        Are you an active duty service member? Active Duty Service Members are required
        to submit a statement of service printed on command letterhead and signed
        by the command. The statement of service must provide the branch of service,
        rate/rank, all dates of service, the expected date of discharge and anticipated
        character of service (Honorable, General, etc.). Application documents, including
        supplemental ones, may be shared outside the Human Resources Office. Supplemental
        documents may contain your SSN, DOB, or personal information of others (e.g.,
        on military orders, marriage certificates). You may redact this information
        before submitting; however, if selected, you must provide unredacted originals.\",\"Benefits\":\"\",\"BenefitsUrl\":\"http://www.secnav.navy.mil/donhr/Benefits/Pages/Default.aspx\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"This
        position is covered by the Department of Defense Priority Placement Program.
        Additional vacancies may be filled by this announcement. A tentative offer
        of employment will be rescinded if the selectee fails to meet the pre-employment
        requirements, including failure to report to any of the scheduled appointments.
        During the application process you will have the ability to opt-in to make
        your resume available to hiring managers in the agency who have similar positions
        in the local commuting area. Depending on the hiring organization and the
        position being filled, job requirements (e.g., security clearance, travel,
        drug testing, financial disclosure filing, bargaining unit status, etc.) may
        vary. Other hiring managers filling similar positions may offer relocation
        expense reimbursement and/or may offer recruitment incentives for new employees,
        depending on funding availability and in accordance with policy. If you opt-in
        and are referred on a certificate, your resume will be available to other
        hiring managers for 180-days from the date the job announcement closes. Opting
        in does not impact your application for this announcement, nor does it guarantee
        further consideration for additional positions. Federal annuitant information:
        The selection of an annuitant is subject to the Department of Defense and
        Department of the Navy policy on the employment of annuitants. Policy information
        may be found at: http://www.secnav.navy.mil/donhr/Documents/CivilianJobs/FedCivAnnuitants.pdf
        PPP Applicants: will be placed at the FPL, if determined Well Qualified (WQ).
        To receive priority consideration, the FPL must be the same grade level or
        equivalent of the retained grade or the grade held immediately prior to separation.
        ICTAP Applicants: To be considered well-qualified and exercise selection priority
        as an ICTAP candidate, displaced Federal employees must satisfy all qualification
        requirements for the position and receive a rating in the highly qualified
        category (score 85) or higher. ICTAP candidates must provide copies of all
        of the following documentation at the time of application: 1) agency notice;
        2) most recent performance appraisal; and 3) most recent SF-50 or notification
        of personnel action that includes position, grade level, and duty location.
        Applicants who do not provide this documentation will not receive consideration
        as an ICTAP candidate. For more information about ICTAP eligibility please
        review the following link: https://www.usajobs.gov/Help/working-in-government/unique-hiring-paths/federal-employees/career-transition/
        Military Spouse Preference Applicants: will be placed at the highest grade
        for which they have applied and are determined Best Qualified (BQ). A BQ military
