        Intel\"],\"TotalOpenings\":\"Many\",\"AgencyMarketingStatement\":\"\",\"TravelCode\":\"1\",\"DetailStatusUrl\":\"https://careers.nga.mil/\",\"MajorDuties\":[\"ADDITIONAL
