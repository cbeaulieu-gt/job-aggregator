        requirements are described in the Office of Personnel Management (OPM) Qualification
        Standards for General Schedule Positions, Computer Science Series 1550 and
        Computer Engineer Series 0854. INDIVIDUAL OCCUPATIONAL REQUIREMENT: Basic
        requirement for 0854: You must meet one of the following qualification requirements
        described in Education below in order to qualify for the 0854. All academic
        degrees and course work must be from accredited or pre-accredited institution.
        Basic requirement for 1550: Bachelor's degree in computer science or bachelor's
        degree with 30 semester hours in a combination of mathematics, statistics,
        and computer science. At least 15 of the 30 semester hours must have included
        any combination of statistics and mathematics that included differential and
        integral calculus. All academic degrees and course work must be from accredited
        or pre-accredited institution In addition to meeting the basic requirement
        above, to qualify for this position you must also meet the qualification requirements
        listed below: SPECIALIZED EXPERIENCE: Applicants must have at least 1 year
        (52 weeks) of specialized experience at the next lower broadband NH-02, equivalent
        to the next lower grade GS-11 or equivalent in other pay systems. Specialized
        experience is experience in in the fundamentals and principles of professional
        computer science/computer engineering gained through formal education and
        experience; computer hardware, systems software, and computer systems architecture,
        modeling, and integration; and mathematics, including calculus, probability,
        statistics, discrete structures, as it relates to the design, development,
        and model maintenance of network computer systems. NOTE: Due to the use of
        120-day rosters, this period of experience may be completed within 120 days
        of the closing date of this announcement. IDEAL Candidate: Provide a technical
        authority in the areas of operating system theory, data structures, computer
        system architecture, software engineering and computer communications. Translate
        user requirements to Software features Write and maintain database procedures
        and functions using T-SQL Participate in design meetings and code reviews
        Troubleshoot and fix software bugs Write Formal software documentation Follow
        CMMI (Level 3) processes for software development Design and implement web
        application code including: Design new and modify existing database tables
        and schemas Code User interface (Razor/Blazor, .NET) CSS Stylesheets Client
        scripts Business Logic Web Application Programming Interface (API) Unit testing
        Required Experience & Skills Must be proficient in the following: .Net, JavaScript,
        CSS3, HTML5, C# Must have database experience in SQL Server 2019+, Stored
        Procedures, Table Design Must be able to work independently and within a group
        Must have the ability to communicate clearly and concisely in writing and
        speaking Must have excellent verbal and written communication skills along
        with customer interaction and presentation capability Must have the ability
        to quickly understand the customer's overall technical objectives and missions
        and provide effective solutions. Bachelor's Degree (Computer Science or related
        field) and 8 years of coding experience Desired Experience & Skills Experience
        supporting DoD SQL Server Reporting Services (SSRS) experience Team Foundation
        Server (TFS)/Azure DevOps/Git Cloud experience Master's Degree (Computer Science
        or related field) and 10 years of relevant experience is desired. 12 years
        of related experience may be substituted for the MS degree. KNOWLEDGE, SKILLS
        AND ABILITIES (KSAs): Your qualifications will be evaluated on the basis of
        your level of knowledge, skills, abilities and/or competencies in the following
        areas: Application of the disciplines and science of analysis, design, development,
        implementation, test evaluation and maintenance of computer software and associated
        software products over the system software life cycle. Ability to organize,
        prioritize, analyze, interpret and evaluate technical data, complex requirements
        and prediction of results in the solution of theoretical or practical data
        processing problems. Extensive knowledge of complex data formats, systems
        architecture, data analysis and display concepts and automated computational
        processes and methodology to respond to customer requirements with versatility
        and sound judgment. Ability to recognize and analyze problems, conducts research,
        summarize results, and provide appropriate recommendations and solutions to
        management. Ability to plan and execute complex, multi faced projects and/or
        studies within established time, financial, and/or time constraints to resolve
        software engineering questions. Skill and ability to negotiate complex issues,
        and communicate effectively, both orally and in writing, complex technical
        issues, report and briefing for senior military and civilian officials throughout
        the government and in private industry. Ability to establish and maintain
        relationships with key individuals/ groups inside and outside immediate working
        unit using high degree of tact and diplomacy. PART-TIME OR UNPAID EXPERIENCE:
        Credit will be given for appropriate unpaid and or part-time work. You must
        clearly identify the duties and responsibilities in each position held and
        the total number of hours per week. VOLUNTEER WORK EXPERIENCE: Refers to paid
        and unpaid experience, including volunteer work done through National Service
        Programs (i.e., Peace Corps, AmeriCorps) and other organizations (e.g., professional;
        philanthropic; religious; spiritual; community; student and social). Volunteer
        work helps build critical competencies, knowledge and skills that can provide
        valuable training and experience that translates directly to paid employment.You
        will receive credit for all qualifying experience, including volunteer experience.\",\"PositionRemuneration\":[{\"MinimumRange\":\"89508\",\"MaximumRange\":\"138370\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
