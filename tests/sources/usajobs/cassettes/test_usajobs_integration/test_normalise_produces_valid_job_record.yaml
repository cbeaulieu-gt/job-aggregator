        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"This
        is a Full-Time Faculty Tenure-Track appointment in the Excepted Service, with
        an initial term not-to exceed two years. Reappointments to additional one-
        or two-year terms are possible. If Tenure is achieved (after four to six years),
        employment will be made permanent, provided a satisfactory performance appraisal
        is received annually.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"00\",\"HighGrade\":\"00\",\"PromotionPotential\":\"00\",\"OrganizationCodes\":\"TD/TD13\",\"Relocation\":\"False\",\"HiringPath\":[\"fed-excepted\",\"public\"],\"MCOTags\":[],\"TotalOpenings\":\"3\",\"AgencyMarketingStatement\":\"Mission
        Statement: To educate and graduate leaders of exemplary character who are
        inspired to serve the national security, marine transportation, and economic
        needs of the United States as licensed Merchant Marine Officers and commissioned
        officers in the Armed Forces. The Maritime Administration is the agency within
        the U.S. Department of Transportation dealing with waterborne transportation.
        Its programs promote the use of waterborne transportation and its seamless
        integration with other segments of the transportation system, and the viability
        of the U.S. Merchant Marine. The Maritime Administration works in many areas
        involving ships and shipping, shipbuilding, port operations, vessel operations,
        national security, environment, and safety. The U.S. Department of Transportation
        strives to ensure that equity, transparency, accountability, collaboration,
        and communication permeate all that we do for the betterment of the Department,
        the traveling public, and our nation. As such, DOT values a workforce of persons
        who promote a culture of belonging by respecting the personal dignity and
        worth of each individual and fostering a positive environment where all feel
        safe and welcome. If these commitments coincide with your personal ideals
        and professional aspirations, please consider joining the DOT family. The
        Department of Transportation (DOT) is ranked #6 in the 2023 best places to
        work in the Federal Government!\",\"TravelCode\":\"0\",\"ApplyOnlineUrl\":\"https://jobs.monstergovt.com/dot/ros/rosDashboard.hms?O=2&J=92295\",\"DetailStatusUrl\":\"https://jobs.monstergovt.com/dot/ros/rosDashboard.hms?O=2&J=92295&S=1\",\"MajorDuties\":[\"PLEASE
        NOTE: This announcement establishes an open continuous (12 month) vacancy
        announcement. Given our continuing need for top professionals in this field,
        we will review applications after the first 30 days of the vacancy opening
        for early consideration. Then after, applications will be reviewed on an as
        needed basis. As a Marine Engineer (Assistant/Associate), you will: Be responsible
        for developing and conducting educational courses and programs within the
        Department of Marine Engineering at the U.S. Merchant Marine Academy. Be responsible
        for academic counseling of midshipmen, actively pursue professional development,
        and assuming a share of the departmental and institutional service activities.
        The ideal candidate for this position is highly motivated and experienced
        professional who possesses a Master's Degree and a valid (current) 2nd Assistant
        Engineer's U.S. Coast Guard License, or higher, who is interested in educating
        the next generation of Marine Engineers for the U.S. Maritime Industry.\"],\"Education\":\"MANDATORY
        EDUCATION REQUIREMENTS: A. Degree: Engineering To be acceptable, the program
        must: (1) lead to a bachelor's degree in a school of engineering with at least
        one program accredited by ABET; or (2) include differential and integral calculus
        and courses (more advanced than first-year physics and chemistry) in five
        of the following seven areas of engineering science or physics: (a) statics,
        dynamics; (b) strength of materials (stress-strain relationships); (c) fluid
        mechanics, hydraulics; (d) thermodynamics; (e) electrical fields and circuits;
        (f) nature and properties of materials (relating particle and aggregate structure
        to properties); and (g) any other comparable area of fundamental engineering
        science or physics, such as optics, heat transfer, soil mechanics, or electronics.
        OR Combination of education and experience -- College-level education, training,
        and/or technical experience that furnished (1) a thorough knowledge of the
        physical and mathematical sciences underlying engineering, and (2) a good
        understanding, both theoretical and practical, of the engineering sciences
        and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        1. Professional registration or licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT)1 , or licensure as a Professional
        Engineer (PE) by any State, the District of Columbia, Guam, or Puerto Rico.
        Absent other means of qualifying under this standard, those applicants who
        achieved such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. 2. Written Test -- Evidence of having successfully
        passed the Fundamentals of Engineering (FE) examination or any other written
        test required for professional registration by an engineering licensure board
        in the various States, the District of Columbia, Guam, and Puerto Rico. 3.
        Specified academic courses -- Successful completion of at least 60 semester
        hours of courses in the physical, mathematical, and engineering sciences and
        that included the courses specified in the basic requirements under paragraph
        A. The courses must be fully acceptable toward meeting the requirements of
        an engineering program as described in paragraph A. 4. Related curriculum
        -- Successful completion of a curriculum leading to a bachelor's degree in
        an appropriate scientific field, e.g., engineering technology, physics, chemistry,
        architecture, computer science, mathematics, hydrology, or geology, may be
        accepted in lieu of a bachelor's degree in engineering, provided the applicant
        has had at least 1 year of professional engineering experience acquired under
        professional engineering supervision and guidance. Ordinarily there should
        be either an established plan of intensive training to develop professional
        engineering competence, or several years of prior professional engineering-type
        experience, e.g., in interdisciplinary positions. (The above examples of related
        curricula are not all inclusive). (2) Specialized Experience: To determine
        which grade(s) you are eligible for, review the following grade specific details.
        You will be asked questions as part of your application but make sure to verify
        how you meet this experience in your resume, or you may be deemed ineligible.
        (3) Upload the appropriate document(s) to your application for verification
        purposes. (Refer to 'Required Documents' section for additional guidance).
        Students enrolled in a qualifying degree program can apply if the anticipated
        graduation date is within six months of the closing date of this announcement.
        If selected, the final transcript must be received before your start date.
        Other applicants must meet all qualification requirements by the closing date
        of this announcement. Transcripts are required for this position.\",\"Requirements\":\"CONDITIONS
        OF EMPLOYMENT: SELECTIVE SERVICE: Males born after 12/31/1959 must be registered
        for the Selective Service. BACKGROUND INVESTIGATION: Applicants may be required
        to complete a background/security investigation and meet preliminary requirements
        prior to onboarding. SECURITY CLEARANCE: Varies by position. If applicable,
        you must be able to obtain and maintain the appropriate security clearance
        of the position to which appointed. TRIAL PERIOD: This is an Excepted Service
        position. This job will be filled by an alternative hiring process and is
        not in the competitive service. Applicants selected for an excepted service
        position may be subject to a two-year trial period.\",\"Evaluations\":\"DESCRIBING
        YOUR EXPERIENCE: PLEASE BE CLEAR AND SPECIFIC. WE WILL NOT MAKE ASSUMPTIONS
        REGARDING YOUR EXPERIENCE. If your resume/application does not support your
        questionnaire answers, we will not allow credit for your response(s). Your
        resume must contain sufficiently detailed information upon which to make a
        qualification determination. Please ensure that your resume contains specific
        information such as position titles, beginning and ending dates of employment
        for each position, average number of hours worked per week, and if the position
        is/was in the Federal government, you should provide the position series and
        grade level For this announcement, all applicants will be reviewed to determine
        if they meet the basic qualifications for this position, specifically the
        educational and specialized experience requirements. Applicants will not be
        rated or ranked. All applications that are verified to meet the basic qualifications
        will be referred to the selecting official. The answers you select in the
        on-line process must be substantiated in your application package. If upon
        review, it is determined that your described work history, competencies, and/or
        supporting documents do not support your answer choices, you may not be referred
        to the selecting official. Please ensure that your work history provides enough
        details to support your answers. You may preview questions for this vacancy.\",\"HowToApply\":\"You
        must submit a complete application package (including resume, vacancy questions
        and supporting documents) no later than 11:59 pm (EST) on the closing date
        of the announcement. To begin, click the \\\"Apply Online\\\" button on the
        job announcement posting. Follow the directions to register, submit all required
        documents and complete the assessment questionnaire. You may review your saved
        application(s) at https://help.usajobs.gov/ If you are having difficulty applying
        online, please contact the DOT Automated Staffing Office via email at: Transjobs@dot.gov\",\"WhatToExpectNext\":\"Within
        two weeks of the closing date, a Human Resources Specialist will evaluate
        your application. You may check your application status by logging into USAJobs.com.
        (Select \\\"My USAJOBS\\\" and click \\\"Applications\\\"). Ratings will be
        determined based on the documents and information received by the closing
        date. If you are selected for an interview, the hiring agency will contact
        you directly. Once the position is filled, we will notify all applicants of
        their final status.\",\"RequiredDocuments\":\"RESUME: In accordance with the
        OPM memorandum titled Merit Hiring Plan, dated May 29, 2025, resumes with
        a maximum of two (2) pages in length will be accepted as part of your application.
        These should be legible and in a readable font size. A determination of your
        eligibility and/or qualifications will be based only on those two (2) pages.
        Your resume MUST contain specific information that can be used to make a qualification
        determination, including employment beginning and ending dates for each position,
        whether employment is Full-time or Part-time, or average number of hours worked
        per week, and position titles. If the position is/was in the Federal government,
        you will need to provide the position series and grade level. The resume should
        show relevant experience and education, as well as support the required specialized
        experience. For assistance with the resume builder, please visit: https://help.usajobs.gov//Help/how-to/account/documents/resume/build/
        TRANSCRIPTS - Transcripts are REQUIRED as there is a stated education requirement
        for the series. The transcripts need not be official, but must show that you
        meet the stated education requirements, including specific major or class
        requirements. Provide only the attendance and/or degrees from schools accredited
        by accrediting institutions recognized by the U.S. Department of Education.
        VETERANS: If you are eligible for veterans' preference in hiring, you are
        encouraged to include that information in your application along with supporting
        documentation, e.g., SF15, DD214, Certificate of Release or Discharge from
        Active Duty, or other supporting documentation. PERFORMANCE APPRAISALS/INCENTIVE
        AWARDS: If applicable, performance appraisals and/or Incentive award documentation
        may be submitted and will be forwarded to the selecting official as support
        in consideration of your application in the evaluation process. To receive
        credit, you must submit a recent performance appraisal (dated within 18 months)
        showing the official rating of record, signed by a supervisor, or statement
        why the performance appraisal is unavailable (do not submit a performance
        plan) and/or incentive award documentation dated within the last 18 months
        (i.e. superior performance awards, special act or achievement awards, quality
        step increases, etc.). Failure to submit any of the required documents by
        the closing date of the vacancy will result in your removal from consideration
        for this position. Please review your application prior to final submission
        and ensure you have submitted all appropriate documents. Uploading documents
        to USAJobs does NOT ensure inclusion with your application to our system.
        You must verify that the documents are in the system with your application
        prior to final submission.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.opm.gov/healthcare-insurance/Guide-Me/New-Prospective-Employees/\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"The
