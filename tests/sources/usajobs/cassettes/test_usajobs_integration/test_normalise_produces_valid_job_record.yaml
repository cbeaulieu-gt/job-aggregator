        City, Missouri\",\"Longitude\":-94.58306,\"Latitude\":39.10296}],\"OrganizationName\":\"Agricultural
        Marketing Service\",\"DepartmentName\":\"Department of Agriculture\",\"SubAgency\":\"Marketing
        and Regulatory Programs\",\"JobCategory\":[{\"Name\":\"Electronics Engineering\",\"Code\":\"0855\"}],\"JobGrade\":[{\"Code\":\"GS\"}],\"PositionSchedule\":[{\"Name\":\"\",\"Code\":\"1\"}],\"PositionOfferingType\":[{\"Name\":\"\",\"Code\":\"15317\"}],\"QualificationSummary\":\"Applicants
        must meet all qualifications and eligibility requirements by the closing date
        of the announcement, including specialized experience and/or education, as
        defined below. BASIC REQUIREMENT: A. Degree: Engineering. To be acceptable,
        the program must: (1) lead to a bachelor's degree in a school of engineering
        with at least one program accredited by ABET; or (2) include differential
        and integral calculus and courses (more advanced than first-year physics and
        chemistry) in five of the following seven areas of engineering science or
        physics: (a) statics, dynamics; (b) strength of materials (stress-strain relationships);
        (c) fluid mechanics, hydraulics; (d) thermodynamics; (e) electrical fields
        and circuits; (f) nature and properties of materials (relating particle and
        aggregate structure to properties); and (g) any other comparable area of fundamental
        engineering science or physics, such as optics, heat transfer, soil mechanics,
        or electronics. OR B. Combination of education and experience -- college-level
        education, training, and/or technical experience that furnished (1) a thorough
        knowledge of the physical and mathematical sciences underlying engineering,
        and (2) a good understanding, both theoretical and practical, of the engineering
        sciences and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        1. Professional registration or licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT), or licensure as a Professional Engineer
        (PE) by any State, the District of Columbia, Guam, or Puerto Rico. Absent
        other means of qualifying under this standard, those applicants who achieved
        such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. 2. Written Test -- Evidence of having successfully
        passed the Fundamentals of Engineering (FE) examination or any other written
        test required for professional. registration by an engineering licensure board
        in the various States, the District of Columbia, Guam, and Puerto Rico. 3.
        Specified academic courses -- Successful completion of at least 60 semester
        hours of courses in the physical, mathematical, and engineering sciences and
        that included the courses specified in the basic requirements under paragraph
        A (i.e. Degree). 4. Related curriculum -- Successful completion of a curriculum
        leading to a bachelor's degree in an appropriate scientific field (e.g., engineering
        technology, physics, chemistry, architecture, computer science, mathematics,
        hydrology, or geology) may be accepted in lieu of a bachelor's degree in engineering,
        provided the applicant has had at least 1 year of professional engineering
        experience acquired under professional engineering supervision and guidance.
        FOR THE GS-12 LEVEL: Applicants must have one year of specialized experience
        (equivalent to the GS-11 level) that may have been obtained in the private
        or public (local, county, state, Federal) sectors which demonstrates: Analyzing
        technical specifications, engineering drawings, performance standards, and
        system requirements to determine applicability to automated grain inspection,
        weighing, flow-control, or related industrial control environments. Providing
        expert technical guidance on the installation, integration, and configuration
        of new or modified electronic, electromechanical, or automated control systems.
        Delivering technical operational support for electronic or automated systems
        used in grain flow security, weighing accuracy, inspection technology, or
        similar regulated processes-such as calibration, verification, software/hardware
        adjustments, and system performance validation. Note: There is no education
        substitution for this grade level. TRANSCRIPTS are required if: This position
        requires specific coursework or a degree in a specific field to be basically
        qualified. You are qualifying for the position based on education. You are
        qualifying for this position based on a combination of experience and education.
        This education must have been successfully completed and obtained from an
        accredited school, college, or university Experience refers to paid and unpaid
        experience, including volunteer work done through National Service programs
        (e.g., Peace Corps, AmeriCorps) and other organizations (e.g., professional,
        philanthropic, religious, spiritual, community, student, social). Volunteer
        work helps build critical competencies and can provide valuable training and
        experience that translates directly to paid employment. You will receive credit
        for all qualifying experience, including volunteer experience.\",\"PositionRemuneration\":[{\"MinimumRange\":\"89508\",\"MaximumRange\":\"118261\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
