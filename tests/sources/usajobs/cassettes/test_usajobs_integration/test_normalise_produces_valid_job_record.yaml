        Awards for Current Federal Civilian Employees - List any awards received within
        the last 3 years on the resume. Note: Applicant must not submit award Notification
        of Personnel Actions (SF50s). PLEASE NOTE: It is the applicant's responsibility
        to verify that information entered and/or uploaded, (i.e., resume) is received,
        accurate, and submitted by the closing date. You may verify your documents
        have been processed with your application package successfully. You can access
        your USAJOBS account to do so by clicking here. Uploaded documents may take
        up to one hour to clear the virus scan. Human Resources WILL NOT modify or
        change any answers submitted by an applicant.\",\"WhatToExpectNext\":\"Once
        your application package is received an acknowledgement email will be sent.
        If you provided an email address, you will receive an email message acknowledging
        receipt of your application.Your application package will be used to determine
        your eligibility and qualifications for consideration. If you are determined
        to be ineligible or not qualified, your application will receive no further
        consideration. To check the status of your application or return to a previous
        or incomplete application, log into your USAJOBS account, select My Applications,
        and click on the more information link under the application status for this
        position. If you do not provide an email address, you are responsible for
        checking status updates and notifications in USAJOBS. Hard copy notifications
        will not be sent to you.\",\"RequiredDocuments\":\"The following documents
        are required and must be provided with your application. Applicants who do
        not submit required documentation to determine eligibility and qualifications
