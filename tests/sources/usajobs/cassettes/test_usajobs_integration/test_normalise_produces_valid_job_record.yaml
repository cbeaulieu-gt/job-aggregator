        order to qualify, you must meet the specialized experience requirements described
        in the Office of Personnel Management (OPM) Qualification Standards for General
        Schedule Positions, for Professional and Scientific Positions and Professional
        Engineering Positions, 0800 Basic Requirements: Combination of education and
        experience -- college-level education Degree: Engineering. OR Leading to a
        bachelor's degree in a school of engineering with at least one program accredited
        by ABET; OR Include differential and integral calculus and courses (more advanced
        than first-year physics and chemistry) in five of the following seven areas
        of engineering science or physics: (a) statics, dynamics; (b) strength of
        materials (stress-strain relationships); (c) fluid mechanics, hydraulics;
        (d) thermodynamics; (e) electrical fields and circuits; (f) nature and properties
        of materials (relating particle and aggregate structure to properties); and
        (g) any other comparable area of fundamental engineering science or physics,
        such as optics, heat transfer, soil mechanics, or electronics. OR Training,
        and/or technical experience that furnish 1. A thorough knowledge of the physical
        and mathematical sciences underlying engineering. 2. A good understanding,
        both theoretical and practical, of the engineering sciences and techniques
        and their applications to one of the branches of engineering. In addition
        to meeting the basic requirement above, to qualify for this position you must
        also meet the qualification requirements listed below: You may qualify if
        you meet one of the following: GS-07: You must have completed a 4-year course
        of study leading to a bachelor's from an accredited institution AND must have
        documented Superior Academic Achievement (SAA) or one year of specialized
        experience equivalent to at least a GS-05 at the undergraduate level in one
        of the following: A) Class Standing - upper third of the graduating class
        based on completed courses in the college, university, or major subdivision
        B) Grade Point Average - 2.95 or higher out of a possible 4.0 as recorded
        on your official transcript or as computed based on 4 years of education or
        as computed based on courses completed during the final 2 years of curriculum;
        OR 3.45 or higher out of a possible 4.0 based on the average of the required
        courses completed in your major field or the required courses in your major
        field completed during the final 2 years of your curriculum. If more than
        10 percent of total undergraduate credit hours are non-graded, i.e. pass/fail,
        CLEP, CCAF, DANTES, military credit, etc., you cannot qualify based on GPA
        C) Election to membership in a national scholastic honor society (note: freshman
        honor society cannot be used to meet the requirements of this position). (If
        qualifying based on class standing or honor society membership, provide appropriate
        documentation). GS-09: You have one full year (18 semester hours or the equivalent)
        of graduate level study, or possess a master's or higher degree, e.g., LL.B.,
        J.D., LL.M., Ph.D., in a field that provided the knowledge, skills, and abilities
        to do the work of this position. Such fields include business administration,
        industrial management, industrial engineering, industrial psychology, public
        administration, political science, or government. (Submit copy of transcripts).
        OR You have at least one year (12 months) of specialized experience, that
        provided knowledge of to perform successfully the duties of the position.
        To be creditable, specialized experience must have been equivalent to at least
        the next lower qualifying pay band or equivalent grade under the General Schedule
        (GS) or other pay systems. Equivalent experience may be at the level of the
        lowest GS grade covered by the applicable pay band; however, the experience
        must demonstrate KSA's to successfully perform the duties of the position
        being filled. OR You must have a combination of graduate education as described
        above and the type of specialized experience as described above, which when
        combined would equate to 100%. (To compute, first determine your total qualifying
        graduate level education as a percentage of the graduate education required;
        then determine your total qualifying experience as a percentage of experience
        described above; add the two percentages. The total percentage must equal
        to at least 100%.) (Submit a copy of your transcript.) AND Grade Point Average
        - 2.95 or higher out of a possible 4.0 as recorded on your official transcript
        or as computed based on 4 years of education or as computed based on courses
        completed during the final 2 years of curriculum; OR 3.45 or higher out of
        a possible 4.0 based on the average of the required courses completed in your
        major field or the required courses in your major field completed during the
        final 2 years of your curriculum. If more than 10 percent of total undergraduate
        credit hours are non-graded, i.e. pass/fail, CLEP, CCAF, DANTES, military
        credit, etc., you cannot qualify based on GPA KNOWLEDGE, SKILLS AND ABILITIES
        (KSAs): Your qualifications will be evaluated on the basis of your level of
        knowledge, skills, abilities and/or competencies in the following areas: 0810-07
        (Civil Engineer) Professional knowledge of civil engineering concepts and
        principles of standard engineering practices. Skill in preparing graphs, curves,
        or tables. Ability to search technical reports, manufacturers' catalogs, and
        other guidelines to obtain information. Ability to use relevant software programs
        and use computer aided design and drafting (CADD) programs. Ability to work
        cooperatively as a team member in the design of facility projects. Ability
        to make calculations applying standard formulas: prepare graphs, curves, or
        tables: and record factual data in tests and observation studies. 0810-09
        (Civil Engineer) Professional knowledge of civil engineering concepts, principles,
        and practices. Knowledge of engineering and construction standards, methods,
        and practices. Knowledge of automated data processing concepts. Knowledge
        of health, safety, and environmental requirements in applicable regulations.
        Ability to analyze, interpret, and apply rules, regulations and procedures
        in a variety of situations and recommend timely and economical solutions.
        Ability to plan and organize work; coordinate with other engineering disciplines
        and architects. 0830-07 (Mechanical Engineer) Professional knowledge of mechanical
        engineering concepts and principles and standard engineering practices. Skill
        in preparing graphs, curves, or tables. Ability to search technical reports,
        manufacturers' catalogs, and other guidelines to obtain information. Ability
        to use relevant software programs and use computer aided design and drafting
        programs (CADD). Ability to work cooperatively as a team member in the design
        of mechanical systems. Ability to make calculations applying standard formulas:
        and record factual data in tests and observation studies. PART-TIME OR UNPAID
        EXPERIENCE: Credit will be given for appropriate unpaid and or part-time work.
        You must clearly identify the duties and responsibilities in each position
        held and the total number of hours per week. VOLUNTEER WORK EXPERIENCE: Refers
        to paid and unpaid experience, including volunteer work done through National
        Service Programs (i.e., Peace Corps, AmeriCorps) and other organizations (e.g.,
        professional; philanthropic; religious; spiritual; community; student and
        social). Volunteer work helps build critical competencies, knowledge and skills
        that can provide valuable training and experience that translates directly
        to paid employment. You will receive credit for all qualifying experience,
        including volunteer experience.\",\"PositionRemuneration\":[{\"MinimumRange\":\"55486\",\"MaximumRange\":\"83525\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
