        Offers of employment related to this vacancy announcement will not be executed
        until the position has an approved exemption. This announcement uses the Direct
        Hire-STRL-Bachelor's Degree authority to recruit and appoint qualified candidates
        to certain positions in the competitive service. This position is part of
        the Warfare Centers Personnel Demonstration Project. The ND-4 pay band encompasses
        positions equivalent to GS-12 and GS-13. This position is covered by the Department
