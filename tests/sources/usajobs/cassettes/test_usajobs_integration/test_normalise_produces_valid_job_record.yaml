        tests for application code. 5. 3+ years of professional experience applying
        software security techniques, controls, and best practices to engineer software
        to mitigate vulnerabilities and risk against malicious attacks and ensure
        continued operations.\",\"PositionRemuneration\":[{\"MinimumRange\":\"76573\",\"MaximumRange\":\"158322\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
