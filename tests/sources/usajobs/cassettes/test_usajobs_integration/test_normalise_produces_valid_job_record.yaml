        science; or a degree with at least 30 semester hours in a combination of mathematics,
        statistics, and computer science. At least 15 of these 30 semester hours must
        have been in a combination of statistics and mathematics that included differential
        and integral calculus.\",\"Requirements\":\"\",\"Evaluations\":\"In order
        to qualify for this position, your resume must provide sufficient experience
        and/or education, knowledge, skills, and abilities to perform the duties of
