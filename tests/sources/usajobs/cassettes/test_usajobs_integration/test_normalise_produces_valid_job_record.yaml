        analyzing the day-to-day activities of the programs and assigned projects.\",\"Negotiates/integrates
        planning, design, cost engineering, construction, real estate, contracting,
        and environmental considerations.\",\"Resolve technical problems and issues,
        and plan, design, monitor, and evaluate complex and varied projects that represent
        the full range of construction and public works projects, e.g. water, electricity,
        sewage.\",\"Lead multidisciplinary teams to develop major, long-range program
        and project planning.\",\"Provide Engineering Analysis, Evaluations, and Engineering
        Recommendations, Waivers, and Deviations with a full understanding of applicable
        codes, policies, and design criteria.\",\"Advise on technical matters to ensure
        program continuity risk reduction and effective utilization by reviewing engineering
        studies, designs and proposals, and makes recommendations to project managers
        or unit leaders.\",\"Utilize computer software to produce, review, and analyze
        construction plans that represent the full range of construction disciplines.\"],\"Education\":\"FOREIGN
        EDUCATION: If you are using education completed in foreign colleges or universities
        to meet the qualification requirements, you must show the education credentials
        have been evaluated by a private organization that specializes in interpretation
        of foreign education programs and such education has been deemed equivalent
        to that gained in an accredited U.S. education program; or full credit has
        been given for the courses at a U.S. accredited college or university. For
        further information, visit: https://sites.ed.gov/international/recognition-of-foreign-qualifications/\",\"Requirements\":\"\",\"Evaluations\":\"Once
        the announcement has closed, a review of your application package (resume,
        supporting documents, and responses to the questionnaire) will be used to
        determine whether you meet the qualification requirements listed on this announcement.
        Please follow all instructions carefully when applying, errors or omissions
        may affect your eligibility. If, after reviewing your resume and/or supporting
        documentation, a determination is made that you have inflated your qualifications
        and/or experience, you may lose consideration for this position. Veterans
        and Military Spouses will be considered along with all other candidates.\",\"HowToApply\":\"To
        apply for this position, you must complete the online questionnaire and submit
        the documentation specified in the Required Documents section above. The complete
        application package must be submitted by 11:59 PM (EST) on 04/24/2026 to receive
        consideration Follow the prompts to select your resume and/or other supporting
        documents to be included with your application package. As a reminder, your
        resume must be two pages or less and must support the specialized experience
        described in this announcement. Resumes exceeding two pages will be removed
        from consideration. For additional information, refer to the 'Required Documents'
        section. You will have the opportunity to upload additional documents to include
        in your application before it is submitted. Your uploaded documents may take
        several hours to clear the virus scan process. After acknowledging you have
        reviewed your application package, complete the Include Personal Information
        section as you deem appropriate and click to continue with the application
        process. You will be taken to the online application which you must complete
        in order to apply for the position. Complete the online application, verify
        the required documentation is included with your application package, and
        submit the application. Your resume selected in USAJOBS will be included,
        but you must re-select other documents from your USAJOBS account or your application
        may be incomplete. It is your responsibility to verify that your application
        package (resume, supporting documents, and responses to the questionnaire)
        is complete, accurate, and submitted by the closing date. Uploaded documents
        may take up to one hour to clear the virus scan. Additional information on
        how to complete the online application process and submit your online application
        may be found on the USA Staffing Applicant Resource Center. To verify the
        status of your application, log into your USAJOBS account (https://www.usajobs.gov/applicant/profile/dashboard/),
        all of your applications will appear on the Welcome screen. The Application
        Status will appear along with the date your application was last updated.
        For information on what each Application Status means, visit: https://help.usajobs.gov/how-to/application/status.\",\"WhatToExpectNext\":\"If
        you provided an email address, you will receive an email message acknowledging
        receipt of your application. Your application package will be used to determine
        your eligibility, qualifications, and quality ranking (as applicable) for
        this position. If you are determined to be ineligible or not qualified, your
        application will receive no further consideration.\",\"RequiredDocuments\":\"The
        documents you are required to submit vary based on whether or not you are
        eligible for preference in federal employment. A complete description of preference
        categories and the associated required documents is in the Applicant Checklist
        for Public Announcements. As described above, your complete application includes
        your resume, your responses to the online questionnaire, and documents which
        prove your eligibility to apply. If you fail to provide these documents, you
        will be marked as having an incomplete application package and you will not
        be considered any further. 1. Your resume: Your resume must be two pages or
        less and must support the specialized experience described in this announcement.
        Resumes exceeding two pages will be removed from consideration. For each relevant
        work experience, make sure you include the employer's name, job title, start
        and end dates (include month and year), for qualifications purposes, the number
        of hours worked per week, and a brief description that show you can perform
        the tasks at the required level listed in the job announcement. If your resume
        does not contain this information, your application may be marked as incomplete,
        and you may not receive consideration for this position. Use plain language.
        Avoid using acronyms and terms that are not easily understood. The hiring
        agency will not make assumptions about what's in your resume. If your resume
        includes a photograph or other inappropriate material or content, it will
        not be used to make eligibility and qualification determinations, and you
        may not be considered for this vacancy. For additional information, to include
        formatting tips, see: What to include in your resume. 2. Other supporting
        documents: Cover Letter, optional Most recent Performance Appraisal, if applicable
        This position has an individual occupational requirement and/or allows for
        substitution of education for experience. If you meet this requirement based
        on education you MUST submit a copy of your transcript with your application
        package or you will be rated ineligible. See: Transcripts and Licenses NOTE:
        Documents submitted as part of the application package, to include supplemental
        documents, may be shared beyond the Human Resources Office. Some supplemental
        documents such as military orders and marriage certificates may contain personal
        information for someone other than you. You may sanitize these documents to
        remove another person's personal information before you submit your application.
        You may be asked to provide an un-sanitized version of the documents if you
        are selected to confirm your eligibility.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.usajobs.gov/Help/working-in-government/\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"Male
        applicants born after December 31, 1959, must complete a Pre-Employment Certification
        Statement for Selective Service Registration. You will be required to provide
        proof of U.S. Citizenship. One year trial/probationary period may be required.
        Direct Deposit of Pay is required. Selection is subject to restrictions resulting
        from Department of Defense referral system for displaced employees. If you
        have retired from federal service and you are interested in employment as
        a reemployed annuitant, see the information in the Reemployed Annuitant information
        sheet. This is an Engineer & Scientist Career Field position. Multiple positions
        may be filled from this announcement. Salary includes applicable locality
        pay or Local Market Supplement. Payment of Permanent Change of Station (PCS)
        costs is not authorized, based on a determination that a PCS move is not in
        the Government interest. Incentives such as student loan repayment, advance
        in hire, relocation, and recruitment MAY be authorized for qualifying selectees.\",\"KeyRequirements\":[],\"WithinArea\":\"False\",\"CommuteDistance\":\"0\",\"ServiceType\":\"01\",\"AnnouncementClosingType\":\"01\",\"AgencyContactWebsite\":\"https://portal.chra.army.mil/hr_public?id=app_inq\",\"SecurityClearance\":\"Not
