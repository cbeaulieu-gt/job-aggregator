        functions, often in a leadership capacity, while conducting engineering and
        analytical surveillance.\",\"Monitors complex contractor engineering management
        systems; provides expert technical recommendations on substantive/critical/unique
        changes; researches/designs/develops/tests/produces engineering and analytical
        surveillance.\",\"Conducts Contract Receipt and Review (CRR) related to cost,
        schedule, and performance.\",\"The CRR functions include evaluating production
        engineering/ability; reviewing facilities/nonconforming hardware; evaluating
        logistics/support programs/master engineering planning schedules; evaluating
        special tooling/testing equipment.\"],\"Education\":\"Substitution of education
        may not be used in lieu of specialized experience for this grade level. This
        position has a minimum education requirement you MUST provide transcripts
        (unofficial are acceptable at the time of application) to support your educational
        claims. Or, if you are using education to qualify in lieu of specialized experience
        you MUST provide transcripts (unofficial are acceptable at the time of application)
        to support your educational claims. The transcripts must include your name,
        the name of the college or university, class/course list, completed number
        of credits/hours, and the date degree conferred (if applicable). Education
        must be accredited by an accrediting institution recognized by the U.S. Department
        of Education. Licenses must be current at time of application. GRADUATE EDUCATION:
        One academic year of graduate education is considered to be the number of
        credits hours that your graduate school has determined to represent one academic
        year of full-time study. Such study may have been performed on a full-time
        or part-time basis. If you cannot obtain your graduate school's definition
        of one year of graduate study, 18 semester hours (or 27 quarter hours) should
        be considered as satisfying the requirement for one year of full-time graduate
        study. FOREIGN EDUCATION: If you are using education completed in foreign
        colleges or universities to meet the qualification requirements, you must
        show that the education credentials have been evaluated by a private organization
        that specializes in interpretation of foreign education programs and such
        education has been deemed equivalent to that gained in an accredited U.S.
        education program; or full credit has been given for the courses at a U.S.
        accredited college or university.\",\"Requirements\":\"\",\"Evaluations\":\"The
        assessments for this job will measure the following Competencies: Attention
        to Detail Decision Making Flexibility Integrity/Honesty Interpersonal Skills
        Learning Reading Comprehension Reasoning Self-Management Teamwork Please follow
        all instructions carefully. Errors or omissions may affect your eligibility
        and/or score. Once the application process is complete, a manual review of
        your resume and supporting documentation will occur to determine if you are
        eligible and among the best qualified as determined by the predetermined cutoff
        score. Your score is based on your responses to the assessment questionnaire.\",\"HowToApply\":\"To
        apply for this position, you must complete the online questionnaire and submit
        the documentation specified in the Required Documents section above. To preview
        the questionnaire, please go to https://apply.usastaffing.gov/ViewQuestionnaire/12933330.
        The complete application package must be submitted by 11:59 PM (EST) on 04/24/2026
        to receive consideration. To begin, click Apply Online to access an online
        application. Follow the prompts to select your USAJOBS resume and/or other
        supporting documents. You will need to be logged into your USAJOBS account
        or you may need to create a new account. You will be taken to an online application.
        Complete the online application, verify the required documentation, and submit
        the application. NOTE: Resumes up to a total of two pages will be accepted.
        Resumes exceeding two pages will be removed from consideration. You will receive
        an email notification when your application has been received for the announcement.
        If you are required to complete any USA Hire Assessments, you will be notified
        after submitting your application. The notification will be provided in your
        application submission screen and via email. The notification will include
        your unique assessment access link to the USA Hire system and the completion
        deadline. Additionally, in USAJOBS you can click \\\"Track this application\\\"
        to return to your assessment completion notice. Access USA Hire using your
        unique assessment link. Access is granted through your USAJOBS login credentials.
        Review all instructions prior to beginning your assessments. You will have
        the opportunity to request a testing accommodation before beginning the assessments
        should you have a disability covered under the Rehabilitation Act of 1973
        as amended. Set aside at least 3 hours to take the USA Hire Assessments; however,
        most applicants complete the assessments in less time. If you need to stop
        the assessments and continue later, you can re-use your unique assessment
        link. Your responses to the USA Hire Assessments will be reused for one year
        (in most cases) from the date you complete an assessment. If future applications
        you submit require completion of the same assessments, your responses will
        be automatically reused. Visit the USA Hire Applicant Resource Center for
        practice assessments and assessment preparation resources at https://support-usahire.opm.gov/hc/en-us.
        To verify the status of your application, log into your USAJOBS account, https://www.usajobs.gov,
        select the Application Status link and then select the More Information link
        for this position. The Application Status page will display the status of
        your application, the documentation received and processed, and your responses
        submitted to the online application. Your uploaded documents may take several
        hours to clear the virus scan process.\",\"WhatToExpectNext\":\"Once your
        online application is submitted you will receive a confirmation notification
        by email. Your application will be evaluated by the Human Resources Office
        to determine your eligibility and qualifications for the position. After the
        evaluation is complete, you will receive another notification regarding the
        status of your application. To verify the status of your application, log
        into your USAJOBS account (https://my.usajobs.gov/Account/Login), all of your
        applications will appear on the Welcome screen. The Application Status will
        appear along with the date your application was last updated. For information
        on what each Application Status means, visit:https://www.usajobs.gov/Help/how-to/application/status/\",\"RequiredDocuments\":\"Required
        documents for submission vary based on the authority you are using to apply
        (e.g., applying as a veteran, a current permanent Federal employee, a reinstatement,
        etc). Your complete application includes your resume, your responses to the
        online questionnaire, and documents which prove your eligibility to apply.
        If you fail to provide these documents, you will be marked as having an incomplete
        application package and you will not be considered any further. The following
        documents are REQUIRED: 1. Your resume: IMPORTANT UPDATE: Your resume must
        not exceed two (2) pages. If your resume exceeds the two-page limit, you will
        be removed from consideration for this announcement. The resume and required
        supporting documentation should provide the minimum qualifications and relevant
        experience for the announced position. Must include the work schedule, hours
        worked per week, dates of employment, and duties performed. If multiple resumes
        are submitted by an applicant, only the last resume submitted will be reviewed
        for qualifications and referred for selection consideration, if eligible.
        The resume must not be more than 5MB and should be saved and uploaded as a
        PDF to maintain formatting and number of pages. We also accept GIF, JPG, JPEG,
        PNG, RTF, TXT, PDF, ODT or Word (DOC or DOCX). We do not accept PDF portfolio
        files. Page margins should be 0.5 inches, and font styles must be legible.
        Consider using 14-point size font for titles and 10-point for the main text.
        We recommend using a font like Lato, if available. Other widely available
        options are Calibri, Helvetica, Arial, Verdana, Open San Source Sans Pro,
        Roboto or Noro Sans. Additional guidance on writing a federal resume can be
        found at: USAJOBS Help Center - How do I write a resume for a federal job?
        The resume builder can help you create a resume using these recommendations
        and uses the information in your USAJOBS profile to help you get started.
        To ensure full credit for time worked regarding qualifications determinations
        your resume must include your work schedule. You are strongly encouraged to
        ensure your resume contains the number of hours worked per week and the specific
        dates of employment (i.e.,\\\"40 hrs per week; 1/15/2020 - 1/14/2022\\\" or
        \\\"30 hrs per week; 1/15/2020 - Present\\\"). 2. Veteran's Documents: If
        applying using veteran's preference or under a Veteran's hiring authority
        you must submit the following documents: DD214 showing character of service,
        SF-15 Form and VA letter showing final percentage, or certification of expected
        discharge or release from active duty. Priority Placement Program, DoD Military
        Reserve (MR) and National Guard (NG) Technician Eligible (PPP DoD MRNG): In
        order to receive this preference, you must choose the Military Reserve and
        National Guard Technician eligibility, and fill out and submit the Military
        Reserve and National Guard Technician PPP Self-Certification Checklist and
        copies of the appropriate documentation. 3. Current Federal Employees: You
        must provide a SF-50 (most current Gen Adj or WGI actions are best), or other
        equivalent official \\\"Notification of Personnel Action\\\" (Note: Request
        for Personnel Action (SF-52) is NOT acceptable.) Your SF-50 must reflect Tenure
        (Block 24) and Position Occupied (Block 34). 4. Transcripts (must include
        your name, the name of the college or university, class/course list, completed
        number of credits/hours, and the date degree conferred (if applicable): Education
