        the basic qualification requirements for the vacancy and has successful experience
        in the same or similar job that has demonstrated superior proficiency in applying
        critical competencies required by this position to work of increased levels
        of difficulty and complexity. Category B - Meets the basic qualification requirements
        for the vacancy and demonstrates satisfactory proficiency in the critical
        competencies required by this position. Category C - Meets the specialized
        experience described in the minimum qualification requirements section of
        this announcement and demonstrates proficiency in the basic competencies.
        Click here for Evaluation details. USA Hire You will be assessed on the following
        competencies (knowledge, skills, abilities, and other characteristics): Technical
        Competence Written Communication Oral Communication Problem Solving Technology
        Application Evaluation Factors (Competencies) - All qualified applicants will
        be evaluated on the following key competencies: Technical Competence Written
        Communication Oral Communication Problem Solving Technology Application The
        information you provide may be verified by a review of your paid, unpaid,
        volunteer, as it demonstrates the competencies or skills required for the
        position to be filled. Your evaluation may include an interview, reference
        checks, or other assessment conducted by HR specialists, subject matter experts,
        or panel members and may include other assessment tools (ex. interview, structured
        interview, written test, work sample, etc.). INFORMATION FOR ICTAP/CTAP ELIGIBLE(S)
        ONLY: If you are eligible for special priority selection under ICTAP/CTAP,
        you must be well-qualified for the position to receive consideration. ICTAP/CTAP
        eligible(s) who are Category B or higher will be considered well-qualified.
        Be sure to review the eligibility questions to reflect that you are applying
        as an ICTAP or CTAP eligible and submit supporting documentation. When Occupational
        Safety and Health Administration completes its hiring, the remaining list
        of qualified candidates may be shared with additional federal agencies. You
        will have an opportunity to opt-in if you would like your name, application
        material, and assessment results shared to be considered for employment with
        additional agencies. There is no guarantee of further consideration, and you
        can continue to explore other job opportunity announcements.\",\"HowToApply\":\"Persons
        who are deaf, hard of hearing, blind, or have speech disabilities, please
        dial 711 to access telecommunications relay services. To apply for this position,
        you must complete the initial online application, including submission of
        the required documentation specified in the Required Documents section. Your
        application and ALL required supplemental documents MUST be received by 11:59
        pm Eastern Time on the vacancy closing date to receive consideration. Important
        - Save your information before the 30-minute system timeout! For help, go
        to the USAJOBS Help Center. STEP 1 - Create USAJOBS Account on www.usajobs.gov,
        including Resume and Saved Documents. For each employment period, include
        start/end month & year and note full-time or part-time (if part-time, include
        # of hours worked per week) otherwise, your application may be considered
        incomplete. NOTE: In alignment with the Presidential Memorandum titled Merit
        Hiring Plan, dated May 29, 2025, applicants may only submit a resume limited
        to two (2) pages. Only the re\u0301sume\u0301 uploaded under the 'Resume\\\"
        document type in USAJOBS will be reviewed. If the resume submitted exceeds
        two (2) pages, the application will be deemed ineligible for further consideration.
        STEP 2 - Complete the 1st part of the application process (USAJOBS). Once
        you have identified a job on USAJOBS that you wish to apply for, click on
        the job title and then click the Apply button. For questions about the vacancy,
        contact the Agency Contact at the bottom of the announcement. Proceed through
        the steps noted at the top of the USAJOBS page. You will be able to select
        a resume and documents from your USAJOBS Account that you can submit as a
        package as part of your DOL application. In the final step, once you have
        certified your application, click the Continue to agency site button. STEP
        3 - Complete the 2nd part of the application process (DOL). On the Department
        of Labor (DOL) page, create a DOL Account if you have not already and click
        Apply to this vacancy. Continue through the progress steps at the top of the
        DOL page. The 2nd progress step is where you answer the vacancy-specific questions.
        The 3rd progress step Documents is where you submit the required documents
        (only if applicable to you) specified in the Required Documents section of
