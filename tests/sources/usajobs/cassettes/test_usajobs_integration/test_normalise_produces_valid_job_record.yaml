        Dahlgren Branded Page\"],\"TotalOpenings\":\"1\",\"AgencyMarketingStatement\":\"The
        Navy and Marine Corps team offers innovative, exciting and meaningful work
        linking military and civilian talents to achieve our mission and safeguard
        our freedoms. Department of the Navy provides competitive salaries, comprehensive
        benefits, and extensive professional development and training. From pipefitters
        to accountants, scientists to engineers, doctors to nurses-the careers and
        opportunities to make a difference are endless. Civilian careers-where purpose
        and patriotism unite!\",\"TravelCode\":\"1\",\"MajorDuties\":[\"You will serve
        as an Engineer or Scientist within the Software Engineering and Development
        Division, Integrated Combat Systems Department of Naval Surface Warfare Center
        Dahlgren Division.\",\"You will lead efforts to design, develop, integrate,
        implement, test, and field Combat Systems utilizing a DevSecOps approach.\",\"You
        will be responsible for conducting software engineering and development activities
        for various platform services, including high availability, log aggregation,
        and security.\",\"You will document work including technical reports, presentations,
        testing, and specification change request, applying problem solving and analysis
        skills to evaluate Command and Control Systems software.\",\"You will analyze
        information to determine, recommend, and plan the development of a new application
        or modification of an existing application.\",\"You will consult with other
        developers and engineers to evaluate hardware and software interfaces.\",\"You
        will consult with end users and stakeholders about software system design,
        implementation, and maintenance.\"],\"Education\":\"Applicants must meet at
        least one of the following positive education qualifications requirements
        of the Office of Personnel Management (OPM) Qualifications Standards Manual:
        For the 0801 Professional Engineering Series: Degree: Engineering. To be acceptable,
        the program must: (1) lead to a bachelor's degree in a school of engineering
        with at least one program accredited by ABET; or (2) include differential
        and integral calculus and courses (more advanced than first-year physics and
        chemistry) in five of the following seven areas of engineering science or
        physics: (a) statics, dynamics; (b) strength of materials (stress-strain relationships);
        (c) fluid mechanics, hydraulics; (d) thermodynamics; (e) electrical fields
        and circuits; (f) nature and properties of materials (relating particle and
        aggregate structure to properties); and (g) any other comparable area of fundamental
        engineering science or physics, such as optics, heat transfer, soil mechanics,
        or electronics. OR Combination of education and experience -- college-level
        education, training, and/or technical experience that furnished (1) a thorough
        knowledge of the physical and mathematical sciences underlying engineering,
        and (2) a good understanding, both theoretical and practical, of the engineering
        sciences and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        Professional registration or licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT)1 , or licensure as a Professional
        Engineer (PE) by any State, the District of Columbia, Guam, or Puerto Rico.
        Absent other means of qualifying under this standard, those applicants who
        achieved such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. Written Test -- Evidence of having successfully passed
        the Fundamentals of Engineering (FE)2 examination or any other written test
        required for professional registration by an engineering licensure board in
        the various States, the District of Columbia, Guam, and Puerto Rico. Specified
        academic courses -- Successful completion of at least 60 semester hours of
        courses in the physical, mathematical, and engineering sciences and that included
        the courses specified in the basic requirements under paragraph A. The courses
        must be fully acceptable toward meeting the requirements of an engineering
        program as described in paragraph A. Related curriculum -- Successful completion
        of a curriculum leading to a bachelor's degree in an appropriate scientific
        field, e.g., engineering technology, physics, chemistry, architecture, computer
        science, mathematics, hydrology, or geology, may be accepted in lieu of a
        bachelor's degree in engineering, provided the applicant has had at least
        1 year of professional engineering experience acquired under professional
        engineering supervision and guidance. Ordinarily there should be either an
        established plan of intensive training to develop professional engineering
        competence, or several years of prior professional engineering-type experience,
        e.g., in interdisciplinary positions. (The above examples of related curricula
        are not all inclusive.) For the 1515 Professional Operations Research Series:
        Degree: in operations research; or at least 24 semester hours in a combination
        of operations research, mathematics, probability, statistics, mathematical
        logic, science, or subject-matter courses requiring substantial competence
        in college-level mathematics or statistics. At least 3 of the 24 semester
        hours must have been in calculus. For the 1520 Professional Mathematics Series:
        Degree: mathematics; or the equivalent of a major that included at least 24
        semester hours in mathematics. OR Combination of education and experience
        -- courses equivalent to a major in mathematics (including at least 24 semester
        hours in mathematics), as shown above, plus appropriate experience or additional
        education. For the 1550 Professional Computer Science Series: Degree: computer
        science; or bachelor's degree with 30 semester hours in a combination of mathematics,
        statistics, and computer science. At least 15 of the 30 semester hours must
        have included any combination of statistics and mathematics that included
        differential and integral calculus. All academic degrees and course work must
        be from accredited or pre-accredited institutions.\",\"Requirements\":\"\",\"Evaluations\":\"In
        order to qualify for this position, your resume must provide sufficient experience
        and/or education, knowledge, skills, and abilities to perform the duties of
        the specific position for which you are being considered. Resumes are restricted
        to no more than 2 pages. Illegible/unreadable resumes will not be considered.
        Your resume is the key means we have for evaluating your skills, knowledge,
        and abilities as they relate to this position. Therefore, we encourage you
        to be clear and specific when describing your experience. As vacancies occur,
        the Human Resources Office will review your resume to ensure you meet the
        hiring eligibility and qualification requirements listed in this flyer. You
        will be rated based on the information provided in your resume, along with
        your supporting documentation. If selected, you may be required to provide
        additional supporting documentation. If after reviewing your resume and supporting
        documentation, a determination is made that you inflated your qualifications
        and/or experience, you may be found ineligible/not qualified. Please follow
        all instructions carefully. Errors or omissions may affect your rating or
        consideration for employment. All qualification requirements must be met before
        being considered for any vacancies.\",\"HowToApply\":\"Interested Applicants
        must submit resumes/application packages to: DLGR_NSWC_jobinfo@navy.mil Please
        reference DE-12842892-26-JLM in the subject of your application. Facsimile
        applications will not be considered. All resumes/applications must be received
        no later than the close date of this flyer. Resumes are restricted to no more
        than 2 pages. Illegible/unreadable resumes will not be considered. It is the
        applicant's responsibility to verify that all information in their resume
        and documents, are received, legible, and accurate. HR will not modify answers/documents
        submitted by an applicant. Failure to submit a complete application package
        will result in an ineligible rating and loss of consideration.\",\"WhatToExpectNext\":\"Qualified
        applicants will be referred to the hiring manager. The selecting official
        may choose to conduct interviews. Our evaluation will be based on the information
        you provide. You should expect that we will verify performance, suitability,
        and security information and take that information into account in making
        employment offers.\",\"RequiredDocuments\":\"A complete resume is required.
        Resumes are restricted to no more than 2 pages. Illegible/unreadable resumes
        will not be considered. Your resume must show relevant experience, job title,
        duties and accomplishments. Your resume must show complete information for
        each job entry to support minimum qualifications. The following information
        should be provided in your resume, but it is acceptable to provide elsewhere
        in your application package: employer's name, starting and end dates (Mo/Yr),
        hours per week if experience was less than full time (35-40 hours per week),
        and pay plan, series and grade level (e.g. GS-0201-09) for relevant federal
        experience. TIP: A good way to ensure you include all essential information
        is to use the Resume Builder in USAJOBS to create your resume. Are you claiming
        membership in any professional organizations, or possession of a license,
        certificate or credentials? Check the Conditions of Employment section above
        to see if any are required. If you claim membership, license, certification,
        or credentials, you must submit a copy of said document in your application
        package. Are you using education as a substitute for some or all of the experience
        requirement? Is there a basic education requirement for this position? Check
        the Education section above to see what is allowed and what is required. Any
        claims you make in your resume or assessment questionnaire regarding education
        or degrees MUST be supported by submitting with your application official
        or unofficial transcripts or a list of courses, grades earned, completion
        dates, and quarter and semester hours earned issued from your school. While
        unofficial transcripts are acceptable for initial application, an official
        transcript will ultimately be required if you are selected for the position.
        You may submit a copy your degree(s) if specific coursework does not have
        to be verified. Are you a veteran claiming 5-point veterans' preference or
        claiming sole survivorship preference? You must submit a copy of your latest
        DD-214 Certificate of Release or Discharge from Active Duty (any copy that
        shows all dates of service, as well as character of service [Honorable, General,
        etc.] is acceptable) OR a VA letter that shows dates of service or service
        connected disability AND character of service. If you have more than one DD-214
        for multiple periods of active duty service, submit a copy for each period
        of service. If you were issued a DD-215 to amend aforementioned information
        on the DD-214 you must submit that too. If you are not sure of your preference
        eligibility, visit the Department of Labor's website: Veterans' Preference
        Advisor Are you a disabled veteran or claiming 10-point veterans' preference?
        If you are eligible to claim 10 point veterans preference you must submit
        a DD-214 Certificate of Release or Discharge from Active Duty as described
        above for 5-point preference. You must also provide the applicable supporting
        documentation of your disability (e.g. disability letter from the VA) as described
        on Standard Form-15 (SF-15). http://www.opm.gov/forms/pdf_fill/SF15.pdf. Are
        you an active duty service member? Active Duty Service Members are required
        to submit a statement of service printed on command letterhead and signed
        by the command. The statement of service must provide the branch of service,
        rate/rank, all dates of service, the expected date of discharge and anticipated
        character of service (Honorable, General, etc.). Documents submitted as part
        of the application package, to include supplemental documents, may be shared
        beyond the Human Resources Office. Some supplemental documents contain personal
        information such as SSN and DOB and some documents such as military orders
        and marriage certificates may contain personal information for someone other
        than you. You may sanitize these documents to remove said personal information
        before you submit your application. You must provide an un-sanitized version
        of the documents if you are selected.\",\"Benefits\":\"\",\"BenefitsUrl\":\"http://www.secnav.navy.mil/donhr/Benefits/Pages/Default.aspx\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"The
        Secretary of Defense has ordered a department-wide hiring freeze subject to
