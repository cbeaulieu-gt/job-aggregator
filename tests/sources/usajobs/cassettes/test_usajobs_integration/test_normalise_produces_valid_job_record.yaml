        based on possessing a current Professional Engineer (PE) license, or passing
        the Engineer in Training (EIT) exam, please provide a copy of PE license or
        written documented proof of passing the EIT. DISPLACED EMPLOYEES: If requesting
        consideration under the Career Transition Assistance Program (CTAP) or Interagency
        CTAP program (ICTAP), you must meet the standards for this vacancy and provide
        all of the following documents: your most recent performance appraisal, the
        proof of eligibility letter from the Agency, and your most current SF-50,
        displaying current series and grade. Qualified CTAP/ICTAP candidates receive
        priority and will be referred to the hiring manager. For more information,
        please review the OPM Employee's Guide to Career Transition. Failure to submit
        any of the required documents by the closing date of the vacancy will result
        in your removal from consideration for this position. Please review your application
        prior to final submission and ensure you have submitted all appropriate documents.
        Uploading documents to USA Jobs does NOT ensure inclusion with your application
        to our system. You must verify that the documents are in the system with your
        application prior to final submission.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.opm.gov/healthcare-insurance/Guide-Me/New-Prospective-Employees/\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"The
