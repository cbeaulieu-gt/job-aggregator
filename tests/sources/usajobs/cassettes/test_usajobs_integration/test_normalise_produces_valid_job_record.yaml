        FBI's mission is to protect the American people and uphold the Constitution
        of the United States. We employ 38,000 people at locations around the globe.
        In addition to our Headquarters in Washington, D.C., we have 56 Field Offices
        in major U.S. cities, plus more than 350 satellite offices, called resident
        agencies, in cities and towns across the nation. In addition, we have more
        than 60 international offices, called legal attaches (legats), in U.S. embassies
        worldwide.\",\"TravelCode\":\"1\",\"MajorDuties\":[\"Plan and conduct investigations
        of potential violations of federal laws. Exercise judgement, resourcefulness,
        and versatility in meeting investigative demands. Create and maintain effective
        liaison relationships with federal, state, local, tribal, territorial and
        international law enforcement agencies. Coordinate and/or participate in searches,
        seizures, and arrests. Carry a firearm and be willing to use force, to include
        deadly force, if necessary. Maintain a level of physical fitness to ensure
        readiness required to perform law enforcement duties.\"],\"Education\":\"Must
        have a bachelor's degree or higher from a U.S. accredited college or university.\",\"Requirements\":\"Be
        a U.S. Citizen Have a bachelor's degree or higher from a U.S. accredited college
        or university. Possess full-time professional work experience. Be eligible
        for a Top-Secret SCI Clearance. Be able to legally possess / carry a firearm.
        Be at least 23 years old and not have reached your 37th birthday on appointment;
        exceptions may apply. Meet the FBI's Employment Eligibility requirements.
        Meet the medical and physical requirements of the position. Possess a valid
        driver's license with at least six months driving experience. Be available
        for assignment to any of the FBI's 56 Field Offices. Travel may be required.
        Please note: Applicants must be U.S. citizens and consent to a complete background
        investigation, urinalysis, and polygraph. You must be suitable for federal
        employment as determined by a background investigation.\",\"Evaluations\":\"SPECIAL
        AGENT APPLICATION PROCESS The application process includes the following steps,
        each of which must be successfully completed. Applicants who meet the initial
        screening criteria will receive an email invitation to take the Phase I exam.
        Step 1: Application and Screening Step 2: Phase I Test Step 3: Meet and Greet
        Information Session Step 4: Official Physical Fitness Test (PFT) Step 5: Phase
        II Test Step 6: Conditional Appointment Offer Step 7: Background Investigation
        Step 8: Fit for Duty Medical Review Step 9: Pre-Quantico Physical Fitness
        Test (PFT) (if applicable) Step 10: Basic Field Training Course Finish: Career
        Placement All applicants will be rated on the following Competencies: Collaboration
        Communication Flexibility/Adaptability Initiative Interpersonal Ability Leadership
        Organizing and Planning Problem Solving and Judgment\",\"HowToApply\":\"To
        apply for the Special Agent position, please click here.\",\"WhatToExpectNext\":\"You
        are strongly encouraged to review the Special Agent Selection Process: All
        You Need to Know to Apply guide before beginning the application process.
        This guide provides helpful information about the application and selection
        for the Special Agent position.\",\"RequiredDocuments\":\"Utilizing the Resume
