        -- college-level education, training, and/or technical experience that furnished
        (1) a thorough knowledge of the physical and mathematical sciences underlying
        professional engineering, and (2) a good understanding, both theoretical and
        practical, of the engineering sciences and techniques and their applications
        to one of the branches of engineering. The adequacy of such background must
        be demonstrated by one of the following: Professional Registration or Licensure
        -- Current registration as an Engineer Intern (EI), Engineer in Training (EIT),
        or licensure as a Professional Engineer (PE) by any State, the District of
        Columbia, Guam, or Puerto Rico. Absent other means of qualifying under this
        standard, those applicants who achieved such registration by means other than
        written test (e.g., State grandfather or eminence provisions) are eligible
        only for positions that are within or closely related to the specialty field
        of their registration. For example, an applicant who attains registration
        through a State Board's eminence provision as a manufacturing engineer typically
        would be rated eligible only for manufacturing engineering positions. Written
        Test -- Evidence of having successfully passed the Fundamentals of Engineering
        (FE) examination or any other written test required for professional registration
        by an engineering licensure board in the various States, the District of Columbia,
        Guam, and Puerto Rico. Specified academic courses -- Successful completion
