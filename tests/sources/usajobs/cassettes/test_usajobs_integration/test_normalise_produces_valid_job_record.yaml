        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"You
        will serve as an ENGINEERING TECHNICIAN in the Rapid Innovation Branch (Code
        100TO.32), Innovation and Technology Insertion Division (Code 100TO.3), Transformation
        Office (Code 100TO) of NORFOLK NAVAL SHIPYARD.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"11\",\"HighGrade\":\"11\",\"PromotionPotential\":\"11\",\"OrganizationCodes\":\"DD/NV60\",\"Relocation\":\"False\",\"HiringPath\":[\"fed-transition\",\"disability\",\"fed-internal-search\",\"land\",\"mspouse\",\"special-authorities\",\"vet\"],\"MCOTags\":[\"NatSec\"],\"TotalOpenings\":\"2\",\"AgencyMarketingStatement\":\"The
        Navy and Marine Corps team offers innovative, exciting and meaningful work
        linking military and civilian talents to achieve our mission and safeguard
        our freedoms. Department of the Navy provides competitive salaries, comprehensive
        benefits, and extensive professional development and training. From pipefitters
        to accountants, scientists to engineers, doctors to nurses-the careers and
        opportunities to make a difference are endless. Civilian careers-where purpose
        and patriotism unite!\",\"TravelCode\":\"1\",\"ApplyOnlineUrl\":\"https://apply.usastaffing.gov/Application/Apply\",\"DetailStatusUrl\":\"https://apply.usastaffing.gov/Application/ApplicationStatus\",\"MajorDuties\":[\"You
        will develop Computer Aided Design (CAD) models and the Technical Documentation
        Package (TDP) using techniques to optimize 3D printing capabilities.\",\"You
        will operate and maintain a range of prototyping equipment, including CNC
        machines, 3D printers, laser cutters, and other fabrication tools.\",\"You
        will assist management personnel with long range planning of rapid prototyping
        equipment selection, procurement, infrastructure modification and equipment
        installation, instruction, and utilization.\",\"You will manage inventory
        of build materials and supplies, ensuring availability for upcoming project.\",\"You
        will keep accurate records of prototyping projects, including design files,
        material usage, estimated cost, and production times.\",\"You will participate
        in discussions and meetings with staff members as necessary to obtain pertinent
        details of projects assigned.\"],\"Education\":\"\",\"Requirements\":\"\",\"Evaluations\":\"In
        order to qualify for this position, your resume must provide sufficient experience
        and/or education, knowledge, skills, and abilities to perform the duties of
        the specific position for which you are being considered. Your resume is the
        key means we have for evaluating your skills, knowledge, and abilities as
        they relate to this position. Therefore, we encourage you to be clear and
        specific when describing your experience. When the application process is
        complete, we will review your resume to ensure you meet the hiring eligibility
        and qualification requirements listed in this announcement. You will be rated
        based on the information provided in your resume and application package,
        along with your supporting documentation to determine your ability to demonstrate
        the following competencies: COMPUTER LITERACY PARTERING WRITTEN COMMUNICATION
        ORAL COMMUNICATION PROBLEM SOLVING QUALITY ASSURANCE This recruitment will
        utilize the following technical assessment tools: Structured Resume Review
        and Structured Interview. You should list any relevant performance appraisals
        and incentive awards in your resume as that information may be taken into
        consideration during the selection process. If selected, you may be required
        to provide supporting documentation. Please follow all instructions carefully.
        Errors or omissions may affect your rating or consideration for employment.
        All qualifications requirements must be met by the closing date of this announcement.\",\"HowToApply\":\"Click
        the Apply Online button to create an account or log in to your existing USAJOBS
        account. To apply for this position, you must provide a complete Application
        Package which includes: 1. Complete resume with relevant experience, job title,
        duties and accomplishments. Resumes are restricted to no more than 2 pages.
        Illegible/unreadable resumes will not be considered. Your resume must show
        complete information for each job entry to support minimum qualifications.
        The following information should be provided in your resume: employer's name,
        starting and end dates (Mo/Yr), hours per week if experience was less than
        full time (35-40 hours per week), pay plan, series and grade level (e.g. GS-0201-09)
        for relevant federal experience. TIP: A good way to ensure you include all
        essential information is to use the Resume Builder in USAJOBS to create your
        resume. 2. Supporting documentation Failure to submit a complete application
        package will result in an ineligible rating and loss of consideration. Your
        complete application must be received by 11:59 pm Eastern Standard Time (EST)
        on 04/30/2026. Applications received after 04/30/2026 will generally result
        in an ineligible rating and loss of consideration. If more than one resume
        is received, only the last resume received and processed will be reviewed.
        Note: To check the status of your application or return to a previous or incomplete
        application, log into your USAJOBS account: https://mydon.usajobs.gov/Account/Login
        select Application Status, and click on the more information link under the
        application status for this position. Your uploaded documents may take several
        hours to clear the virus scan process so please plan appropriately. You are
        encouraged to apply online. Applying online will allow you to review and track
        the status of your application. Do not email or send hard copy resumes/applications
        to the Contact Information or Agency Information listed in this vacancy announcement.
        All resumes/applications received at the addresses listed in the Contact Information
        or Agency Information will be destroyed and will not be considered for this
        vacancy announcement. It is the applicant's responsibility to verify that
        all information in their resume and documents are legible and accurate. HR
        will not modify answers/documents submitted by an applicant.\",\"WhatToExpectNext\":\"When
        the application process is complete, your complete application will be reviewed
        to determine if you meet the hiring eligibility and qualification requirements
        for which you requested consideration. You will be rated based on the information
        provided in your resume and technical assessment(s), along with your supporting
        documentation to determine your level of knowledge, skill, and ability related
        to the job requirements. Generally, only best qualified candidates will be
        referred to the hiring manager. Sometimes well qualified and minimally qualified
        candidates are referred. Occasionally, candidates eligible for priority consideration
        are referred, and no other candidates are referred. The hiring manager may
        choose to conduct interviews. You will be notified of our rating and referral
        decision. If you are referred, you will be notified when a hiring decision
        is made. NOTE: If you have any questions or need assistance, please email
        the DON Employment Information Center at DONEIC@us.navy.mil\",\"RequiredDocuments\":\"You
        are required to provide documentation that supports the eligibility and qualification
        claims made in your resume. You must submit the applicable documents listed
        here and those listed with the eligibilities you select in the announcement
        questionnaire with your application package. Applicants who do not provide
        supporting documentation that fully support their claims will not be referred
        to the hiring manager. Cover letter is optional. A complete resume is required.
        Resumes are restricted to no more than 2 pages. Illegible/unreadable resumes
        will not be considered. Your resume must show relevant experience, job title,
        duties and accomplishments. Your resume must show complete information for
        each job entry to support minimum qualifications. The following information
        should be provided in your resume: employer's name, starting and end dates
        (Mo/Yr), hours per week if experience was less than full time (35-40 hours
        per week), pay plan, series and grade level (e.g. GS-0201-09) for relevant
        federal experience. TIP: A good way to ensure you include all essential information
        is to use the Resume Builder in USAJOBS to create your resume. Are you applying
        for a promotion? For GS positions, to be considered for a promotion, you must
        provide SF-50(s) that shows you held the next lower GS grade for at least
        one year. SF-50s that have an effective date within the past year (e.g., General
        Adjustment SF-50 from this year or Within Rate/Grade Increases (WRI/WGI) SF-50
        within a year) do not clearly show that you meet the one-year time-in-grade
        requirement. That means if you submit an SF-50 dated within the last year,
        you must submit another SF-50 dated more than one year ago to clearly demonstrate
        you meet the time-in-grade requirements. If you are a DoD employee, you can
        obtain a copy of your SF- 50(s) from MyBiz. Are you claiming membership in
        any professional organizations, or possession of a license, certificate or
        credentials? Check the Conditions of Employment section above to see if any
        are required. If you claim membership, license, certification, or credentials,
        you must submit a copy of said document in your application package. Are you
        using education as a substitute for some or all of the experience requirement?
        Is there a basic education requirement for this position? Check the Education
        section above to see what is allowed and what is required. Any claims you
        make in your resume regarding education or degrees MUST be supported by submitting
        with your application official or unofficial transcripts or a list of courses,
        grades earned, completion dates, and quarter and semester hours earned issued
        from your school. While unofficial transcripts are acceptable for initial
        application, an official transcript will ultimately be required if you are
        selected for the position. You may submit a copy your degree(s) if specific
        coursework does not have to be verified. Are you a veteran claiming 5-point
        veterans' preference or claiming sole survivorship preference? You must submit
        a copy of your latest DD-214 Certificate of Release or Discharge from Active
        Duty (any copy that shows all dates of service, as well as character of service
        [Honorable, General, etc.] is acceptable) OR a VA letter that shows dates
        of service or service connected disability AND character of service. If you
        have more than one DD-214 for multiple periods of active duty service, submit
        a copy for each period of service. If you were issued a DD-215 to amend aforementioned
        information on the DD-214 you must submit that too. If you are not sure of
        your preference eligibility, visit the Department of Labor's website: Veterans'
        Preference Advisor Are you a disabled veteran or claiming 10-point veterans'
        preference? If you are eligible to claim 10 point veterans preference you
        must submit a DD-214 Certificate of Release or Discharge from Active Duty
        as described above for 5-point preference. You must also provide the applicable
        supporting documentation of your disability (e.g. disability letter from the
        VA) as described on Standard Form-15 (SF-15). http://www.opm.gov/forms/pdf_fill/SF15.pdf.
        Are you an active duty service member? Active Duty Service Members are required
        to submit a statement of service printed on command letterhead and signed
        by the command. The statement of service must provide the branch of service,
        rate/rank, all dates of service, the expected date of discharge and anticipated
        character of service (Honorable, General, etc.). Application documents, including
        supplemental ones, may be shared outside the Human Resources Office. Supplemental
        documents may contain your SSN, DOB, or personal information of others (e.g.,
        on military orders, marriage certificates). You may redact this information
        before submitting; however, if selected, you must provide unredacted originals.\",\"Benefits\":\"\",\"BenefitsUrl\":\"http://www.secnav.navy.mil/donhr/Benefits/Pages/Default.aspx\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"This
