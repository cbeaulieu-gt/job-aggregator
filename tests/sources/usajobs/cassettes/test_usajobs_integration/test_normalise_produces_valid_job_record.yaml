        Massachusetts\",\"Longitude\":-71.0567,\"Latitude\":42.358635}],\"OrganizationName\":\"Defense
        Contract Management Agency\",\"DepartmentName\":\"Department of Defense\",\"SubAgency\":\"DCMA
        Special Programs (P4)\",\"JobCategory\":[{\"Name\":\"Computer Engineering\",\"Code\":\"0854\"}],\"JobGrade\":[{\"Code\":\"NH\"}],\"PositionSchedule\":[{\"Name\":\"\",\"Code\":\"1\"}],\"PositionOfferingType\":[{\"Name\":\"\",\"Code\":\"15317\"}],\"QualificationSummary\":\"To
        qualify for an Interdisciplinary Engineer position your resume and supporting
        documentation must support: A. Basic Requirement: A Bachelor's Degree or higher
        in professional engineering. To be acceptable, the program must: (1) be in
        a school of engineering with at least one program accredited by the Accreditation
        Board for Engineering and Technology (ABET) as a professional engineering
        curriculum; or (2) include differential and integral calculus and courses
        (more advanced than first-year physics and chemistry) in five of the following
        seven areas of engineering science or physics: (a) statics, dynamics; (b)
        strength of materials (stress-strain relationships); (c) fluid mechanics,
        hydraulics; (d) thermodynamics; (e) electrical fields and circuits; (f) nature
        and properties of materials (relating particle and aggregate structure to
        properties); and (g) any other comparable area of fundamental engineering
        science or physics, such as optics, heat transfer, soil mechanics, or electronics.
        OR A combination of education and experience -- college-level education, training,
        and/or technical experience that furnished (1) a thorough knowledge of the
        physical and mathematical sciences underlying professional engineering, and
        (2) a good understanding, both theoretical and practical, of the engineering
        sciences and techniques and their applications to one of the branches of engineering.
        The adequacy of such background must be demonstrated by one of the following:
        Professional Registration or Licensure -- Current registration as an Engineer
        Intern (EI), Engineer in Training (EIT), or licensure as a Professional Engineer
        (PE) by any State, the District of Columbia, Guam, or Puerto Rico. Absent
        other means of qualifying under this standard, those applicants who achieved
        such registration by means other than written test (e.g., State grandfather
        or eminence provisions) are eligible only for positions that are within or
        closely related to the specialty field of their registration. For example,
        an applicant who attains registration through a State Board's eminence provision
        as a manufacturing engineer typically would be rated eligible only for manufacturing
        engineering positions. Written Test -- Evidence of having successfully passed
        the Fundamentals of Engineering (FE) examination or any other written test
        required for professional registration by an engineering licensure board in
        the various States, the District of Columbia, Guam, and Puerto Rico. Specified
        academic courses -- Successful completion of at least 60 semester hours of
        courses in the physical, mathematical, and engineering sciences and in engineering
        that included the courses specified in the Basic Requirements above. The courses
        must be fully acceptable toward meeting the requirements of a professional
        engineering curriculum as described in the Basic Requirements above. Related
        curriculum -- Successful completion of a curriculum leading to a bachelor's
        degree in an appropriate scientific field, e.g. engineering technology physics,
        chemistry, architecture, computer science, mathematics, hydrology, or geology,
        may be accepted in lieu of a bachelor's degree in engineering, provided the
        applicant has had at least 1 year of professional engineering experience acquired
        under professional engineering supervision and guidance. Ordinarily there
        should be either an established plan of intensive training to develop professional
        engineering competence, or several years of prior professional engineering-type
        experience, e.g., in interdisciplinary positions. AND C. Specialized Experience:
        In addition to the basic requirement above, you must possess one year of specialized
        experience that equipped you with the competencies to successfully perform
        the duties of the position and is directly in or related to this position.
        To qualify for the NH-03 level, specialized experience must be at the NH-02
        or GS-11 grade level or equivalent under other pay systems in the Federal
        service, military, or private sector. Creditable specialized experience includes:
        Applying software engineering and analysis principles, concepts, and standards
        in support of complex defense acquisition systems. Performing oversight of
        the Software Development Life Cycle for major Acquisition programs and provide
        technical support pertaining to embedded software, missile systems, and sensor
        technologies. Conducting reviews of contracts and in conducting reviews of
        contractor performance; proposing and providing technical advice on changes
        relating to contract applications/developments. Leadership capacity conducting
        engineering and analytical surveillance on substantive/critical and unique
        changes of advanced engineering functions implementing agency policy, and
        new/developmental processes.\",\"PositionRemuneration\":[{\"MinimumRange\":\"102475\",\"MaximumRange\":\"156715\",\"RateIntervalCode\":\"PA\",\"Description\":\"Per
        Year\"}],\"PositionStartDate\":\"2026-04-09T12:02:28.5630\",\"PositionEndDate\":\"2026-04-24T23:59:59.9970\",\"PublicationStartDate\":\"2026-04-09T12:02:28.5630\",\"ApplicationCloseDate\":\"2026-04-24T23:59:59.9970\",\"PositionFormattedDescription\":[{\"Label\":\"Dynamic
