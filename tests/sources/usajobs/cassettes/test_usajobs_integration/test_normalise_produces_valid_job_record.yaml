        Hire Competency Based Assessments, based on your adjudication decision. You
        must complete all assessments within 48 hours of receiving the URL to access
        the USA Hire Competency Based Assessments if you received the link after the
        close of the announcement. To determine if you need a RA, please review the
        : Procedures for Requesting a Reasonable Accommodation for Online Assessments.\",\"KeyRequirements\":[],\"WithinArea\":\"False\",\"CommuteDistance\":\"0\",\"ServiceType\":\"01\",\"AnnouncementClosingType\":\"01\",\"AgencyContactEmail\":\"eagle.jennifer.s@dol.gov\",\"AgencyContactPhone\":\"617-565-2546\",\"SecurityClearance\":\"Not
