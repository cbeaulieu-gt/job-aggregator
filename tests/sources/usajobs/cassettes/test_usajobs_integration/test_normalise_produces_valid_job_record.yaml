        Teaser\",\"LabelDescription\":\"Hit highlighting for keyword searches.\"}],\"UserArea\":{\"Details\":{\"JobSummary\":\"As
        an electronic engineer you will be responsible for implementing automated
        grain flow security and weighing and/or inspection systems, as applicable
        to electronic scales, telecommunications, display and information systems,
        as well as computer hardware and software for all facilities under the purview
        of the U.S. Grain Standards Act and Agricultural Marketing Act that incorporate
        such systems.\",\"WhoMayApply\":{\"Name\":\"\",\"Code\":\"\"},\"LowGrade\":\"12\",\"HighGrade\":\"12\",\"PromotionPotential\":\"13\",\"SubAgencyName\":\"Marketing
        and Regulatory Programs\",\"OrganizationCodes\":\"AG/AG02\",\"Relocation\":\"True\",\"HiringPath\":[\"fed-transition\",\"public\"],\"MCOTags\":[],\"TotalOpenings\":\"1\",\"AgencyMarketingStatement\":\"You
        can make a difference! The U.S. Department of Agriculture's (USDA) Marketing
        and Regulatory Programs (MRP) needs bright, energetic and committed professionals
        to facilitate the domestic and international marketing of U.S. agricultural
        products and to protect the health and care of animals and plants in the United
        States. We operate in domestic and global markets. Be part of an organization
        that protects the health and agriculture of the American people. Join our
        team! To learn more about what it's like to work at the Agricultural Marketing
        Service, what the agency does, and the types of careers, please visit the
        AMS careers site.\",\"TravelCode\":\"1\",\"ApplyOnlineUrl\":\"https://apply.usastaffing.gov/Application/Apply\",\"DetailStatusUrl\":\"https://apply.usastaffing.gov/Application/ApplicationStatus\",\"MajorDuties\":[\"The
        duties described are for the full-performance level. At developmental grade
        levels, assignments will be of more limited scope, performed with less independence
        and limited complexity.\",\"The duties may include, but are not limited to:\",\"Designs
        and supervises construction and installation of specialized electronic equipment
        and interfaces this customized equipment with current standardized official
        systems.\",\"Prepares or reviews feasibility studies, special reports, and
        investigations on problems that relate to the standardized official system\u2019s
        uses, needs, and requirements.\",\"Responsible for developing and maintaining
        Standard Operating Procedures, training and interpretation of standards and
        policy as related to automated systems, weighing operation, scale installation
        and testing.\",\"Acts as liaison with private and professional engineering
        firms on engineering problems relating to projects being developed.\",\"Provides
        professional engineering design advice and guidance to contractor\u2019s technical
        personnel.\",\"Represents Grain Inspection, at technical conferences as applicable.\"],\"Education\":\"Please
        see above for education qualification requirement information.\",\"Requirements\":\"\",\"Evaluations\":\"Applications
        will be evaluated in accordance with Office of Personnel Management's (OPM)
        Delegated Examining Procedures and USDA policy using category rating. This
        means you will be evaluated based on how well you meet the qualifications
        listed in this vacancy announcement. Your qualifications will be evaluated
        based on your application materials (e.g., resume, supporting documents),
        your responses to the application questionnaire, and your responses to all
        assessments required for this position. Applicants who meet basic minimum
        qualifications will be placed in one of three categories: Best Qualified,
        Well Qualified, or Qualified. Within these categories, applicants eligible
        for veteran's preference will receive selection priority over non-veterans.
        Category placement will be determined based on applicants' quality of experience
        and the extent they possess the following competencies (knowledge, skills,
        abilities (KSAs), and other characteristics): Attention to Detail Customer
        Service Decision Making Flexibility Integrity/Honesty Interpersonal Skills
        Learning Reading Comprehension Reasoning Self-Management Teamwork Overstating
        your qualifications and/or experience in your application materials or application
        questionnaire may result in your removal from consideration. Cheating on an
        assessment may also result in your removal from consideration. Your application,
        including the online Assessment Questionnaire, will be reviewed to determine
        if you meet (a) minimum qualification requirements and (b) the resume supports
        the answers provided to the job-specific questions. Your resume must clearly
        support your responses to all the questions addressing experience and education
        relevant to this position. Those determined to be in the best qualified category
        will be referred to the selecting official for consideration. Note: If, after
        reviewing your resume and/or supporting documentation, a determination is
        made that you have inflated your qualifications and or experience, your score
        may be adjusted to more accurately reflect your abilities, or you may be found
        ineligible. Please follow all instructions carefully. Errors or omissions
        may affect your rating. Providing inaccurate information on Federal documents
        could be grounds for non-selection or disciplinary action up to including
        removal from the Federal service. Cheating on the online assessment may also
        result in your removal from consideration. To preview the application questionnaire,
        please visit: https://apply.usastaffing.gov/ViewQuestionnaire/12934352\",\"HowToApply\":\"Please
        read the entire announcement and all the instructions before you begin an
        application. To apply and be considered for this position, you must complete
        all required questionnaires, assessments, and required documentation as specified
        in the How to Apply and Required Documents section. The complete application
        package must be submitted by 11:59 PM (ET) on the closing date of the announcement
        to receive consideration. Resume cannot exceed two pages. The application
        process is as follows: 1: Create a USAJOBS account (if you do not already
        have one) at www.usajobs.gov. It is recommended that as part of your profile
        you set up automatic email notification to be informed when the status of
        your application changes. If you choose not to set up this automatic notification,
        then you will have to log into your USAJOBS account to check on the status
        of your application. 2: Create a Resume with USAJOBS or upload a Resume into
        your USAJOBS account. You may want to customize your resume to ensure it documents
        duties and accomplishments you have gained that are directly related to this
        position in order to verify that qualifications are met. In addition, your
        resume must support your responses to the online questionnaire (you may preview
        the online questionnaire by clicking on the link at the end of the How You
        Will Be Evaluated section of the job announcement). 3: Click \\\"Apply Online\\\"
        and follow the prompts to complete the Occupational Questionnaire and attach
        any additional documents that may be required. You can update your application
        or documents anytime while the announcement is open. Simply log into your
        USAJOBS account and click on \\\"Application Status.\\\" Click on the position
        title, and then select \\\"Update Application\\\" to continue. 4: If you are
        required to take the USA Hire Competency Based Assessments, you will be notified
        after submitting your application. The notification will be provided in your
        application submission screen and via email. The notification will include
        your unique assessment access link to the USA Hire system and the completion
        deadline. Additionally, in USAJOBS you can click \\\"Track this application\\\"
        to return to your assessment completion notice. 5: Access USA Hire using your
        unique assessment link. Access is granted through your USAJOBS login credentials.
        Review all instructions prior to beginning your assessments. You will have
        the opportunity to request a testing accommodation before beginning the assessments
        should you have a disability covered under the Rehabilitation Act of 1973
        as amended. 6: Set aside at least 2 hours to take the USA Hire Assessments;
        however, most applicants complete the assessments in less time. If you need
        to stop the assessments and continue later, you can re-use your unique assessment
        link. 7: Your responses to the USA Hire Assessments will be reused for one
        year (in most cases) from the date you complete an assessment. If future applications
        you submit require completion of the same assessments, your responses will
        be automatically reused. Visit the USA Hire Applicant Resource Center for
        practice assessments and assessment preparation resources at https://support-usahire.opm.gov/hc/en-us.
        To update your application, including supporting documentation: During the
        announcement open period, return to your USAJOBS account, find your application
        record, and click Edit my application. This option will no longer be available
        once the announcement has closed. To view the announcement status or your
        application status: Click on this: https://www.usajobs.gov/Help/how-to/application/status/.
        Your application status page is where you can view your application status,
        USA Hire assessment completion status, and review your notifications sent
        by the hiring agency regarding your application. NOTE: Please verify that
        documents you are uploading from USAJOBs transfer into the Agency's staffing
        system as there is a limitation to the number of documents that can be transferred.
        However, once in the Agency's staffing system, you will have the opportunity
        to upload additional documents. Uploaded documents must be less than 5MB and
        in one of the following document formats: GIF, JPG, JPEG, PNG, RTF, PDF, TXT
        or Word (DOC or DOCX). Do not upload Adobe Portfolio documents because they
        are not viewable. Only one resume will be reviewed. Applicants who submit
        a resume that exceeds two pages will be removed from consideration.\",\"WhatToExpectNext\":\"If
        you set up your USAJOBS account to send automatic email notifications, your
        will receive an email acknowledging: 1) the submission of your online Occupational
        Questionnaire and resume was successful, 2) if you were referred to the selecting
        official for consideration, and 3) if you were selected or not selected. Your
        application will be reviewed to verify that you meet the eligibility and qualification
        requirements for the position prior to issuing referral lists to the selecting
        official. If further evaluation or interviews are required, you will be contacted.
        Log in to your USAJOBS account to check your application status. We expect
        to make a final job offer approximately 40 days after the deadline for applications.
        Multiple positions may be filled from this announcement. This announcement
        may also be used to fill additional like vacancies, including vacancies elsewhere
        within the agency or other USDA organizations. As a condition of employment
        for accepting this position, you will be required to serve a 1-year probationary
        period during which we will evaluate your fitness and whether your continued
        employment advances the public interest. In determining if your employment
        advances the public interest, we may consider: your performance and conduct;
        the needs and interests of the agency; whether your continued employment would
        advance organizational goals of the agency or the Government; and whether
        your continued employment would advance the efficiency of the Federal service.
        Upon completion of your probationary period your employment will be terminated
        unless you receive certification, in writing, that your continued employment
        advances the public interest. Under the Fair Chance Act, agencies are not
        allowed to request information about an applicant's criminal history until
        a conditional offer of employment has been made, except as allowed for access
        to classified information; assignment to national security duties or positions;
        acceptance or retention in the armed forces; or recruitment of a Federal law
        enforcement officer. An applicant may submit a complaint or any other information
        related to an organization's alleged noncompliance with the Fair Chance Act.
        The complaint must be submitted within 30 calendar days of the date of the
        alleged noncompliance. To make a Fair Chance Act inquiry or complaint, send
        an email with the appropriate information to MRP.Fairchance@usda.gov, subject
        line: Fair Chance Act.\",\"RequiredDocuments\":\"The following documents are
        required for your applicant package to be complete. Our office cannot be responsible
        for incompatible software, your system failure or downtime, etc. Encrypted
        documents will not be accepted. Failure to submit required, legible documents
        may result in loss of consideration. Resume that includes: 1) personal information
        such as name, address, contact information; 2) education; 3) detailed work
        experience related to this position as described in the major duties including
        work schedule, hours worked per week, dates of employment; title, series,
        grade (if applicable); 4) other qualifications; and 5) supervisors name and
        phone number for each work period listed and whether or not they may be contacted
        for reference checks. Resume cannot exceed two pages. Only one resume will
        be reviewed. If education is required or you are using education to qualify,
        you must submit a copy of your college transcripts. An unofficial copy is
        sufficient with the application if it includes your name and the necessary
        course information; however, if you are selected, you will be required to
        submit official transcripts prior to entering on duty. Education must have
        been successfully obtained from an accredited school, college or university.
        If you are using education completed in foreign colleges or universities to
        meet the qualification requirements, you must show that the education credentials
        have been evaluated by a private organization that specializes in interpretation
        of foreign education programs and such education has been deemed equivalent
        to that gained in an accredited U.S. education program. For further information,
        visit the following: Foreign Education Evaluation. All transcripts must be
        in English or include an English translation. If you are using Professional
        Registration or Licensure to qualify, you must submit Proof of Professional
        Registration or Licensure such as current registration as an Engineer Intern
        (EI), Engineer in Training (EIT), licensure as a Professional Engineer (PE),
        or Written test (e.g. Fundamentals of Engineering). For more information about
        EI and EIT registration requirements, please visit the National Society of
        Professional Engineers website at: http://www.nspe.org.. If claiming veterans'
        preference, you must submit a DD214, Certificate of Release from Active Duty,
        which shows dates of service and discharge under honorable conditions. If
        currently on active duty you must submit a certification of expected discharge
        or release from active duty service under honorable conditions within 120
        days after the date the certification is submitted. The certification must
        be on the letterhead of the appropriate military branch and include the dates
        of military service. Veterans' preference must be verified prior to appointment.
        Without this documentation, you will not receive veteran's preference and
        your application will be evaluated based on the material(s) submitted. If
        claiming 10-point veterans' preference you must provide the DD214 or certification
        requirements (see above bullet), plus the proof of entitlement of this preference
        as listed on the SF-15 Application for 10-point Veterans' Preference. The
        SF-15 should be included but is not required. Failure to submit these documents
        could result in the determination that there is insufficient documentation
        to support your claim for 10-point preference. For more information on veterans'
        preference visit FEDSHIREVETS Surplus or displaced employees eligible for
        CTAP, RPL, or ICTAP priority must provide: proof of eligibility (RIF separation
        notice, notice of proposed removal for declining a transfer of function or
        directed reassignment to another commuting area, notice of disability annuity
        termination), SF-50 documenting separation (as applicable), last performance
        appraisal that is at least fully successful or its equivalent, and your most
        recent SF-50 noting position, grade level, and duty location with your application
        per 5 CFR 330. Worker's Compensation Separation: Agency certification of inability
        to place employee AND Notification of Separation OR Separation SF-50. Disability
        Annuity Termination: Notification from OPM of disability annuity termination
        AND Separation SF-50 of the last position held. Military Reserve or National
        Guard Technician Special Disability Retirement Annuity under 5 U.S.C. 8337(h)
        or 8456: Certification of special disability retirement annuity from a military
        department or National Guard Bureau AND Separation SF-50 of the last position
        held.\",\"Benefits\":\"\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"Career
        Transition Assistance Plan (CTAP), Reemployment Priority List (RPL), or Interagency
        Career Transition Assistance Plan (ICTAP): Visit the OPM website for information
        on how to apply as a CTAP, RPL, or ICTAP eligible. To exercise selection priority
        for this vacancy, CTAP/RPL/ICTAP candidates must meet the basic eligibility
        requirements and all selective factors. CTAP/ICTAP candidates must be rated
        and determined to be well qualified (or above) based on an evaluation of the
        competencies listed in the How You Will Be Evaluated section. When assessed
        through a score-based category rating method, CTAP/ICTAP applicants must receive
        a rating of at least 85 out of a possible 100. First time hires to the federal
        government normally start at the lowest rate of the salary range for the grade
        selected. Locality pay will vary based upon the selectee's duty location.
        A final salary determination will be made upon selection. Promotion Potential:
        If you are selected for a position with further promotion potential, you will
        be placed under a career development plan, and may be non-competitively promoted
        if you successfully complete the requirements and if recommended by management.
        However, promotion is neither implied nor guaranteed. Reasonable Accommodation
        (RA) Requests: If you believe you have a disability (i.e., physical or mental),
        covered by the Rehabilitation Act of 1973 as amended, that would interfere
        with completing the USA Hire Competency Based Assessments, you will be granted
        the opportunity to request a RA in your online application. Requests for RA
        for the USA Hire Competency Based Assessments and appropriate supporting documentation
        for RA must be received prior to starting the USA Hire Competency Based Assessments.
        Decisions on requests for RA are made on a case-by-case basis. If you meet
        the minimum qualifications of the position, after notification of the adjudication
        of your request, you will receive an email invitation to complete the USA
        Hire Competency Based Assessments, based on your adjudication decision. You
        must complete all assessments within 48 hours of receiving the URL to access
        the USA Hire Competency Based Assessments, if you received the link after
        the close of the announcement. To determine if you need a RA, please review
