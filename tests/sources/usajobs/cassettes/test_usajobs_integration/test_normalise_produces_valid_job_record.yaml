        in this announcement for further information regarding DHA Positions.\",\"TravelCode\":\"1\",\"ApplyOnlineUrl\":\"https://apply.usastaffing.gov/Application/Apply\",\"DetailStatusUrl\":\"https://apply.usastaffing.gov/Application/ApplicationStatus\",\"MajorDuties\":[\"GS
        Series 0801/0806/0830/0840/0850/0854/0855/0861/0893/0896 Performs (general,
        material, computer, mechanical, electrical, electronics, aerospace) engineering
