        two pages, and the font size should not be smaller than 10 pts. You will not
        be considered for this vacancy if your resume is illegible/unreadable. Additional
        information on resume requirements can be located under \\\"How To Apply\\\".
        For qualification determinations your resume must contain hours worked per
        week (if part-time) and dates of employment (i.e., month/year to month/year
        or month/year to present). If your resume does not contain this information,
        your application may be marked as insufficient and you will not receive consideration
        for this position. If you are a current Federal employee or previous Federal
