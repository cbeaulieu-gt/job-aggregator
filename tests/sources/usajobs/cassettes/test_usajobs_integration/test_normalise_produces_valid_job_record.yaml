        concepts, and practices in the collection, interpretation, and analysis of
        roadway inventory and condition data for paved and unpaved roads; AND Experience
        using computers for word processing, data reduction, database management,
        and geographic information systems (GIS)/mapping software and applying it
        to road inventory collection practices and procedures; AND Experience assisting
        with organizing and coordinating meetings and data collection activity with
        internal and external stakeholders. To qualify for the GS-11 on Education
        alone, you must have: 3 years of progressively higher level graduate education
        leading to a Ph.D. degree or Ph.D. or equivalent doctoral degree. You can
        also qualify based on a combination of higher level graduate education and
        experience. This must be fully supported by your resume and transcripts, provided
        with your application. To qualify for the GS-12 on Experience, you must have
        at least one year of experience equal or equivalent to the GS-11 it must include:
        Experience analyzing and interpreting paved and unpaved road inventory data
        and reporting to other agencies and pavement management systems; AND Experience
        in applying road inventory collection practices and procedures that include
        distance measuring, distress identification (crack detection), rut measurement,
        roughness, geometric and global positioning systems, and working with geographic
        information systems (GIS); AND Experience training others for data collection
        and in reviewing data outputs from automated vehicle collection analysis;
        AND Experience authorizing pass/fail reports and being the point of contact
        for help or resolving issues related to the vehicle or field collection. You
        cannot qualify on education at the GS-12 level; you must have experience.
        KNOWLEDGE, SKILLS AND ABILITIES (KSAs): Your qualifications will be evaluated
        on the basis of your level of knowledge, skills, abilities and/or competencies
        in the following areas: Civil Engineering - Knowledge of the concepts, principles,
        theories, and methods required to plan, design, construct, operate, and maintain
        facilities such as buildings, transportation systems, water and sanitary systems,
        and other public works systems. Transportation Engineering - Knowledge of
        the concepts, principles, theories, and methods applicable to planning, designing,
        and constructing of transportation systems including traffic analysis, signal
        analysis, highway capacity, pavement design, bridge construction, planning
        of transportation projects, environmental analysis of transportation facilities,
        and transportation network analysis. Written Communication - Writes in a clear,
        concise, organized, and convincing manner for the intended audience. Oral
        Communication - Makes clear and convincing oral presentations. Listens effectively;
        clarifies information as needed. For all types of consideration, experience
        refers to paid and unpaid experience, including volunteer work done through
        National Service programs (e.g., Peace Corps, AmeriCorps) and other organizations
        (e.g., professional, philanthropic, religious, spiritual, community, student,
        social). Volunteer work helps build critical competencies, knowledge, and
        skills and can provide valuable training and experience that translates directly
        to paid employment. You will receive credit for all qualifying experience,
        including volunteer experience. For additional information about applying
        to Federal positions, please click on the following link: https://www.opm.gov/frequently-asked-questions/employment-faq/federal-hiring/how-do-i-apply-for-federal-jobs/
        Students enrolled in a qualifying degree program can apply if the anticipated
