        experience; computer hardware, systems software, and computer systems architecture,
        modeling, and integration; and mathematics, including calculus, probability,
        statistics, discrete structures, as it relates to the design, development,
        and model maintenance of network computer systems. NOTE: Due to the use of
        120-day rosters, this period of experience may be completed within 120 days
        of the closing date of this announcement. IDEAL Candidate: Provide a technical
        authority in the areas of operating system theory, data structures, computer
        system architecture, software engineering and computer communications. Translate
        user requirements to Software features Write and maintain database procedures
        and functions using T-SQL Participate in design meetings and code reviews
        Troubleshoot and fix software bugs Write Formal software documentation Follow
        CMMI (Level 3) processes for software development Design and implement web
        application code including: Design new and modify existing database tables
        and schemas Code User interface (Razor/Blazor, .NET) CSS Stylesheets Client
        scripts Business Logic Web Application Programming Interface (API) Unit testing
        Required Experience & Skills Must be proficient in the following: .Net, JavaScript,
        CSS3, HTML5, C# Must have database experience in SQL Server 2019+, Stored
        Procedures, Table Design Must be able to work independently and within a group
        Must have the ability to communicate clearly and concisely in writing and
        speaking Must have excellent verbal and written communication skills along
        with customer interaction and presentation capability Must have the ability
        to quickly understand the customer's overall technical objectives and missions
