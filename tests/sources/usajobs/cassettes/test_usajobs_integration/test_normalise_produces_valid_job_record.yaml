        degrees and course work must be from accredited or pre-accredited institution.
        Basic requirement for 1550: Bachelor's degree in computer science or bachelor's
        degree with 30 semester hours in a combination of mathematics, statistics,
        and computer science. At least 15 of the 30 semester hours must have included
        any combination of statistics and mathematics that included differential and
        integral calculus. All academic degrees and course work must be from accredited
        or pre-accredited institution In addition to meeting the basic requirement
