        OF THIS POSITION. We strongly encourage applicants to utilize the USAJOBS
        resume builder in the creation of resumes. Please ensure EACH work history
        includes ALL of the following information: Job Title (include series and grade
        if Federal Job) Relevant work experience: should align to the Job Announcement
