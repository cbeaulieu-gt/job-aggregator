        USING EDUCATION TO QUALIFY: If position has a positive degree requirement
        or education forms the basis for qualifications, you MUST submit transcripts
        with the application. Official transcripts are not required at the time of
        application; however, if position has a positive degree requirement, qualifying
        based on education alone or in combination with experience, transcripts must
        be verified prior to appointment. An accrediting institution recognized by
        the U.S. Department of Education must accredit education. Click here to check
        accreditation. FOREIGN EDUCATION: Education completed in foreign colleges
        or universities may be used to meet the requirements. You must show proof
        the education credentials have been deemed to be at least equivalent to that
        gained in conventional U.S. education program. It is your responsibility to
        provide such evidence when applying.\",\"Requirements\":\"\",\"Evaluations\":\"Your
        application package (resume, supporting documents, and responses to the questionnaire)
        will be used to determine your eligibility, qualifications, and quality ranking
        for this position. Please follow all instructions carefully. Errors or omissions
        may affect your rating or consideration for employment. BASIS OF RATING: Your
        application will be rated under the Cut Point procedures based on the extent
        to which the quality, depth, and complexity of your experience and education
        relate to the qualification requirements. Additional points are not added
        for Veteran's Preference; however, Veteran's Preference is considered where
        applicable. Best Qualified Group: Candidates in this category possess exceptional
        skills and experience to exceed well above the minimum requirements. Fully
        Qualified Group: Candidates in this category possess good skills and experience
        above the minimum requirements. Basically Qualified Group: Candidates in this
        category meet the minimum education and/or experience requirements. The resume/documents
        you submit must support your responses to the online questionnaire. If your
        application contradicts or does not support your questionnaire responses,
        you will receive a rating of \\\"not qualified\\\" or \\\"insufficient information\\\"
        and you will not receive further consideration for this job. For additional
        information on what to include in your resume, click here. Applicants who
        meet the requirements for and apply as a non-competitive eligible that meet
        minimal qualifications and other requirements of this position, will be given
        consideration as a non-competitive candidate and will be referred unless blocked
        by an individual with priority/preference. APPRAISALS/AWARDS: Hiring Managers
        use objective methods and consider previous performance appraisals and awards
        in the selection process. Current Federal Civilian employees should list any
        relevant performance related rating and/or awards in your resume. Applicants
        who disqualify themselves will not be evaluated further.\",\"HowToApply\":\"The
        complete Application Package must be submitted by 11:59 PM (ET) on 09/30/2026
        To preview the Application Questionnaire, please click the following link:
        https://apply.usastaffing.gov/ViewQuestionnaire/12800575 To begin the process,
        click the Apply Online button to create an account or log in to your existing
        USAJOBS account. Follow the prompts to complete the application questionnaire.
        Please ensure you click the Submit My Application button at the end of the
        process. To apply for this position, you must provide a complete Application
        Package which includes: 1. Your Resume. If you submit more than one resume,
        only the most recent will be reviewed. The \\\"most recent\\\" is considered
        the resume with the latest timestamp. Resumes may not exceed two pages. The
        two-page resume ensures the most relevant experience is reviewed and considered,
        which is a common practice in both the public and private sectors. Resumes
        exceeding two pages will be removed from consideration. Additional information
        on how to complete or update your resume may be located here. For qualification
        determination your resume must contain hours worked per week and dates of
        employment (i.e., month/year to month/year or month/year to present). If your
        resume does not contain this information, your application may be marked as
        insufficient, and you will not receive consideration for this position. If
        you are a current Federal employee or previous Federal employee, provide your
