        for Federal employment. You will be able to update this information and save
        it to our account for future announcements. Step 4: Once you have completed
        the eligibility questions, you will be taken directly to the vacancy application
        questions. Answer all questions honestly and thoroughly. Step 5: Hiring Management
        offers one option that will electronically attach your documentation to your
        online application once you finish answering the questions in the job announcement.
        You may electronically upload a document directly from your computer to your
        application. Be certain to review your complete application for confirmation
        of the document uploaded and click on \\\"Finished\\\" to be returned to USAJOBS.
        IMPORTANT NOTE: If you have multiple documents of the same kind, e.g. 2 undergraduate
        transcripts from different schools or 2 SF-50s, etc., be sure that they are
        all in the same file on your computer. If you try uploading them individually,
        only the last one sent will be visible in our system. If you have any questions
        about this information, please contact the person on this announcement BEFORE
        the closing date. Step 6: Click on \\\"Finish\\\" after you have completed
        your application. Once you have submitted your application, you can check
        your status online through your Hiring Management or MY USAJOBS account. Your
        complete online application and any required supplemental documentation (e.g.,
        SF-50, etc.) must be received by 11:59 p.m. Eastern Standard Time (EST) on
        the closing date of the announcement. It is your responsibility to ensure
        that all documents are received on time and that the materials are readable.
        Failure to do so will result in your application being excluded from consideration
        for this announcement. If you are experiencing any technical difficulty with
