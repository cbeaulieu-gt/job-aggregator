        this position. If you are a current Federal employee or previous Federal employee,
        provide your pay plan, series and grade, i.e. GS-0301-09. Current Federal
        Civilian Employees may list any relevant performance related rating (given
        within the last three years) and/or incentive awards in your resume. Do NOT
        include photographs, inappropriate material, inappropriate content, nor personal
