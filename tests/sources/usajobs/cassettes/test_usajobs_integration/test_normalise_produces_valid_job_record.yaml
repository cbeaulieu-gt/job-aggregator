        REQUIREMENTS: You must be able to obtain and retain a Top Secret security
        clearance with access to SCI. In addition, you are subject to a Counterintelligence
        Polygraph examination in order to maintain access to Top Secret information.
        All employees are subject to a periodic examination on a random basis in order
        to determine continued eligibility. Refusal to take the examination may result
        in denial of access to Top Secret information, SAP, or unescorted access to
        SCIFs. Employees with SCI access and who are under NGA cognizance are required
        to submit a Security Financial Disclosure Report, SF-714, on an annual basis
