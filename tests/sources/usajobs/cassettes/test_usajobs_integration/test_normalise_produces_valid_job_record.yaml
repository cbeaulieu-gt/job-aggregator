        submitted application will be evaluated. All qualified applicants will be
        considered regardless of political affiliation, race, color, religion, national
        origin, gender, sexual orientation, marital status, age, disability, or other
        non-merit factors. DOT provides reasonable accommodations to applicants with
        disabilities. If you need a reasonable accommodation for any part of the application
        and hiring process, please notify the agency contact listed in the Agency
