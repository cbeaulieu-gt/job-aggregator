        request. Job applicants and employees are required to follow up oral requests
        in writing. Decisions on granting reasonable accommodation will be made on
        a case-by-case basis. Additional information on reasonable accommodations
        procedures or on EEO Programs is available on Office of Civil Rights (ACR)
        or by contacting the local FAA Civil Rights Office.\",\"RequiredDocuments\":\"Transcripts
