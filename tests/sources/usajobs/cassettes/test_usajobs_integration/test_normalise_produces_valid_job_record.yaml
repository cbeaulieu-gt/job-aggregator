        Talent Readiness\",\"OrganizationCodes\":\"AF/AF1Y\",\"Relocation\":\"True\",\"HiringPath\":[\"graduates\",\"student\",\"public\"],\"MCOTags\":[],\"TotalOpenings\":\"Few\",\"AgencyMarketingStatement\":\"The
