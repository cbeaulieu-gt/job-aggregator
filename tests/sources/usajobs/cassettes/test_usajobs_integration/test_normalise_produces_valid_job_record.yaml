        the courses specified in the basic requirements under paragraph A. The courses
        must be fully acceptable toward meeting the requirements of an engineering
        program as described in paragraph A. Related curriculum -- Successful completion
        of a curriculum leading to a bachelor's degree in an appropriate scientific
