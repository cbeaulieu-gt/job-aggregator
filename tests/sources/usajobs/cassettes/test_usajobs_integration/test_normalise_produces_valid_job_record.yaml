        the virus scan process. To return to an incomplete application, log into your
        USAJOBS account and click Update Application in the vacancy announcement.
        You must re-select your resume and/or other documents from your USAJOBS account
        or your application will be incomplete.\",\"RequiredDocuments\":\"The following
        documents must be submitted by 11:59 p.m. (ET) on the vacancy closing date.
        Resumes: Required and applicants must provide a resume either by creating
        one in USAJOBS or uploading one from your profile. To receive full consideration
        for relevant and specialized experience, please list the month, year, and
        number of work hours worked for the experience listed on your resume. We also
        suggest that you preview the vacancy questions and confirm that your resume
        supports your question responses. Veterans Documents (if applicable): To be
        considered as a 5-point (TP) preference eligible, you must submit a copy of
        your DD214, Certificate of Release or Discharge from Active Duty. Your DD
        214 must show the type of discharge and dates of active duty. To claim 10-point
        (CP/CPS, XP) preference, you must submit a copy of your DD214 and the proof
        of entitlement of this preference, which is normally an official statement,
        dated 1991 or later, from the Department of Veterans Affairs certifying to
        the present existence of the service-connected disability and indicating the
        percentage of your disability. In addition, a Standard Form (SF-15) should
        be included, but is not required. (For active-duty service members expecting
        honorable or general discharge or release within 120 days, click Tentative
        Preference for Active Duty). For more information, go to Feds Hire Vets -
        Veterans Preference. Displaced Employee Placement Documents: Only required
        if requesting priority consideration under CTAP or ICTAP eligibility. Unofficial
        Transcript(s) (in English) - If you are using education as a basis for qualifying
        for this position, you must submit all applicable academic transcripts demonstrating
        that you meet the qualifying educational requirements (ex. BA/BS, MA, JD,
        PhD, etc.). If specific coursework is required to qualify, you must supply
        an unofficial transcript from each academic institution in which the required
        courses were taken in order to receive credit. You may upload your unofficial
        transcript(s) as one document with a maximum size limit of 5 MB. NOTE: The
        OFFICIAL Transcript(s) MUST BE RECEIVED if you are selected, and prior to
        receiving the firm offer with a start date. Cover Letters are not mandatory
        and will not be used to verify experience but may be submitted. Do not upload
        password-protected documents. Applicants selected for employment who are not
        current DOL employees will be required to provide proof of citizenship, and
        the E-Verify system will be used to confirm the employment eligibility of
        all new hires. As a condition of employment for accepting this position, you
        may be required to serve a 1 year probationary period during which we will
        evaluate your fitness and whether your continued employment advances the public
        interest. In determining if your employment advances the public interest,
        we may consider: - your performance and conduct; - the needs and interests
        of the agency; - whether your continued employment would advance organizational
        goals of the agency or the Government; and - whether your continued employment
        would advance the efficiency of the Federal service. Upon completion of your
        1 year probationary period your employment will be terminated unless you receive
        certification, in writing, that your continued employment advances the public
        interest.\",\"Benefits\":\"\",\"BenefitsUrl\":\"https://www.dol.gov/general/jobs/vacancy-information#ben-perm\",\"BenefitsDisplayDefaultText\":true,\"OtherInformation\":\"Applicants
