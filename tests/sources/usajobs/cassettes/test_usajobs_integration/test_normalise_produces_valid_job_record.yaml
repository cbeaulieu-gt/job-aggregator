        by higher level engineers, contractors and/or customers.\"],\"Education\":\"This
        position has an education requirement. You MUST provide transcripts to support
        your educational claims. Education must be accredited by an accrediting institution
        recognized by the U.S. Department of Education. http://www2.ed.gov/admins/finaid/accred/index.html
        Please submit copies of all Transcripts to include Transferred hours - Official
        copies are not required at time of application. If selected, you will be required
        to provide official copies of all Transcripts. ***NOTE***Degree Audits are
        not accepted. If you qualify based on undergraduate education and you have
        not graduated prior to applying to this position. You may be offered a position
        contingent upon your final grade point average or class ranking. IF USING
        EDUCATION TO QUALIFY: You MUST provide transcripts to support your educational
        claims. Education must be accredited by an accrediting institution recognized
        by the U.S. Department of Education. FOREIGN EDUCATION: Education completed
        in foreign colleges or universities may be used to meet the requirements.
        You must show proof the education credentials have been deemed to be at least
        equivalent to that gained in conventional U.S. education program. It is your
        responsibility to provide such evidence when applying.\",\"Requirements\":\"\",\"Evaluations\":\"For
        DHA Positions: These positions are being filled under Direct-Hire Authority
        for the DoD for Post-Secondary Students and Recent Graduates. The Secretary
        of the Air Force has delegated authority by the Office of the Secretary of
        Defense to directly appoint qualified students and recent graduates directly
        into competitive service positions; positions may be professional or administrative
        occupations and located Air Force-Wide. Positions may be filled as permanent/term
        with a full-time/part-time work schedule. Pay will vary by geographic location.
        *** The term \\\"Current post-secondary student\\\" means a person who is
        currently enrolled and in good academic standing at a full-time program at
        an institution of higher education; and is progressing toward a baccalaureate
        or graduate degree; and has completed at least 1 year of the program. ***
        The term \\\"recent graduate\\\" means a person awarded a degree by an institution
        of higher education not more than 2 years before the date of the appointment
        of such person, except in the case of a person who has completed a period
        of obligated service in a uniform service of more than 4 years. Your latest
        resume will be used to determine your qualifications. Your application package
        (resume, supporting documents, and responses to the questionnaire) will be
        used to determine your eligibility, qualifications, and quality ranking for
        this position. Please follow all instructions carefully. Errors or omissions
        may affect your rating or consideration for employment. Your responses to
        the questionnaire may be compared to the documents you submit. The documents
        you submit must support your responses to the online questionnaire. If your
        application contradicts or does not support your questionnaire responses,
        you will receive a rating of \\\"not qualified\\\" or \\\"insufficient information\\\"
        and you will not receive further consideration for this job. Applicants who
        disqualify themselves will not be evaluated further.\",\"HowToApply\":\"The
        complete Application Package must be submitted by 11:59 PM (ET) on 09/28/2026.
        To preview the Application Questionnaire, please click the following link:
        https://apply.usastaffing.gov/ViewQuestionnaire/12806014 To begin the process,
        click the Apply Online button to create an account or log in to your existing
        USAJOBS account. Follow the prompts to complete the application questionnaire.
        Please ensure you click the Submit My Application button at the end of the
        process. To apply for this position, you must provide a complete Application
        Package which includes: 1. Your Resume. If you submit more than one resume,
        only the most recent will be reviewed. The \\\"most recent\\\" is considered
        the resume with the latest timestamp. Resumes may not exceed two pages. The
        two-page resume ensures the most relevant experience is reviewed and considered,
        which is a common practice in both the public and private sectors. Resumes
        exceeding two pages will be removed from consideration. Additional information
        on how to complete or update your resume may be located here. For qualification
        determination your resume must contain hours worked per week and dates of
        employment (i.e., month/year to month/year or month/year to present). If your
        resume does not contain this information, your application may be marked as
        insufficient, and you will not receive consideration for this position. If
        you are a current Federal employee or previous Federal employee, provide your
        pay plan, series, and grade, i.e. GS-0301-09. Current Federal Civilian Employees
        may list any relevant performance related rating (given within the last three
        years) and/or incentive awards in your resume. Do NOT include photographs,
        inappropriate material, inappropriate content, nor personal information such
        as age, gender, religion, social security number, etc., on your resume. If
        the resume you submit contains such information you will not be considered
        for this vacancy. Your name, first and last, MUST be included on your resume.
        2. A complete Application Questionnaire 3. Additional Required Documents (see
        Required Documents section). Ensure all submitted documents contain your full
        name. 4. Help recruiters find you. Make your resume and profile searchable,
        which means recruiters may contact you about possible jobs. Additional information
        may be located here. PLEASE NOTE: It is the applicant's responsibility to
        verify that information entered and/or uploaded, (i.e., resume) is received,
        accurate, and submitted by the closing date. You may verify your documents
        have been processed with your application package successfully. You can access
        your USAJOBS account to do so by clicking here. Uploaded documents may take
        up to one hour to clear the virus scan. Human Resources WILL NOT modify or
        change any answers submitted by an applicant.\",\"WhatToExpectNext\":\"After
        you submit your application, you will be contacted if further evaluation or
        interviews are required. Your application will remain active through the open
        period of this Public Notice. Once this Public Notice closes, you must reapply.\",\"RequiredDocuments\":\"The
        following documents are required and must be provided with your application
        for this Public Notice. Applicants who do not submit required documentation
        to determine eligibility and qualifications will be eliminated from consideration.
        Other documents may be required based on the eligibility/eligibilities you
        are claiming. Click here to view the AF Civilian Employment Eligibility Guide
        and the required documents you must submit to substantiate the eligibilities
