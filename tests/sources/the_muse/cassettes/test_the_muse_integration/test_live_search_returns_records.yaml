        "company": {"id": 1535, "short_name": "etrade", "name": "E*TRADE"}}, {"contents":
        "<p>Like most people, you\u2019ve likely been on Zoom or Google Meets every
        day for the past year and have found it to be a subpar replacement for real
        life conversation. Interested in building the future of virtual interaction?</p>\n\n<p>Join
        the Pilotly team, the first market research platform built for creative content.
        By allowing viewers to give feedback in real-time on unreleased content, we
        help the largest content creators around the world make better decisions through
        data.\u00a0<strong>Our latest product offering is the most advanced virtual
        focus group platform available, and we want to expand our team with great
        web developers who have experience in video chat.</strong></p>\n\n<p>There
        are many nuances of human interaction that have yet to be considered when
        it comes to virtual conversation, and we\u2019re exploring every detail of
        the space with the intent of reducing user fatigue while creating a more natural
        conversation experience. Furthermore, we are going beyond what is possible
        in person, diving deep into the data generated by group conversation, analyzing
        vocal tone, physical cues, sentiment, and much more. In the same way we provide
        deep insights into how viewers feel about creative content, we\u2019ll provide
        amazing insights into user interactions during conversation.</p>\n\n<p>When
        you join Pilotly, you''ll work with a team of highly talented engineers and
        product visionaries who push powerful features / services every week in a
        rapid paced development environment.</p>\n\n<p>What is Pilotly special ?\u00a0<a
        href=\"https://www.youtube.com/watch?v=zrQzpyLek-4\">https://www.youtube.com/watch?v=zrQzpyLek-4</a></p>\n\n<p>Let\u2019s
        build game changing technology that will play a role in the future of human
        interaction and content consumption.</p>\n\n<p><strong>//// Requirements ////</strong></p>\n\n<p>+Strong
        track record building scalable web applications that have design parity with
        provided graphics and user flow</p>\n\n<p>+Experience working on an agile
        development team and using all the tools needed to deploy into dev, staging
        and production environments (GIT, AWS, etc)</p>\n\n<p>+Extensive experience
        with ReactJS and similar virtual dom coding languages</p>\n\n<p>+Experience
        with client side video and audio using Web RTC. Ideally you have experience
        not just using the api''s but developing video and audio processing pipelines</p>\n\n<p>+The
        ability to research and solve problems, develop quick prototypes, communicate
        across the organization, and drive action with data</p>\n\n<ul>\n    <li>\n        <p>Comfortable
        with start-up style work environment: versatile, detail oriented, collaborative,
        can-do attitude with strong commitment</p>\n    </li>\n    <li>\n        <p>Prior
        experience in performance/memory is a plus</p>\n    </li>\n    <li>\n        <p>Bonus
        points if you\u2019re a real audiophile or videophile</p>\n    </li>\n</ul>\n\n<p><strong>////
        Some Things You\u2019ll Be Doing ////</strong></p>\n\n<ul>\n    <li>\n        <p>In
        sum, you\u2019ll be a part of the team that changes how conversation happens
        virtually</p>\n    </li>\n    <li>\n        <p>You will have the opportunity
        to go to the depths of open source technologies such as Electron, Chromium,
        GraphQL, and React; and participate in the open source community</p>\n    </li>\n    <li>\n        <p>Working
        extensively with audio / video within html5 and server side</p>\n    </li>\n    <li>\n        <p>Integrating
        3rd party partner technology to expand feature set for conference product</p>\n    </li>\n    <li>\n        <p>Working
        on features as a team, from inception to launch, in the entire platform code
        base from the backend to the desktop and web UI\u2019s in technologies ranging
        from Node to React / Javascript</p>\n    </li>\n    <li>\n        <p>Creating
        and contributing in a highly collaborative and diverse environment</p>\n    </li>\n    <li>\n        <p>Improving
        and refining internal systems, processes, and practices to increase organizational
        performance and enable the team to deliver more delightful products to our
        customers more rapidly</p>\n    </li>\n</ul>", "name": "Senior Video Chat
        Platform Engineer", "type": "external", "publication_date": "2021-03-31T15:43:03Z",
