        "company": {"id": 12246, "short_name": "playerslounge", "name": "Players''
        Lounge"}}, {"contents": "<p>More than 30 years ago, E<em>TRADE pioneered the
        online brokerage industry by executing the first-ever electronic individual
        investor trade. While the landscape of our industry has changed dramatically,
        our culture of innovation and drive to make online trading accessible to everyone
        continues to drive us forward. We believe in challenging the status quo, fostering
        an environment of curiosity and learning, and, above all, putting our custom
        e rs first.<br><br>In 2020, ETRADE joined Morgan Stanley, signaling a major
        industry shift that brought Wall Street and Main Street together more than
        ever before. As ETRADE''s parent company, Morgan Stanley plays an important
        role in expanding what we can offer to investors, though E</em>TRADE still
        functions as an independent entity.<br><br><b>RESPONSIBILITIES</b><br><br>As
        a Data Engineer, you will work on high-quality data solutions, partnering
        with various engineering and business teams within the enterprise to design
        and develop data driven insights that inform business and product decisions.
        Additionally, you will be responsible for identifying, researching, and resolving
        complex technical problems that enhance the combined business decision making
        capabilities.<br> Your technical skills, business acumen, and creativity will
        be essential as you build tools to automate reporting and generate timely
        business insights.<br><br><strong>Responsibilities:</strong><br> <ul> <li>Define
        best practices, develop frameworks and architectural solutions for data movement
        and analytics at scale.</li> <li>Train and mentor members within the data
        engineering team on technology platforms and tools used to develop data solutions.</li>
        <li>Prepare documentation - runbooks, training documents and user guides -
        for frameworks and ETL jobs.</li> <li>Partner with engineering teams to operationalize/scale
        the deployment of solutions to achieve optimum performance and efficiency.</li>
        <li>Partner with business teams across the enterprise to help understand their
        data and analytic needs, identify the best data sources and design robust
        and maintainable solutions.</li></ul><b>REQUIREMENTS</b><br><br><strong>Required
        Skills:</strong><br> <ul> <li>BA/BS degree in a technical or quantitative/business-oriented
        field or equivalent practical experience.</li> <li>5+ years of relevant experience.Excellent
        communication, documentation, and planning skills.</li> <li>Expert-level analytical
        skills - specifically using SQL.</li> <li>Independent-working, fast-learning
        and problem-solving.</li> <li>Experience working with any big data platform
        developing ETL and analytic solutions using the tools provided.</li> <li>Leverage
        SQL, and other analytic platforms to gather, clean, and prepare data; create
        dashboards/reports; develop KPIs; analyze trends; provide insights.</li></ul><strong>Preferred
        Skills:</strong><br> <ul> <li>Experience working on Hadoop with hands-on knowledge
        of services within the ecosystem.</li> <li>Experience with data integration
        and ETL tools and platforms like IBM DataStage, Streamsets.</li> <li>Experience
        working with atleast one interpreted programming language such as Perl or
        Python.</li> <li>Exposure to business intelligence tools and creation of reports
        &amp; analytics.</li> <li>Understanding of cloud-based technologies.</li>
        <li>Understanding of distributed data processing frameworks like Spark.</li>
        <li>Familiar with automation, workflow and data flow concepts.</li> <li>Experience
        working in the Financial industry.</li></ul>#etrade</p>", "name": "Data Engineer
