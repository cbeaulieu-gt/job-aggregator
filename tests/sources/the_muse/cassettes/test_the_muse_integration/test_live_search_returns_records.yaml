        "<p>More than 30 years ago, E<em>TRADE pioneered the online brokerage industry
        by executing the first-ever electronic individual investor trade. While the
        landscape of our industry has changed dramatically, our culture of innovation
        and drive to make online trading accessible to everyone continues to drive
        us forward. We believe in challenging the status quo, fostering an environment
        of curiosity and learning, and, above all, putting our custom e rs first.<br><br>In
        2020, ETRADE joined Morgan Stanley, signaling a major industry shift that
        brought Wall Street and Main Street together more than ever before. As ETRADE''s
        parent company, Morgan Stanley plays an important role in expanding what we
        can offer to investors, though E</em>TRADE still functions as an independent
        entity.<br><br><b>RESPONSIBILITIES</b><br><br>Senior Software Engineer (Java)
        (3171779)<br><br>Description<br>SUMMARY<br>The Senior Staff, Software Engineering
        is viewed as a mid to senior developer in applications development who can
        work on the complex projects requiring specialized technical knowledge. They
        are able to work with the technical leads to solve<br>complex application
        development tasks. They additionally coordinate with users to determine requirements
        and ensure that system improvements are successfully implemented and monitored
        to increase efficiency.<br><br>RESPONSIBILITIES<br>Design and develop Java
        based applications.<br>Codes, tests, debugs, documents and implements complex
        software applications.<br>Creates prototypes.<br>Interface with product team
        to gather requirements.<br>Escalate and communicate issues to manager.<br>Resolve
        issues that other junior team members are unable to solve.<br>Provide technical
        solutions to problems encountered in the team.<br>Review the work done by
        other team members to make sure it adheres to the standards.<br>Makes well-thought-out
        decisions on complex or ambiguous application development issues.<br>Coordinates
        with users to determine requirements.<br>Ensures that system improvements
        are successfully implemented and monitored to increase efficiency.<br><br><b>REQUIREMENTS</b><br><br>REQUIREMENTS<br>Self-motivated,
        highly organized, team player who thrives in a fast-paced environment with
        the ability to learn quickly and<br>work independently<br>Strong experience
        in Java, Spring, Spring Boot.<br>Experience in developing prototypes, third
        party service integration.<br>Strong experience with multi-threading and networking
        protocols (TCP/IP, Multicast)<br>Practical experience and understanding of
        low latency messaging middleware<br>Experience working with streaming technologies
        is highly desirable.<br>Experience in the financial markets with understanding
        of Equities, Futures and Options is highly desirable<br>Practical experience
        working within the Scrum Framework and Agile methodologies<br>Experience working
        with Kafka and distributed caching solutions is a plus.<br>Strong communication
        with exceptional written, verbal and presentation skills<br>Practical experience
        with relational databases (Oracle, Sybase) is a plus<br><br>EDUCATION<br>BS
        or MS in Computer Science or related field.<br><br>Morgan Stanley is an equal
        opportunity employer committed to diversifying its workforce (M/F/Disability/Vet).<br><br>#etrade</p>",
