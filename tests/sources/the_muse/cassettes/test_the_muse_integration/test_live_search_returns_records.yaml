        "company": {"id": 11868, "short_name": "dtcc", "name": "DTCC"}}, {"contents":
        "<p>More than 30 years ago, E<em>TRADE pioneered the online brokerage industry
        by executing the first-ever electronic individual investor trade. While the
        landscape of our industry has changed dramatically, our culture of innovation
        and drive to make online trading accessible to everyone continues to drive
        us forward. We believe in challenging the status quo, fostering an environment
        of curiosity and learning, and, above all, putting our custom e rs first.<br><br>In
        2020, ETRADE joined Morgan Stanley, signaling a major industry shift that
        brought Wall Street and Main Street together more than ever before. As ETRADE''s
        parent company, Morgan Stanley plays an important role in expanding what we
        can offer to investors, though E</em>TRADE still functions as an independent
        entity.<br><br><b>RESPONSIBILITIES</b><br><br>VP, Application Development
        (Market Data) (3171738)<br><br>Description<br> SUMMARY<br> We are a seeking
        highly driven technologist, possessing strong technical and analytic skills
        with the ability to work in a fast-paced collaborative environment. This is
        an excellent opportunity to work in a real-time environment where one can
        make immediate contributions. This individual will lead the development and
        technical analysis of strategic initiatives as well as the existing software
        stack. Projects will be highly technical in nature and will focus in the area
        of Market Data.<br><br>RESPONSIBILITIES<br> Effectively work with the leadership
        in the PMO, Development, Product Management, Business and Technical Operations,
        Systems Engineering, Infrastructure, Networks and Architecture teams Assume
        full end-to-end responsibility for tasks from analyzing requirements with
        business design and implementation.<br> Acquire a robust understanding of
        E*TRADE products, services, processes, and organizational structure in order
        to find optimal solutions and achieve rapid execution of key initiatives.<br>
        Maintain awareness of industry trends, compliance concerns, risk control processes,
        and regulatory landscape.<br> Draft and review architectural diagrams, specifications,
        business requirements as well as various design documents.<br> Work with our
        existing technology stack (Java, C++, Linux, Unix, Open Source Platforms,
        and SOA) as well as new technologies for our next generation solutions.<br>
        Create project documents and requirements (presentations, user stories, migration
        plans, communication plans).<br><br>#LI-CG2 <br><br><b>REQUIREMENTS</b><br><br>REQUIREMENTS<br>
        Self-motivated, highly organized, team player who thrives in a fast-paced
        environment with the ability to learn quickly and work independently.<br>
        High proficiency in C++ in a Linux environment.<br> Experience in Java server-side
        development is desirable.<br> Practical experience with scripting technologies
        such as Shell, Python, Perl.<br> Strong experience with multi-threading and
        networking protocols (TCP/IP, Multicast).<br> Practical experience and understanding
        of low latency messaging middleware.<br> Experience in market data products
        such as Refinitiv TREP is a must.<br> Experience in the financial markets
        with understanding of Equities, Futures and Options is highly desirable.<br>
        Practical experience working within the Scrum Framework and Agile methodologies.<br>
        Experience with common tools including Git, maven, Jenkins, Slack, JIRA.<br>
        Must possess strong analytical, troubleshooting and problem-solving skills.<br>
        Strong communication with exceptional written, verbal and presentation skills.<br>
        Practical experience with relational databases (Oracle, Sybase) is a plus.<br><br>EDUCATION<br>
        BS or MS in Computer Science or related field.<br><br>Morgan Stanley is an
        equal opportunity employer committed to diversifying its workforce (M/F/Disability/Vet).<br><br>#etrade<br><br>#LI-CG2</p>",
