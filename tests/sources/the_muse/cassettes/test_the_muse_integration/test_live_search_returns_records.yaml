        the first fully built micro-services solution for the insurance industry,
        connecting insurance carrier platforms to insurance agency platforms.</p>\n    </li>\n</ul>\n\n<p><br></p>\n\n<p>\n</p>\n\n<p>On
        day one we''ll expect you to have...</p>\n\n<ul>\n    <li>\n        <p>3+
        years overall experience in API and integration development, 1+ years overall
        experience utilizing mulesoft or willing to complete self driven training
        prior to start date.</p>\n    </li>\n</ul>\n\n<p>At least 3 years in technical
        development with some experience with these types of activities:</p>\n\n<ul>\n    <li>\n        <p>Designing
        and developing APIs from specification to implementation in MuleSoft Anypoint
        Platform</p>\n    </li>\n    <li>\n        <p>RAML</p>\n    </li>\n    <li>\n        <p>Anypoint
        API Designer</p>\n    </li>\n    <li>\n        <p>Anypoint Exchange</p>\n    </li>\n    <li>\n        <p>Anypoint
        API Portal</p>\n    </li>\n    <li>\n        <p>Anypoint Studio</p>\n    </li>\n    <li>\n        <p>Experience
        with securing APIs</p>\n    </li>\n    <li>\n        <p>SSL Certificates</p>\n    </li>\n</ul>\n\n<p>Authentication
        Methods</p>\n\n<ul>\n    <li>\n        <p>Basic</p>\n    </li>\n    <li>\n        <p>OAuth</p>\n    </li>\n    <li>\n        <p>SAML</p>\n    </li>\n    <li>\n        <p>OpenID
        Connect</p>\n    </li>\n    <li>\n        <p>Experience in working in a CI/CD
        environment and familiar with DevOps principles</p>\n    </li>\n    <li>\n        <p>Microsoft
        VSTS (Git)</p>\n    </li>\n    <li>\n        <p>Maven</p>\n    </li>\n    <li>\n        <p>MUnit</p>\n    </li>\n</ul>\n\n<p>\n\n</p>\n\n<p>Added
