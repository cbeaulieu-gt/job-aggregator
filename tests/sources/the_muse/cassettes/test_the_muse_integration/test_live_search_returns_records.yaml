        to the team''s efforts when needed, and will provide front-line engineering
        and people management.<br><br>RESPONSIBILITIES<br><br>Drive technical development
        and support of our mobile product<br> Develop and deliver a class leading
        mobile product<br> Build/Manage/Grow a high performing team of iOS engineers<br>
        Provide guidance to technology partners on complexity and delivery estimates<br>
        Provide iOS team guidance on code reviews, branching strategy, and release
        coordination<br><br><strong>#LI-AJ1</strong> <br><br><b>REQUIREMENTS</b><br><br>7-10
        years'' strong technical experience in web and mobile app technologies<br><br>PREFERRED<br><br>Experience
        in mobile programming languages (Swift and Objective-C) and an expert in iOS
        development platforms<br> Must have strong experience in debugging, code coverage,
        code analyzer / profiler and unit testing tools<br> Expertise in architecting,
        designing and developing highly scalable large scale and available applications<br>
        Ability to lead, inspire, and motivate teams through effective communication<br>
        Strong focus on security of the channel and any customer data<br> Well versed
        in real-time networking, mobile network issues, concurrency and threading<br><br>Morgan
        Stanley is an equal opportunity employer committed to diversifying its workforce
        (M/F/Disability/Vet).<br><br>#etrade<br><br><strong>#LI-AJ1</strong></p>",
