        "company": {"id": 12271, "short_name": "pilotly", "name": "Pilotly"}}, {"contents":
        "<p>\n    <span>We are looking for a Mulesoft Architect to build and scale
        the b atomic API development team.</span></p>\n\n<p>\n\n</p>\n\n<p>In this
        role you''ll get ...</p>\n\n<ul>\n    <li>\n        <p>Collaborate with enterprise
        architects and IT program managers inside b atomic, partners, and customers
        to create brand new, creative API infrastructures</p>\n    </li>\n    <li>\n        <p>Assist
        in architecting technical solutions for enterprise systems using the MuleSoft
        product suite and adapt to a rapidly changing business environment Knowledge
        of SOA</p>\n    </li>\n    <li>\n        <p>Design patterns for building middleware
        systems ground up using Message Routing, Content Enrichment, Message Filtering,
        Message Transformation, Guaranteed delivery, Message sequencing, Batch message
        processing, error handling and reconciliation mechanisms.</p>\n    </li>\n    <li>\n        <p>Knowledge
        of Web Services Interoperability, WS-* standards and ability to suggest, criticize
        and formulate solutions in a multi-vendor and architecture committee meetings.</p>\n    </li>\n    <li>\n        <p>Identify,
        analyze and design integration flows using Mule ESB Anypoint Studio and technically
        own and manage the process of ensuring on time and on budget build and integration
        of the various elements of the solution</p>\n    </li>\n    <li>\n        <p>Good
        understanding of integration design patterns &amp; best practices</p>\n    </li>\n    <li>\n        <p>In
        depth experience using Agile, Scrum and iterative development practices</p>\n    </li>\n    <li>\n        <p>Assist
        on technical POC''s to prove out technology and ultimately leading into selection.</p>\n    </li>\n</ul>\n\n<p>\n\n</p>\n\n<p>On
        day one we''ll expect you to have...</p>\n\n<p>Solution Architects assess
        a project\u2019s technical feasibility, as well as implementation risks. They
        are responsible for designing and implementing a project\u2019s technical
        architecture. They define the structure of a system, its interfaces, and the
        principles that guide its organization, software design and implementation.
        The scope of the Solution Architect\u2019s role is bounded by the business
        issue at hand. A Solution Architect needs to have knowledge of all the different
        aspects of the technical solution as well as robust business knowledge. This
        includes the Software Architect.</p>\n\n<ul>\n    <li>\n        <p>3+ years
        of experience working as an Integration Solution Architect and 1+ with <strong>Mulesoft
        product Suite</strong>.</p>\n    </li>\n    <li>\n        <p>5+ years of software
        development experience. Experience with large Full Life Cycle (FLC) project
        implementations, with hands on delivery.</p>\n    </li>\n    <li>\n        <p>Experience
        with all aspects of the system implementation process of system design, configuration,
        customization, integration, testing and support.</p>\n    </li>\n    <li>\n        <p>Experience
        with design, development and deployment of SOA based architecture for a large
        organization leveraging multiple COTS Business applications is preferred Experience
        with Tomcat, XML, JMS, XSLT, WS-*, SOA/Integration, and API Management technologies
        and standards Experience with using a JAVA IDE (Eclipse, Intelli J, Netbeans)</p>\n    </li>\n    <li>\n        <p>Designed
        and developed micro-service solutions, Service Oriented Architecture (SOA)
        concepts including REST-ful and SOAP-based services Designed and developed
        enterprise services using RAML and REST based APIs Experienced in both Agile
        and waterfall methodologies</p>\n    </li>\n    <li>\n        <p>Have excellent
        interpersonal, verbal and written skills and the ability to interact with
        all level of stakeholders, support personnel, and clients Strong documentation,
        analytical and problem-solving skills Bachelor\u2019s degree in Computer Science
        or any related field and a minimum of 5 years relevant experience providing
        IT enablement solutions</p>\n    </li>\n    <li>\n        <p>Mule certification
        highly preferred</p>\n    </li>\n</ul>\n\n<p>\n\n</p>\n\n<p>Added bonuses
        you have...</p>\n\n<p>You are responsible for the end-to-end architecture
        of a solution, including its assembly and integration into the IT architecture
        principles defined with the client. You define the structure of the system,
        its interfaces, and the principles that guide its organization, software design
        and implementation. You are responsible for the management and mitigation
        of technical risks, ensuring that the solution services can be realistically
        delivered by the underlying technology components</p>\n\n<ul>\n    <li>\n        <p>Certification:
        Technical certification e.g. Cisco, VMWare; or achieved professional certification
        TOGAF 9 level 1; or has / seeking IAF level 1.</p>\n    </li>\n    <li>\n        <p>Should
        have experience in Functional Architecture Design and Architecture Knowledge,
        Negotiating, Financial Analysis and Continuous (Service) Improvement.</p>\n    </li>\n    <li>\n        <p>Should
        be proficient in Business Knowledge, Software Engineering Leadership, Technical
        Solution Design and Change Management.</p>\n    </li>\n    <li>\n        <p>Should
        have progressing knowledge in Business Analysis</p>\n    </li>\n</ul>\n\n<p><br></p>\n\n<p><br></p>",
