        "company": {"id": 1535, "short_name": "etrade", "name": "E*TRADE"}}, {"contents":
        "<h3>The short version:</h3>\n\n<p>Early-stage venture-backed startup looking
        for a software engineer to use Python, Javascript, and HTML/CSS to help build
        out our web platform. Good fit if you like moving fast, having impact, and
        working on a variety of different things.</p>\n\n<h3>Who we are</h3>\n\n<p>We\u2019re
        a fast-moving startup with a vision to empower all professionals by helping
        them build better relationships. Our vision is to fix the network gap: the
        inequality of opportunity driven by not having the right connections. To solve
        this problem, we\u2019re combining the best practices of the world\u2019s
        top relationship builders with artificial intelligence.</p>\n\n<p>We\u2019re
        building a mission-driven team that strives to live out our values every day:</p>\n\n<ul>\n    <li>Customer-centricity</li>\n    <li>Diversity
        of perspective</li>\n    <li>Authenticity</li>\n    <li>Growth (individual
        and collective)</li>\n    <li>Impact</li>\n</ul>\n\n<p>We\u2019re an ambitious,
        driven team and we push ourselves to accomplish a lot quickly. In the past
        couple of years we\u2019ve gone through one of the world\u2019s top accelerators,
        raised two rounds of venture financing, launched our product, rapidly grown
        our customer base, and architected a robust set of machine learning models
        as a core source of competitive advantage. In the process, we\u2019ve been
        named one of Chicago\u2019s top 19 startups to watch \u2013 and we plan on
        giving the world even more to watch in the years to come!</p>\n\n<h3>What
        your role will be</h3>\n\n<p>We\u2019re looking for an experienced full stack
        engineer to help build the core 4Degrees platform. You\u2019ll build and use
        a versatile set of skills: switching between tasks like rolling out major
        new functionality, diagnosing and fixing bugs, and playing support for other
        front-end or back-end engineers.</p>\n\n<p>You\u2019ll combine a bias to action
        with a passion for having an impact to deliver new, innovative solutions to
        our customers. We\u2019re building an industry-defining company that requires
        entirely new approaches; you\u2019ll be a core part of that effort and will
        be comfortable experimenting, learning, and expanding the scope of what\u2019s
        possible.</p>\n\n<h3>About you</h3>\n\n<ul>\n    <li>Excited about the 4Degrees
        mission and believes in our core values</li>\n    <li>Thrives in a fast-paced
        environment, and is comfortable with experimentation and risk-taking</li>\n    <li>Driven
        by the opportunity to create impact, and takes full ownership of achieving
        personal and team objectives</li>\n    <li>Motivated to explore the potential
        for technology to augment people\u2019s ability to form and strengthen professional
        relationships</li>\n    <li>Challenges existing industry best practices and
        takes inspiration from disparate sources to build a groundbreaking product</li>\n    <li>Collaborative
        mindset \u2013 recognizing that most great outcomes are accomplished by teams,
        not individuals</li>\n</ul>\n\n<h3>Skills you\u2019ll need</h3>\n\n<ul>\n    <li>Proficiency
        with back-end programming (Python preferred, but we can train you if you\u2019re
        good with Ruby, Node, PHP, etc.)</li>\n    <li>Proficiency with front-end
        programming in vanilla languages (Javascript, HTML, CSS)</li>\n    <li>Comfort
        with plain SQL and an ORM</li>\n</ul>\n\n<h3>We\u2019d be really excited if
        you are</h3>\n\n<ul>\n    <li>Experienced with mobile development, particularly
        using React Native</li>\n    <li>Experienced with the Flask web framework</li>\n    <li>Experienced
        with machine learning and/or statistical analysis</li>\n</ul>\n\n<h3>Benefits</h3>\n\n<ul>\n    <li>Competitive
        cash+equity compensation based on level of capability</li>\n    <li>Unlimited
        PTO (min. 2 weeks, avg. 3-4)</li>\n    <li>Unlimited paid sick leave (mandatory
        for infectuous diseases)</li>\n    <li>Employer group health insurance, subsidized
        50% by company</li>\n    <li>Annual professional development stipend</li>\n    <li>Commuter
        benefits</li>\n</ul>\n\n<h3>Want to join us?</h3>\n\n<p>Send over a quick
        note with your resume, links to project examples, and thoughts on why this
        role is exciting to you to <a href=\"mailto:talent@4degrees.ai\">talent@4degrees.ai</a>.
        Our values are critical to us; in your email, please also talk a bit about
        how these values resonate with you.</p>\n\n<p>This is an on-site position
        in Chicago, IL.</p>\n\n<p>The only way we\u2019ll bridge the network gap is
        if our team represents all of the backgrounds and perspectives of those it
        impacts. We care deeply about adding people that contribute to our team from
        across all races, ethnicities, religions, ages, sexual orientations, genders,
        sexes, countries of origin, and more.</p>", "name": "Full Stack Engineer",
