        "company": {"id": 1535, "short_name": "etrade", "name": "E*TRADE"}}, {"contents":
        "<p><b>Job Description</b><br><br><strong>Are you ready to explore a world
        of possibilities?</strong><br><br>Join our DTCC family, and you''ll grow your
        expertise and become the best version of you. As you embark on a new journey,
        you''ll tackle challenges with flexibility and grace, learning new skills
        and advancing your career while having the time of your life.<br><br><strong>Why
        You Would Love This Job:</strong><br><br>Being a member of the Risk Analytics
        IT team means you will be a part of a technology team with a rich diverse
        skill sets and a great enthusiastic committed team. Whether it''s Java, JavaScript,
        AngularJS, Unix or Database skillset required for the project initiatives,
        we are there for each other collaborating and helping each other to achieve
        the common goal. You will also have an opportunity to work with SaaS Cloud
        Datawarehouse Platform involving Snowflake Database.<br><br>In this role would
        be responsible to contribute towards new project implementations as well as
        enhancements to existing applications within Risk and Data Services domain
        catering to the requirement of Risk Analysts. There is also significant opportunity
        for advancement and growth in this role based on your performance and contribution
        towards the organization goals.<br><br><strong>Your Responsibilities</strong>:<br><br><ul>
        <li>Participate in requirements gathering with Product owners, business users
        and subject matter experts and come up with an elegant solution design adhering
        to best design patterns.</li> <li>Write clean, self-documenting code following
        best practices on coding incorporating unit testing.</li> <li>Collaborate
        with the Senior Application Architects and other technical contributors at
        all levels during the application development and resolve application defects
        identified during System Integration and User Acceptance Testing Phases</li>
        <li>Participate in code reviews, Sprint meetings and retrospectives.</li>
        <li>Provide on-going maintenance support for the applications during Post-deployment
        support phase.</li> <li>Be a self-starter providing creative and innovative
        ideas or solutions continuously improving the technological offering.</li>
        </ul><br><br><strong>NOTE: Responsibilities of this role are not limited to
        the details above. </strong><br><br><strong>Talents Needed For Success:</strong><br><br><ul>
        <li>Solid Core Java including Collections, multi-threading concepts with a
        working experience on J2EE (Servlets, JSP) along with Framework knowledge
        - Spring/Sprint MVC</li> <li>Strong knowledge in core JavaScript is a must.</li>
        <li>Basic Database skillsets (SQL) and Unix commands is a must.</li> <li>Should
        be a self-motivated individual with good problem solving and analytical skills</li>
        <li>Knowledge of any JavaScript framework - like Angular or React will be
        a plus</li> <li>Experience in Agile, CI/CD, DevOps practices and tools</li>
        <li>Experience with source code management in GIT, Maven or Gradle is must</li>
        <li>Working experience with Junit or any other test framework is desirable</li>
        </ul><br><br><b>About Us</b><br><br>With over 50 years of experience, DTCC
        is the premier post-trade market infrastructure for the global financial services
        industry. From 20 locations around the world, DTCC, through its subsidiaries,
        automates, centralizes, and standardizes the processing of financial transactions,
        mitigating risk, increasing transparency, enhancing performance and driving
        efficiency for thousands of broker/dealers, custodian banks and asset managers.
        Industry owned and governed, the firm innovates purposefully, simplifying
        the complexities of clearing, settlement, asset servicing, transaction processing,
        trade reporting and data services across asset classes, bringing enhanced
        resilience and soundness to existing financial markets while advancing the
        digital asset ecosystem. In 2024, DTCC''s subsidiaries processed securities
        transactions valued at U.S. $3.7 quadrillion and its depository subsidiary
        provided custody and asset servicing for securities issues from over 150 countries
        and territories valued at U.S. $99 trillion. DTCC''s Global Trade Repository
        service, through locally registered, licensed, or approved trade repositories,
        processes more than 25 billion messages annually. To learn more, please visit
        us at www.dtcc.com or connect with us on LinkedIn , X , YouTube , Facebook
        and Instagram .<br><br>DTCC proudly supports Flexible Work Arrangements favoring
        openness and gives people freedom to do their jobs well, by encouraging diverse
        opinions and emphasizing teamwork. When you join our team, you''ll have an
        opportunity to make meaningful contributions at a company that is recognized
        as a thought leader in both the financial services and technology industries.
        A DTCC career is more than a good way to earn a living. It''s the chance to
        make a difference at a company that''s truly one of a kind.<br><br>Learn more
        about Clearance and Settlement by clicking here .</p>", "name": "Senior Software
        Engineer (Full Stack)", "type": "external", "publication_date": "2025-11-11T19:47:48Z",
