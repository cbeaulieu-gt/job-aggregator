        and giving back - that guide its more than 60,000 employees in 1,200 offices
        across 42 countries. <br><br>E<em>TRADE is a leading financial services company
        that is acquired by Morgan Stanley and is pioneer in the online brokerage
        industry. Founded on the principle of innovation, E</em>TRADE aims to enhance
        the financial independence of traders and investors through a powerful digital
        offering and professional guidance. E*TRADE operates a bank with the primary
        purpose of maximizing the value of deposits generated through its brokerage
        business. <br><br><strong> Job Description: </strong> <br> We are seeking
        a Senior back-end engineer who is passionate for great software and motivated
        to make a huge impact with our mobile development. This is a unique opportunity
        to be instrumental in building our new mobile platform, so it''s essential
        that you be attracted to invention and building things from the ground up.
        We are excited about candidates who are creative, innovative and enjoy working
        through problems which ultimately results to solid software designs that are
        tailored completely for our users. To be a successful member of this team
        you must prioritize quality and be driven by a self-motivation to succeed.<br><br><strong>Responsibilities:</strong>
        <br> <ul> <li>Writing reusable, testable, and efficient code</li> <li> Design
