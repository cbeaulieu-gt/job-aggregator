        "<p>\n\n</p>\n\n<p><span>We are looking for a Senior Software Engineer interested
        in building performant and reliable APIs. You will be responsible for architecting
        and building new APIs that power our core web and mobile applications. Additionally,
        you will coordinate with teams responsible for other layers of the product
        infrastructure. Building a product is a highly collaborative effort, and as
        such, a strong team player with a commitment to perfection is required. As
        a developer at Players'' Lounge, you''ll need to actively communicate with
        your teammates to ensure that your work is contributing to the team''s collective
        goal</span><span>.\u00a0</span><span>As a senior developer, you will also
        be responsible for being a vocal mentor to junior members of the development
        team.</span></p>\n\n<div><br></div>\n\n<p><span>Our ideal candidate uses our
        product, has a passion for gaming and our company mission, and works hard
        to ensure every gamer knows about Players\u2019 Lounge. We want our team members
        to take initiative to improve our product through a deep concern for the user
        experience and the maintainability of our codebase, while effectively managing
        the tradeoffs between feature development and refactoring.</span></p>\n\n<h2><span>Responsibilities</span></h2>\n\n<ul>\n    <li><span>Build
        robust and scalable APIs in Node.js\u00a0</span></li>\n    <li><span>Ensure
        our APIs are optimized for performance and reliability</span></li>\n    <li><span>Expand
        our core GraphQL API that powers our web and mobile applications</span></li>\n    <li><span>Write
        maintainable code that can be understood by engineers of all levels</span></li>\n    <li><span>Build
        robust automated tests to test edge cases and ensure consistency in our products</span></li>\n    <li><span>Contribute
        to the design and architecture of distributed systems and services\u00a0</span></li>\n    <li><span>Regularly
        communicate with frontend teams to ensure our APIs are fit for purpose</span></li>\n</ul>\n\n<h2><span>Skills</span></h2>\n\n<ul>\n    <li><span>Experience
        working in an Agile environment</span></li>\n    <li><span>Firm grasp of JavaScript
        (Node.js) and its nuances, including ES6+ syntax</span></li>\n    <li><span>Experience
        working with AWS (Lambda, EC2, Serverless)\u00a0</span></li>\n    <li><span>Experience
        with various database systems including both SQL and NoSQL solutions</span></li>\n    <li><span>Ability
        to write well-documented, clean code</span></li>\n    <li><span>Comfortable
        working with version control systems such as Git</span></li>\n    <li><span>Understanding
        of GraphQL APIs and GraphQL concepts</span></li>\n    <li><span>Experience
        with Test Driven Development using tools like Jest</span></li>\n    <li><span>Comfortable
        mentoring other members of the team\u00a0</span></li>\n    <li><span>Experience
        architecting distributed systems on AWS or equivalent cloud provider</span></li>\n    <li><span>Experience
        architecting scalable backend solutions</span></li>\n</ul>\n\n<div><br></div>\n\n<p><span>We
        are an equal opportunities employer and welcome applications from all suitably
        qualified persons regardless of their race, sex, disability, religion/belief,
        sexual orientation or age.</span></p>", "name": "Senior Software Engineer
