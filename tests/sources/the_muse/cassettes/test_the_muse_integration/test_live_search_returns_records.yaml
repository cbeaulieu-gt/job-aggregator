        brought Wall Street and Main Street together more than ever before. As ETRADE''s
        parent company, Morgan Stanley plays an important role in expanding what we
        can offer to investors, though E</em>TRADE still functions as an independent
        entity.<br><br><b>RESPONSIBILITIES</b><br><br>The Lead iOS Mobile Engineering
        is responsible for leading a team of mobile software engineers, focused on
        modern iOS development of E*TRADE''s advanced platform for phones and tablets.
        This position will report to the Director of Mobile Engineering and collaborate
