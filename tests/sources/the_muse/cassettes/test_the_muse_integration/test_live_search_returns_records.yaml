        "<p>More than 30 years ago, E<em>TRADE pioneered the online brokerage industry
        by executing the first-ever electronic individual investor trade. While the
        landscape of our industry has changed dramatically, our culture of innovation
        and drive to make online trading accessible to everyone continues to drive
        us forward. We believe in challenging the status quo, fostering an environment
        of curiosity and learning, and, above all, putting our custom e rs first.<br><br>In
        2020, ETRADE joined Morgan Stanley, signaling a major industry shift that
        brought Wall Street and Main Street together more than ever before. As ETRADE''s
        parent company, Morgan Stanley plays an important role in expanding what we
        can offer to investors, though E</em>TRADE still functions as an independent
        entity.<br><br><b>RESPONSIBILITIES</b><br><br>Replacement Taleo for 3171662<br><br>Senior
        Software Engineer (Java, C/C++)<br><br>DESCRIPTION<br>SUMMARY<br><br>We are
        looking for an experienced hands-on Software Engineer who will lead the technical
        aspects of designing, implementing, testing of various initiatives in the
        Core Brokerage Services Group. The role expects significant engineering knowledge
        in complex server side applications, including new feature work, improvements
        on existing code, and active participation in designing and shipping the product.<br><br>RESPONSIBILITIES<br><br>Analyze,
        design and develop software solutions to meet business needs.<br><br>Collaborate
        with internal and external technical personnel/vendors to facilitate enterprise
        software integration.<br><br>Work on different software development life cycle
        phases and serve as a technology resource and representative for the department.<br><br>Create
        technical documentation for software (design documents, handbooks, etc.).<br><br>Perform
        code review and design review to ensure compliance with development standards.<br><br>Assist
        with developing automated test cases and test plans for software.<br><br>Review
        software requirements documentation for projects and enhancements<br><br>Ensures
        that system improvements are successfully implemented and monitored to increase
        efficiency.<br><br><b>REQUIREMENTS</b><br><br>QUALIFICATIONS<br><br>Basic<br>
        Bachelors Degree in appropriate field of study or equivalent work experience<br><br>5
        to 8 years of working experience in C/C++,GO, Java, J2EE, Spring, Spring Boot,
        JPA/Hibernate, scripting language <br><br>Preferred<br><br>Good understanding
        of Web Services protocols such as REST, SOAP, IDL, gRPC and API design for
        extensibility and portability<br><br>Experience writing SQL queries for Sybase
        / Oracle or another Relational Database is required<br><br>Working experience
        in C/C++, Go Lang, Perl &amp; Shell Script are preferred and/or willing to
        learn<br><br>Working knowledge of cloud, service mesh and containers is a
        plus<br><br>Working knowledge of object-oriented design and development skills<br><br>Ability
        to use version control software such as GIT<br><br>Experience with Scrum/Agile
        development methodologies<br><br>Must possess excellent organizational and
        time management skills.<br><br>Creative thinker, self-starter, able to work
        on multiple projects simultaneously<br><br>Strong problem solving and analytical
        skills.<br><br>Excellent customer service skills and team orientation.<br><br>Ability
        to carry out all of the duties of the position efficiently and effectively<br><br>Morgan
        Stanley is an equal opportunity employer committed to diversifying its workforce
        (M/F/Disability/Vet).<br><br>#etrade</p>", "name": "Senior Software Engineer
