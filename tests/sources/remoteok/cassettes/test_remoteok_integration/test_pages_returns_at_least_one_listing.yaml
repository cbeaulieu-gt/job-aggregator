        up outside a demo.<\/p><p style=\"min-height:1.5em\">We\u00e2\u0080\u0099re
        hiring our first Data Scientist to take ownership of, and establish that standard.<\/p><p
        style=\"min-height:1.5em\">This role will lead Junction\u00e2\u0080\u0099s
