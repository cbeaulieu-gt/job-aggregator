        at less than 10% of total AR for assigned projects.<\/li>\n<li>You keep project
        stale dates below 3% in VantagePoint.<\/li>\n<li>You model TEECOM\u00e2\u0080\u0099s
        Core Values \u00e2\u0080\u0094 Care, Trust, and Value \u00e2\u0080\u0094 through
        reliability, communication, and accountability.<\/li>\n<\/ul>\n<\/div><p><br><\/p><b>Responsibilities
