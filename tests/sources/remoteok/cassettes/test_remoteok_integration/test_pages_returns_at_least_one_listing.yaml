        games\u00e2\u0080\u0094and then do it again, even better.<\/span><\/p>\n<p>&nbsp;<\/p>\n<p><span
        style=\"font-size: 16px;\">Across PC, console, and mobile, we\u00e2\u0080\u0099re
        creating genre-defining experiences that push boundaries and deliver real
        joy. If that sounds like your kind of mission, we\u00e2\u0080\u0099d love
        to meet you.<\/span><\/p>\n<p>&nbsp;<\/p>\n<p><span style=\"font-size: 16px;\">Be
        part of something bold and let\u00e2\u0080\u0099s build what\u00e2\u0080\u0099s
        next.<\/span><\/p><p><br><\/p><p><strong style=\"font-size: 13pt;\">About&nbsp;the&nbsp;Role<\/strong><\/p>\n<p>&nbsp;<\/p>\n<p><span
        style=\"font-size: 11pt;\">As a <\/span><strong style=\"font-size: 11pt;\">Localization
        Manager<\/strong><span style=\"font-size: 11pt;\"> supporting Neowiz\u00e2\u0080\u0099s
        global publishing portfolio, you will own the end-to-end localization strategy
        and execution for multiple game titles across PC and console platforms. This
        role sits at the intersection of publishing operations, narrative integrity,
        and global market readiness.<\/span><\/p>\n<p>&nbsp;<\/p>\n<p><span style=\"font-size:
        11pt;\">You will work closely with internal publishing, production, brand,
        and development teams, as well as external localization and LQA partners,
        to ensure our games deliver a high-quality, culturally resonant experience
        across all supported languages. The role requires strong operational ownership,
        sound localization judgment, and the ability to manage complex pipelines in
        a multi-project, multi-vendor environment.<\/span><\/p>\n<p>&nbsp;<\/p>\n<p><span
        style=\"font-size: 11pt;\">This is a hands-on, delivery-focused position designed
        for an experienced localization professional who is comfortable operating
        with autonomy and accountability in a global publishing context.<\/span><\/p>\n<p>&nbsp;<\/p>\n<p><span
        style=\"font-size: 11pt;\">This role is open across Europe; however, we currently
        prioritize candidates located in <em>Spain, Portugal, Sweden, the UK and Ireland<\/em>
        due to operational setup.&nbsp;<\/span><\/p>\\n<p><\/p><p><br><\/p><b>Key
        Responsibilities<\/b><ul>\n<li><strong>Localization Strategy &amp; Planning<\/strong><\/li>\n<li>You
        will define and manage localization strategies for assigned titles, including
        scope, timelines, quality standards, and budget considerations. Working in
        close alignment with production and brand stakeholders, you will ensure localization
        plans are fully integrated into content roadmaps and release schedules.<\/li>\n<\/ul>\n<div>&nbsp;<\/div>\n<ul>\n<li><strong>Localization
        Pipeline &amp; Workflow Ownership<\/strong><\/li>\n<li>You will own the full
        localization lifecycle, from source file preparation through translation,
        linguistic QA, integration, and release validation. This includes establishing
        efficient workflows, improving tools and processes, and ensuring consistent
        execution across vendors and projects. Localization tasks and risks will be
        tracked through established project management systems.<\/li>\n<\/ul>\n<div>&nbsp;<\/div>\n<ul>\n<li><strong>Linguistic
        Quality, Lore &amp; Culturalization<\/strong><\/li>\n<li>You will act as a
        key quality gate for localized content, ensuring narrative consistency, brand
        voice alignment, and gameplay clarity across languages. You will guide cultural
        adaptation decisions to ensure content is appropriate, engaging, and market-ready,
        while safeguarding lore cohesion throughout the localization pipeline.<\/li>\n<\/ul>\n<div>&nbsp;<\/div>\n<ul>\n<li><strong>Vendor
        &amp; Stakeholder Management<\/strong><\/li>\n<li>You will manage relationships
        with external localization vendors, translators, and LQA partners, including
        performance tracking, quality evaluation, and delivery alignment. You will
        collaborate closely with internal production, marketing, brand, and development
        teams to ensure localization outcomes support broader publishing goals.<\/li>\n<\/ul>\n<div>&nbsp;<\/div>\n<ul>\n<li><strong>Cross-Functional
