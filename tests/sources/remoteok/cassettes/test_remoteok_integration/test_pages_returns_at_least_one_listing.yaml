        proactive, and affordable. We\u00e2\u0080\u0099re already connecting millions
        and scaling fast.<br \/><\/p><p style=\"min-height:1.5em\"><strong>Short on
        time? TL;DR<\/strong><\/p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\"><strong>You:<\/strong>
        Can define what should be measured, how it should be modeled, and how those
        insights should shape product and company decisions.<\/p><\/li><li><p style=\"min-height:1.5em\"><strong>Ownership:<\/strong>
        You\u00e2\u0080\u0099ll own Junction\u00e2\u0080\u0099s highest-leverage statistical,
        modeling, and evaluation work across diagnostics, clinical workflows, and
        AI-enabled product development.<\/p><\/li><li><p style=\"min-height:1.5em\"><strong>Scope:<\/strong>
        This is not a pure IC modeling role and not a reporting role. You\u00e2\u0080\u0099ll
        set the methodology, research roadmap, and decision framework for how Junction
        uses data to drive product, clinical, and business outcomes.<\/p><\/li><li><p
        style=\"min-height:1.5em\"><strong>Salary:<\/strong> $180,000 \u00e2\u0080\u0093
        $220,000 + equity<\/p><\/li><li><p style=\"min-height:1.5em\"><strong>Location:<\/strong>
        Fully remote (EST timezone only)<\/p><\/li><\/ul><p style=\"min-height:1.5em\"><\/p><p
        style=\"min-height:1.5em\"><strong>Why we need you<\/strong><\/p><p style=\"min-height:1.5em\">Junction
        sits in the flow of high-value diagnostics and clinical data. As the company
        grows, our advantage moves beyond just having data to having the ability to
        turn it into reliable intelligence improving product decisions, customer outcomes,
        and the performance of the business.<\/p><p style=\"min-height:1.5em\">Some
