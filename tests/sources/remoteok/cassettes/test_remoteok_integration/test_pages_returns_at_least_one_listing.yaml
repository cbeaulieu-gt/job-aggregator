        tech"],"description":"<p>\n<\/p><h2 id=\"about-the-position\">About the Position<\/h2>\n<p>The
        Project Manager I is an entry-level role on TEECOM\u00e2\u0080\u0099s internal
        Project Management path, reporting to Team Leads. You keep the team\u00e2\u0080\u0099s
        delivery machinery running \u00e2\u0080\u0094 tracking, documentation, coordination,
        and reporting \u00e2\u0080\u0094 so that Team Leads can focus on client relationships
        and strategic leadership.<\/p>\n<p>This role is a common entry point from
        the Designer path. Designers build engineering, production, and project management
        capability before participating in a TEECOM Grow career development discussion
        to determine long-term path alignment. Project Manager I is one of those next-step
        options.<\/p>\n<p>You provide operational support that strengthens visibility
        into scope, schedule, staffing, documentation, quality, and execution tracking
        across the team\u00e2\u0080\u0099s portfolio. Rather than independently leading
        complex engagements or managing client relationships, you reinforce the delivery
        systems that enable consistent execution and clear reporting.<\/p>\n<p>You
        partner closely with Team Leads, Group Leads, Project Supervisors, and Subtask
        PMs to maintain clarity, reinforce established workflows, and improve coordination
        and quality across the team\u00e2\u0080\u0099s portfolio. Your impact is measured
        by the stability and transparency you bring to team operations \u00e2\u0080\u0094
        and the confidence Team Leads have in the accuracy, organization, and reliability
        of project data and reporting.<\/p>\n<p>Project Managers at this level are
        internally focused, supporting team-level operations, delivery execution,
        and reporting in close partnership with Team Leads. This is an operational
        PM role, with advancement continuing toward Project Manager II and Project
        Manager III within the internal project management path.<\/p>\n<p><\/p>\\n<p><\/p><p><br><\/p><b>Delivery
        Execution, Operational Discipline, and Improving the TEECOM System<\/b><div>\n<p>As
        a Project Manager I, your impact is reflected in how consistently you support
        team operations, strengthen delivery visibility, improve quality, and improve
        documentation quality.<\/p>\n<ol>\n<li><strong>Delivery Execution &amp; Coordination<\/strong>\n<ul
        style=\"list-style-type: disc;\">\n<li>You support clear coordination across
        scope, schedule, milestones, and action items.<\/li>\n<li>You help Team Leads,
        Group Leads, Project Supervisors, and Subtask PMs maintain visibility into
        project status, risks, and coordination needs.<\/li>\n<li>You reinforce consistent
        project organization that supports predictable delivery.<\/li>\n<li>You help
        make workload and capacity constraints visible for Team Lead review.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Operational
        Discipline &amp; Tracking<\/strong>\n<ul style=\"list-style-type: disc;\">\n<li>You
        maintain accurate project tracking data and current reporting.<\/li>\n<li>You
        reinforce consistent project setup, closeout, and documentation practices.<\/li>\n<li>You
        improve team visibility through disciplined tracking and follow-through.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Improve
        the TEECOM System<\/strong>\n<ul style=\"list-style-type: disc;\">\n<li>You
        follow established workflows and documentation standards consistently.<\/li>\n<li>You
        keep client documentation organized and aligned with project status.<\/li>\n<li>You
        capture and make visible lessons learned and process updates.<\/li>\n<li>You
        contribute Pull Requests that improve documentation clarity, workflow consistency,
        or project visibility. (TEECOM uses GitHub as its internal knowledge and documentation
        platform; Pull Requests are how documentation improvements are proposed, reviewed,
        and published.)<\/li>\n<li>You identify and elevate documentation inconsistencies
        for improvement.<\/li>\n<li>You reduce rework and support team coordination
        through clear documentation.<\/li>\n<li>You strengthen your project management
        knowledge and contribute to PMO discipline initiatives by sharing lessons
        learned, staying current on PM documentation, and supporting process development
        efforts.<\/li>\n<\/ul>\n<\/li>\n<li><strong>AEC Technology Domain Awareness<\/strong>\n<ul
        style=\"list-style-type: disc;\">\n<li>You develop foundational familiarity
        with the technology systems TEECOM designs and implements, including telecommunications
        infrastructure, structured cabling, audiovisual, security, acoustics, and
        wired and wireless networks.<\/li>\n<li>You apply this awareness to improve
        the accuracy and relevance of your project tracking, documentation, and coordination
        support.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<\/div><p><br><\/p><b>What Success
        in this Position Looks Like<\/b><div>\n<ul style=\"list-style-type: disc;\">\n<li>You
        maintain organized, decision-ready tracking and documentation that keeps project
        data reliable.<\/li>\n<li>You provide Team Leads with clear visibility into
        project status, upcoming milestones, and emerging risks.<\/li>\n<li>You support
        Team Leads in identifying projects that may be trending off track on scope
        or schedule.<\/li>\n<li>You document action items and decisions consistently
        and follow through to ensure alignment.<\/li>\n<li>You keep reporting data
        (scope, schedule, stale dates) reliable and up to date.<\/li>\n<li>You improve
        project readiness through organized documentation and disciplined tracking.<\/li>\n<li>You
        surface risks and blockers early, reducing rework and surprises.<\/li>\n<li>You
        ensure project setup and closeout processes are followed consistently.<\/li>\n<li>You
        participate in project health audits and help track quality findings for Team
