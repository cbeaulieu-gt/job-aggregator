        entering an era where data is abundant.<\/p><p style=\"min-height:1.5em\">Junction
        is building the infrastructure layer for diagnostic healthcare, making patient
        data accessible, actionable, and automated across labs and devices. Our mission
        is simple but ambitious: use health data to unlock unprecedented insight into
        human health and disease.<\/p><p style=\"min-height:1.5em\">If you''re passionate
        about how technology can supercharge healthcare, you\u00e2\u0080\u0099ll fit
        right in.<\/p><p style=\"min-height:1.5em\">Backed by <strong>Creandum, Point
        Nine, 20VC, YC<\/strong>, and leading angels, we\u00e2\u0080\u0099re working
